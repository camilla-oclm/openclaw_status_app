    var dec = i.clawsweeper_decision;
    if (dec && dec!=="unknown"){
      var decTip = "Clawsweeper (OpenClaw's automated issue-triage bot) "+(dec==="keep_open"?"kept this open — not auto-closed or resolved.":"marked this "+dec+".");
      tags.push(el("span",{"class":"tag "+(dec==="keep_open"?"t-warn":"t-good"), title:decTip}, (dec==="keep_open"?"⊙ keep open":"✓ "+dec)));
    }
    if (i.fixed_in){
      tags.push(el("span",{"class":"tag t-good"}, "✓ fixed in "+i.fixed_in));
    } else if (String(i.state||"").toLowerCase()==="closed"){
      tags.push(el("span",{"class":"tag t-good", title:"Upstream closed this as completed — the fix is merged for a future release but almost certainly NOT in this one."}, "✓ fix merged upstream"));
    } else if (i.category==="regression" || i.category==="post_release"){
      tags.push(el("span",{"class":"tag t-bad"}, "● unfixed"));
    }
    if (i.has_workaround){
      tags.push(el("span",{"class":"tag t-info", title:"The issue report mentions a workaround or mitigation — open the linked thread for details. (Detected from the report text; not a guarantee one exists or is official.)"}, "🔧 workaround noted"));
    }
    if (i.reactions){
      tags.push(el("span",{"class":"tag"}, "👍 "+i.reactions));
    }
    var sevCls = (sev==="critical"||sev==="high")?"t-bad":(sev==="medium"?"t-warn":"");
    tags.push(el("span",{"class":"tag "+sevCls}, sev+" severity"));
    // True bug age: when it was opened on GitHub (a verifiable fact), with first-tracked as fallback.
    if (i.created_at) tags.push(el("span",{"class":"tag", title:"When this issue was opened on GitHub"}, "opened "+fmtDate(i.created_at)));
    else if (i.first_seen) tags.push(el("span",{"class":"tag"}, "first tracked "+timeAgo(i.first_seen)));
    // Mark heuristic platform/subsystem tags so a keyword guess doesn't read as an assertion.
    if (i.tag_source && i.tag_source !== "analyst"){
      tags.push(el("span",{"class":"tag t-auto", title:"The platform/subsystem tags here were auto-detected from the issue's text and labels — not asserted by the analyst. Verify on GitHub."}, "🔍 auto-detected"));
    }
    // Raw maintainer-assigned GitHub labels — the verifiable facts the severity is scored from.
    (i.labels||[]).forEach(function(lbl){
      tags.push(el("span",{"class":"tag tag-raw", title:"Maintainer-assigned GitHub label"}, String(lbl)));
    });
    if (mine) tags.unshift(el("span",{"class":"tag t-me"}, "★ your stack"));
    if (i.is_new) tags.unshift(el("span",{"class":"tag t-good"}, "🆕 new"));

    // Compact one-line summary (click to expand the full tag set + GitHub link).
    var num = "#"+i.number;
    var badges = [];
    if (i.is_new) badges.push(el("span",{"class":"ib t-good", title:"New since last run"}, "🆕"));
    if (mine) badges.push(el("span",{"class":"ib t-me", title:"Affects your stack"}, "★"));
    badges.push(el("span",{"class":"ib", title:cat.label}, [icon(cat.icon,13)]));
    if (i.reactions) badges.push(el("span",{"class":"ib"}, "👍 "+i.reactions));
    var detId = "idet-"+i.number;
    var btn = el("button",{"class":"irow", type:"button", "aria-expanded":"false",
                           "aria-controls":detId, title:"Show details for "+num},[
      el("span",{"class":"sevdot", title:sev+" severity"}),
      el("span",{"class":"inum"}, num),
      el("span",{"class":"ititle"}, i.title||"(untitled)"),
      el("span",{"class":"ibs"}, badges),
      el("span",{"class":"chev","aria-hidden":"true"}, "▸")
    ]);
    var detail = el("div",{"class":"idetail", id:detId, hidden:""},[
      // The row's .ititle is one-line ellipsized — the expanded panel is where the
      // full untruncated title lives.
      el("div",{"class":"idet-title"}, i.title||"(untitled)"),
      el("div",{"class":"tags"}, tags),
      el("a",{"class":"idet-link", href:issueUrl(i.number)}, "View "+num+" on GitHub ↗")
    ]);
    btn.addEventListener("click", function(){
      var open = btn.getAttribute("aria-expanded")==="true";
      btn.setAttribute("aria-expanded", open?"false":"true");
      if (open) detail.setAttribute("hidden",""); else detail.removeAttribute("hidden");
    });
    return el("div",{"class":"issue sev-"+sev+(mine?" mine":""), "data-cat":i.category||"other",
                     "data-mine":mine?"1":"0", "data-comp":issueComponents(i).join(" ")},[ btn, detail ]);
  }
  function issues(){
    var ki = (DATA.known_issues||[]).slice();
    if (!ki.length) return null;
    var order = {critical:0,high:1,medium:2,low:3};
    var catOrder = {regression:0,post_release:1,diamond_lobster:2,active:3};
    function rank(map,key){ return (key in map) ? map[key] : 9; }  // NB: 0 is falsy, don't use ||
    ki.sort(function(a,b){
      var s = rank(order,a.severity) - rank(order,b.severity);
      if (s) return s;
      var c = rank(catOrder,a.category) - rank(catOrder,b.category);
      if (c) return c;
      // importance weight (pipeline-computed) orders within severity × category
      return (Number(b.weight)||0) - (Number(a.weight)||0);
    });
    var s = el("div",{"class":"section", id:"issues"});
    var newCount = ki.filter(function(i){return i.is_new;}).length;
    s.appendChild(sectionHead("Known issues", ki.length+(DATA.issues_capped?"+":""),
      (newCount ? ("🆕 "+newCount+" new since last run · ") : "")
      +(DATA.issues_capped ? "highest-ranked · " : "")+"critical first"));
    // Prevalence/velocity context: the list above is the severity-seeking top-N of a very
    // large install base — say so, and show how fast upstream resolves what we track.
    var cal = DATA.calibration || {};
    var calBits = [];
    if (cal.npm_weekly_downloads){
      var dl = cal.npm_weekly_downloads;
      calBits.push("tracked against ~"+(dl>=1e6 ? (dl/1e6).toFixed(1)+"M" : dl.toLocaleString())+" weekly npm installs");
    }
    if (cal.tracked_total && cal.closed_completed != null){
      calBits.push(cal.closed_completed+" of "+cal.tracked_total+" issues ever tracked for this release already fixed upstream");
    }
    if (calBits.length) s.appendChild(el("p",{"class":"cal-note"}, calBits.join(" · ")));

    var cats = {};
    ki.forEach(function(i){ if(i.category) cats[i.category]=(cats[i.category]||0)+1; });
    // Category filters render as a tab strip (styled like the long-tail tabs above);
    // subsystem filters sit on a secondary row below. They are two INDEPENDENT
    // dimensions that combine (category AND subsystem — e.g. "Regression × Gateway");
    // re-clicking the active subsystem chip clears that dimension.
    var catStrip = el("div",{"class":"ltabs ki-cats", role:"group", "aria-label":"Filter known issues by category"});
    catStrip.appendChild(el("button",{"class":"ltab", type:"button", "aria-pressed":"true", "data-f":"all"}, "All ("+ki.length+")"));
    Object.keys(cats).forEach(function(c){
      var meta = CAT[c]||{icon:"doc",label:cap(c)};
      catStrip.appendChild(el("button",{"class":"ltab", type:"button", "aria-pressed":"false", "data-f":c}, [icon(meta.icon,13), " "+meta.label+" ("+cats[c]+")"]));
    });
    if (stackActive()){
      var mineN = ki.filter(function(i){ return issueHitsStack(i); }).length;
      catStrip.appendChild(el("button",{"class":"ltab", type:"button", "aria-pressed":"false", "data-f":"mine"}, "★ My stack ("+mineN+")"));
    }
    s.appendChild(catStrip);

    // Component filters — one chip per subsystem present, in taxonomy order.
    var compCounts = {};
    ki.forEach(function(i){ issueComponents(i).forEach(function(c){ compCounts[c]=(compCounts[c]||0)+1; }); });
    var compKeys = COMP.map(function(c){return c[0];}).filter(function(k){ return compCounts[k]; });
    var compRow = null;
    if (compKeys.length){
      compRow = el("div",{"class":"filters ki-subs"});
      compRow.appendChild(el("span",{"class":"fsep"}, "subsystem"));
      compKeys.forEach(function(k){
        var m = COMP_LABEL[k];
        compRow.appendChild(el("button",{"class":"fbtn fcomp", type:"button", "aria-pressed":"false", "data-f":"comp:"+k},
          [icon(m[0],12), m[1]+" ("+compCounts[k]+")"]));
      });
      s.appendChild(compRow);
    }

    var list = el("div",{"class":"issue-list"});
    ki.forEach(function(i){ list.appendChild(issueCard(i)); });
    s.appendChild(list);

    // Cap the rendered rows so the list stays short and scannable even as the ledger
    // grows; "Show all" lifts the cap. The cap applies to the CURRENTLY-FILTERED set.
    var CAP = 15, showAll = false, catFilter = "all", compFilter = null;
    var moreBtn = el("button",{"class":"ki-more", type:"button"}, "");
    s.appendChild(moreBtn);

    function matchRow(row){
      var catOk = catFilter === "all" ? true
        : catFilter === "mine" ? row.getAttribute("data-mine") === "1"
        : row.getAttribute("data-cat") === catFilter;
      var compOk = !compFilter ||
        (row.getAttribute("data-comp") || "").split(" ").indexOf(compFilter) >= 0;
      return catOk && compOk;
    }
    function refresh(){
      var shown = 0, matched = 0;
      list.querySelectorAll(".issue").forEach(function(row){
        if (!matchRow(row)){ row.style.display = "none"; return; }
        matched++;
        var vis = showAll || shown < CAP;
        row.style.display = vis ? "" : "none";
        if (vis) shown++;
      });
      if (matched > CAP){
        moreBtn.style.display = "";
        moreBtn.textContent = showAll ? "Show fewer ▴" : ("Show all "+matched+" ▾");
      } else {
        moreBtn.style.display = "none";
      }
      return matched;
    }
    s.addEventListener("click", function(ev){
      var f = ev.target.closest(".ki-cats .ltab, .ki-subs .fbtn");
      if (f){
        var val = f.getAttribute("data-f");
        if (val.indexOf("comp:") === 0){
          var k = val.slice(5);
          compFilter = (compFilter === k) ? null : k;   // re-click clears the dimension
        } else {
          catFilter = val;
        }
        catStrip.querySelectorAll(".ltab").forEach(function(b){ b.setAttribute("aria-pressed", b.getAttribute("data-f")===catFilter?"true":"false"); });
        if (compRow) compRow.querySelectorAll(".fbtn").forEach(function(b){ b.setAttribute("aria-pressed", b.getAttribute("data-f")===("comp:"+compFilter)?"true":"false"); });
        showAll = false;                 // re-cap when a filter changes
        var m = refresh();
        // Real user clicks only — the synthetic re-apply clicks in applyStack() would
        // otherwise talk over the setup announcement.
        if (ev.isTrusted) announce(m + " of " + ki.length + " issues shown");
      } else if (ev.target.closest(".ki-more")){
        showAll = !showAll;
        var m2 = refresh();
        if (ev.isTrusted) announce(showAll ? ("Showing all " + m2 + " issues") : "List collapsed");
      }
    });
    refresh();
    return s;
  }

  function changes(){
    var ch = DATA.changes || {};
    // Features first (the reason a release exists); only keep categories that have items
    // so an empty "Breaking" tab never shows.
    var groups = [
      {key:"features", icon:"✨", label:"Highlights", items:ch.features||[], sub:function(x){return x.value||"";}, field:"title"},
      {key:"fixes",    icon:"✓", label:"Fixes",    items:ch.fixes||[],    sub:function(x){return x.verified?"verified":"";}, field:"title"},
      {key:"breaking", icon:"⚠", label:"Breaking", items:ch.breaking||[], sub:function(x){return x.impact||"";}, field:"title"}
    ].filter(function(g){ return g.items.length; });
    if (!groups.length) return null;
    var total = groups.reduce(function(a,g){return a+g.items.length;},0);
    var s = el("div",{"class":"section"});
    s.appendChild(sectionHead("What's new in this release", total, "from the release notes"));

    var tabs = el("div",{"class":"tabs", role:"tablist", "aria-label":"Release changes"});
    var panel = el("div",{"class":"panel"});
    groups.forEach(function(g, idx){
      tabs.appendChild(el("button",{"class":"tab", type:"button", role:"tab", "data-k":g.key, "aria-selected": idx===0?"true":"false"},
        [document.createTextNode(g.icon+" "+g.label), el("span",{"class":"cnt"}, String(g.items.length))]));
    });
    s.appendChild(tabs);
    s.appendChild(panel);
    // Keyboard parity with the long-tail tabs: roving tabindex + Arrow/Home/End.
    var tabsArr = Array.prototype.slice.call(tabs.querySelectorAll(".tab"));
    function syncTabIndex(){
      tabsArr.forEach(function(t){ t.tabIndex = t.getAttribute("aria-selected")==="true" ? 0 : -1; });
    }
    syncTabIndex();
    tabs.addEventListener("keydown", function(ev){
      var i = tabsArr.indexOf(document.activeElement);
      if (i < 0) return;
      var j = -1;
      if (ev.key === "ArrowRight" || ev.key === "ArrowDown") j = (i+1) % tabsArr.length;
      else if (ev.key === "ArrowLeft" || ev.key === "ArrowUp") j = (i-1+tabsArr.length) % tabsArr.length;
      else if (ev.key === "Home") j = 0;
      else if (ev.key === "End") j = tabsArr.length-1;
      if (j < 0) return;
      ev.preventDefault(); tabsArr[j].click(); tabsArr[j].focus();
    });

    function paint(key){
      panel.textContent = "";
      var g = groups.filter(function(x){return x.key===key;})[0];
      g.items.forEach(function(it){
        var sub = g.sub(it);
        panel.appendChild(el("div",{"class":"change"},[
          el("div",{"class":"ct"}, linkify(it[g.field]||"")),
          sub ? el("div",{"class":"cm"}, (g.key==="fixes"&&it.verified)? "✓ "+sub : sub) : null
        ]));
      });
    }
    tabs.addEventListener("click", function(ev){
      var tab = ev.target.closest(".tab"); if(!tab) return;
      tabs.querySelectorAll(".tab").forEach(function(t){ t.setAttribute("aria-selected", t===tab?"true":"false"); });
      syncTabIndex();
      paint(tab.getAttribute("data-k"));
    });
    paint(groups[0].key);
    return s;
  }

  // One meter card — shared by both Impact grids (platform × component differ only in
  // aggregation + labels). Fill = issue volume relative to the grid's busiest row —
  // CONTINUOUS, so 1 vs 7 vs 13 issues read as different bars (the old 5 coarse
  // segments saturated: round(12/13*5) == round(13/13*5)). Colour = worst severity
  // via the sv-* class → --ic, exactly as before.
  function meterCard(ic, name, a, maxCount, mine, label){
    var fill = el("i",{"class":"vfill"});
    // Width via CSSOM (not a style attribute) so a strict CSP can't zero the bars;
    // floor at 6% so a 1-issue row shows a visible nub rather than an empty track.
    fill.style.width = (a.count ? Math.max(6, Math.round(a.count / (maxCount || 1) * 100)) : 0) + "%";
    return el("div",{"class":"plat sv-"+(a.count?a.worst:"none")+(mine?" you":"")},[
      el("div",{"class":"ph"},[
        el("span",{"class":"pn"}, [icon(ic,13), el("span",{"class":"pname"}, name), mine?el("span",{"class":"me"}," ★you"):null])
      ]),
      el("div",{"class":"pmeter"},[ el("span",{"class":"vbar"},[fill]), el("span",{"class":"pl"}, label) ])
    ]);
  }

  function platforms(){
    var ki = DATA.known_issues || [];
    var anyTagged = ki.some(function(i){ return (i.platforms||[]).length; });
    var stat = {}, maxCount = 0;
    PLAT.forEach(function(p){
      var iss = platformIssues(p[0], ki);
      stat[p[0]] = {count:iss.length, regr:iss.filter(function(i){return i.category==="regression";}).length,
                    worst:worstSeverity(iss).name};
      if (iss.length > maxCount) maxCount = iss.length;
    });
    var pi = DATA.platform_impact || {};
    // Fallback for legacy data with no per-issue platform tags: derive length+colour
    // from the analyst's platform_impact level rather than from counted evidence.
    if (!anyTagged){
      if (!Object.keys(pi).length) return null;
      var LVLSEV = {high:"high", medium:"medium", low:"low", none:"none"};
      var LVLFILL = {high:5, medium:3, low:2, none:0};
      PLAT.forEach(function(p){
        var lvl = String(pi[p[0]]||"none").toLowerCase();
        stat[p[0]] = {count:LVLFILL[lvl]||0, regr:0, worst:LVLSEV[lvl]||"none", lbl:(IMPACT[lvl]||IMPACT.none).label};
      });
      maxCount = 5;
    } else if (!maxCount){ return null; }
    var s = el("div",{"class":"impact-sub", id:"platforms"});
    s.appendChild(el("div",{"class":"impact-sublabel"}, "By platform & channel"));
    // When every affected platform shows the same volume×severity, the bars carry no
    // signal — say so and point at the component split rather than a wall of identical
    // bars. (Signature buckets the continuous fill to deciles, as the segments did.)
    var sigs = {}, nShown = 0;
    PLAT.forEach(function(p){ var a=stat[p[0]]; if (a.count>0){ nShown++; sigs[a.worst+":"+Math.round(a.count/(maxCount||1)*10)]=1; } });
    if (nShown>=2 && Object.keys(sigs).length===1){
      s.appendChild(el("div",{"class":"impact-note"}, "Affects all platforms about equally — the meaningful split is by component, above."));
    }
    var g = el("div",{"class":"plat-grid"});
    PLAT.forEach(function(p){
      var a = stat[p[0]];
      g.appendChild(meterCard(p[1], p[2], a, maxCount, !!STACK[p[0]],
                              a.lbl || (a.count ? issueWord(a.count) : "clear")));
    });
    s.appendChild(g);
    return s;
  }

  // Per-component verdict line — the conservative per-setup machinery (keyVerdict)
  // run for each subsystem alone, so WHERE the risk lives is readable at a glance:
  // a component carrying a blocker keeps the global verdict, the others ease one
  // notch. CLIENT-ONLY like the per-setup verdict — never in SSR / latest.json /
  // llms / badge; never harsher than global; never ⏸️→✅; fresh never softens.
  function verdictLine(){
    var ki = DATA.known_issues || [];
    var entries = [];
    COMP.forEach(function(c){
      var n = componentIssues(c[0], ki).length;
      if (!n) return;
      entries.push({ic:c[1], name:c[2], n:n, kv:keyVerdict([], [c[0]])});
    });
    if (!entries.length) return null;
    entries.sort(function(a,b){ return (b.kv.blockers.length?1:0)-(a.kv.blockers.length?1:0) || b.n-a.n; });
    var wrap = el("div",{"class":"impact-sub", id:"verdict-line"});
    wrap.appendChild(el("div",{"class":"impact-sublabel"}, "Verdict by component"));
    var line = el("div",{"class":"vline", role:"list", "aria-label":"Per-component verdict"});
    entries.forEach(function(e){
      var v = VERDICTS[e.kv.rec] || {label:String(e.kv.rec||"")};
      var why = e.kv.blockers.length
        ? e.kv.blockers.length+" blocking issue"+(e.kv.blockers.length===1?"":"s")+" (version-confirmed high/critical with corroboration or community traction) land"+(e.kv.blockers.length===1?"s":"")+" here — the global verdict applies squarely."
        : (e.kv.softened
           ? "No blocking issue is confirmed to land here, so the global verdict eases one notch for this subsystem."
           : "Matches the global verdict.");
      line.appendChild(el("span",{"class":"vchip"+(e.kv.blockers.length?" hot":""), role:"listitem",
                                  // aria-label carries the verdict to AT (D29): the glyph is
                                  // aria-hidden and the visible text is only name+count, so without
                                  // this a screen reader hears "Gateway 3" with no verdict.
                                  "aria-label":e.name+": "+v.label+", "+e.n+" issue"+(e.n===1?"":"s"),
                                  title:e.name+": "+v.label+" — "+why+" Derived on this page from the issue tags; the official verdict stays global."},[
        el("span",{"class":"vc-em","aria-hidden":"true"}, e.kv.rec),
        icon(e.ic,12),
        document.createTextNode(e.name),
        el("span",{"class":"vc-n"}, String(e.n))
      ]));
    });
    wrap.appendChild(line);
    var clear = COMP.length - entries.length;
    if (clear > 0) wrap.appendChild(el("div",{"class":"vline-note"},
      clear+" other component"+(clear===1?" has":"s have")+" no tracked issues this release."));
    return wrap;
  }

  // Impact — one section that merges the two volume×severity meter views. The
  // per-component verdict line leads (the decision-shaped view), then component
  // meters (they differentiate — gateway/plugins hot spots), then platform/channel
  // (which often reads all-high; the sub-builder flags that case).
  function impact(){
    var comp = componentHealth();
    var plat = platforms();
    if (!comp && !plat) return null;
    var s = el("div",{"class":"section", id:"impact"});
    s.appendChild(sectionHead("Impact", null, "bar = issue volume · colour = worst severity"));
    var vl = verdictLine();
    if (vl) s.appendChild(vl);
    if (comp) s.appendChild(comp);
    if (plat) s.appendChild(plat);
    return s;
  }

  // Component health — which subsystems this release hits. Bar length = issue volume,
  // colour = worst severity (so a 6-critical hot spot reads louder than a 1-high blip).
  function componentHealth(){
    var ki = DATA.known_issues || [];
    var agg = {};
    ki.forEach(function(i){
      var sv = String(i.severity||"low").toLowerCase(), w = SEVW[sv]||0;
      issueComponents(i).forEach(function(c){
        var a = agg[c] || (agg[c] = {count:0, regr:0, worst:"low", w:0});
        a.count++;
        if (i.category==="regression") a.regr++;
        if (w > a.w){ a.w = w; a.worst = sv; }
      });
    });
    var keys = Object.keys(agg);
    if (!keys.length) return null;
    var maxCount = 0; keys.forEach(function(k){ if (agg[k].count > maxCount) maxCount = agg[k].count; });
    keys.sort(function(a,b){ return agg[b].count-agg[a].count || agg[b].w-agg[a].w; });  // hot spots first
    var s = el("div",{"class":"impact-sub", id:"components"});
    s.appendChild(el("div",{"class":"impact-sublabel"}, "By component"));
    var g = el("div",{"class":"plat-grid"});
    keys.forEach(function(k){
      var a = agg[k], meta = COMP_LABEL[k] || ["build", cap(k)];
      g.appendChild(meterCard(meta[0], meta[1], a, maxCount, !!STACK[k],
                              issueWord(a.count) + (a.regr? " · "+a.regr+" regr" : "")));
    });
    s.appendChild(g);
    return s;
  }

  function triage(){
    var work = DATA.clawsweeper_work || [], closed = DATA.clawsweeper_closed || [];
    if (!work.length && !closed.length) return null;
    function col(title, items, kind){
      var c = el("div",{"class":"triage-col"});
      c.appendChild(el("h4", null, title+" ("+items.length+")"));
      var scroll = el("div",{"class":"tscroll"});
      items.forEach(function(it){
        scroll.appendChild(el("div",{"class":"trow"},[
          el("a",{"class":"tn", href:issueUrl(it.number)}, "#"+it.number),
          el("span",{"class":"tt"}, it.title||"")
        ]));
      });
      c.appendChild(scroll);
      return c;
    }
    var s = el("div",{"class":"section"});
    s.appendChild(sectionHead("Issue-triage activity", null, "from Clawsweeper, OpenClaw's triage bot"));
    var d = el("details",{"class":"triage"});
    d.appendChild(el("summary", null, [
      document.createTextNode("🧹  "+work.length+" in progress · "+closed.length+" recently closed"),
      el("span",{"class":"caret"},"▶")
    ]));
    d.appendChild(el("div",{"class":"triage-body"},[
      col("🛠 In progress", work, "work"),
      col("✓ Recently closed", closed, "closed")
    ]));
    s.appendChild(d);
    return s;
  }

  // ── verdict track record (accountability: did the first read hold?) ────────
  // Built (render-side) from the same per-run series as Trends. A released version is
  // immutable — its issue list only accrues — so an honest verdict should hold or
  // harden between runs; softening is rare and gets the loud badge.
  var TR_BADGE = {
    held:     {txt:"✓ held",     cls:" tr-held", tip:"Every assessment of this version reached the same verdict."},
    hardened: {txt:"↓ hardened", cls:" tr-hard", tip:"The verdict got more cautious as post-release reports accrued — the expected direction for an immutable release that turns out worse than its first read."},
    softened: {txt:"↑ softened", cls:" tr-soft", tip:"The verdict got LESS cautious over time — rare, and it needs a real cause (a severe report debunked, or the early read was over-cautious). Check the runs' evidence before trusting it."},

  // ── best version to run (from the verdict history) ──────────────────────────
  function bestVersion(){
    var h = (DATA.version_history||[]).slice();
    if (!h.length) return null;
    h.sort(function(a,b){ return String(b.assessed_at).localeCompare(String(a.assessed_at)); });
    var SAFE = {"✅":1,"⚠️":1};                 // "safe to run" verdicts
    var curSafe = SAFE[DATA.recommendation];
    var arch = {}; (DATA.archived_versions||[]).forEach(function(v){ arch[v]=1; });
    var best = null;
    for (var i=0;i<h.length;i++){ if (h[i].version!==DATA.version && SAFE[h[i].recommendation]){ best = h[i]; break; } }
    var tone, bi, body;
    if (curSafe && DATA.freshness && DATA.freshness.fresh){
      // A freshly-dropped release is too new to call "the safest / cleared to run" — that
      // would contradict the fresh-release note. Defer the verdict until reports accrue.
      tone="tone-info"; bi="🆕";
      body = [el("b",null,"v"+(DATA.version||"")+" is the latest release."),
              document.createTextNode(" It's too new to call cleared — give it a few runs of real-world reports first (see the fresh-release note above).")];
    } else if (curSafe && DATA.recommendation === "⚠️"){
      // ⚠️ is "back up first — real risk remains"; don't flatly call it "cleared to run".
      tone="tone-warn"; bi="⚠️";
      body = [el("b",null,"v"+(DATA.version||"")+" is the latest, and the best available."),
              document.createTextNode(" But update with care — some real risk remains (see the verdict above).")];
    } else if (curSafe){
      tone="tone-good"; bi="✅";
      body = [el("b",null,"You're on the safest version."),
              document.createTextNode(" v"+(DATA.version||"")+" is the latest and it's cleared to run.")];
    } else if (best){
      tone="tone-info"; bi="↩️";
      var vl = arch[best.version]
        ? el("a",{"class":"snap", href:"archive/"+encodeURIComponent(best.version)+".html", title:"View the verdict for v"+best.version}, "v"+best.version)
        : el("b",null,"v"+best.version);
      var bl = (VERDICTS[best.recommendation]||{label:""}).label.toLowerCase();
      body = [el("b",null,"Safest version to run now: "), vl,
              document.createTextNode(" — the most recent release that was cleared"+(bl?(" ("+bl+")"):"")+". Hold here until the latest is fixed.")];
    } else {
      tone="tone-warn"; bi="⏳";
      body = [el("b",null,"No recently-cleared version."),
              document.createTextNode(" None of the tracked releases earned an update-now verdict yet — wait for a clean one.")];
    }
    return el("div",{"class":"bestver "+tone},[el("span",{"class":"bi"},bi), el("div",null,body)]);
  }

  // ── your setup (personalize the verdict to the user's stack) ────────────────
  function personalize(){
    var s = el("div",{"class":"section setup", id:"setup"});
    s.appendChild(sectionHead("Your setup", null, "tailor the verdict to what you run"));
    // The how-to reads BEFORE the pickers — it used to sit in dim small text below
    // 17 unexplained chips, so mobile users met the wall of chips with no context.
    s.appendChild(el("div",{"class":"setup-intro"},
      "Tap what you run — issues hitting your stack get highlighted and the verdict "+
      "below is tuned to it (saved on this device)."));
    function pickBtn(k, label){
      return el("button",{"class":"pick", type:"button", "aria-pressed": STACK[k]?"true":"false", "data-k":k}, label);
    }
    var chips = el("div",{"class":"chips"});
    chips.appendChild(el("span",{"class":"chip-grp"}, "Platforms & channels"));
    PLAT.forEach(function(p){ chips.appendChild(pickBtn(p[0], [icon(p[1],13), p[2]])); });
    chips.appendChild(el("span",{"class":"chip-grp"}, "Components"));
    COMP.forEach(function(c){ chips.appendChild(pickBtn(c[0], [icon(c[1],13), c[2]])); });
    var clearBtn = el("button",{"class":"pick pick-clear", type:"button", id:"stack-clear",
                                title:"Clear every picked platform, channel and component"}, "✕ clear all");
    if (!stackActive()) clearBtn.setAttribute("hidden","");
    chips.appendChild(clearBtn);
    // The URL always mirrors the stack (saveStack), so sharing = copying the address.
    // This chip just makes that discoverable; clipboard failure degrades to a hint.
    var shareBtn = el("button",{"class":"pick pick-share", type:"button", id:"stack-share",
                                title:"Copy a link that opens this page with your setup pre-picked"}, "⧉ copy link");
    if (!stackActive()) shareBtn.setAttribute("hidden","");
    chips.appendChild(shareBtn);
    s.appendChild(chips);
    s.appendChild(personalRisk());
    chips.addEventListener("click", function(ev){
      if (ev.target.closest(".pick-clear")){
        for (var k0 in STACK){ if (Object.prototype.hasOwnProperty.call(STACK,k0)) delete STACK[k0]; }
        saveStack(); applyStack();
        return;
      }
      if (ev.target.closest(".pick-share")){
        // Build the link from the CURRENT stack the way saveStack mirrors it — do NOT trust
        // location.href, which lacks ?stack= until a toggle has run (a boot-restored stack from
        // localStorage never wrote the URL, so the chip would share a stack-less link while
        // announcing "pre-picked"). Construct it WITHOUT touching localStorage or the URL — that
        // would break the ?stack=-boots-view-only invariant for a visitor on a shared link. (D17)
        var link;
        try {
          var qs = new URLSearchParams(location.search), ks = stackKeys();
          if (ks.length) qs.set("stack", ks.join(",")); else qs.delete("stack");
          var q = qs.toString().replace(/%2C/gi, ",");
          link = location.origin + location.pathname + (q ? "?" + q : "") + location.hash;
        } catch(e){ link = location.href; }
        var done = function(){ announce("Link copied — it opens with this setup pre-picked."); };
        var fail = function(){ announce("Couldn't copy automatically — copy the address bar; it carries your setup."); };
        try {
          if (navigator.clipboard && navigator.clipboard.writeText){
            navigator.clipboard.writeText(link).then(done, fail);
          } else { fail(); }
        } catch(e){ fail(); }
        return;
      }
      var b = ev.target.closest(".pick"); if(!b) return;
      var k = b.getAttribute("data-k");
      if (STACK[k]) delete STACK[k]; else STACK[k]=true;
      saveStack();
      applyStack();   // update only the stack-dependent bits — no full-page re-render/flash
    });
    return s;
  }
  // Toggling the stack only affects three sections. Update them in place (no
  // #app teardown) so the page doesn't flash, scroll holds, and other sections'
  // state (catch-up version, changes tab, issue filter) is preserved.
  function applyStack(){
    var setup = document.getElementById("setup");
    if (setup){
      setup.querySelectorAll(".pick").forEach(function(b){
        b.setAttribute("aria-pressed", STACK[b.getAttribute("data-k")] ? "true" : "false");
      });
      var clr = document.getElementById("stack-clear");
      if (clr){ if (stackActive()) clr.removeAttribute("hidden"); else clr.setAttribute("hidden",""); }
      var shr = document.getElementById("stack-share");
      if (shr){ if (stackActive()) shr.removeAttribute("hidden"); else shr.setAttribute("hidden",""); }
      var risk = setup.querySelector(".risk, .hint");
      if (risk) risk.parentNode.replaceChild(personalRisk(), risk);
    }
    var oldI = document.getElementById("issues");
    if (oldI){
      // Preserve BOTH active filter dimensions across the rebuild (category tab +
      // subsystem chip — they combine).
      var ac = oldI.querySelector('.ki-cats .ltab[aria-pressed="true"]');
      ac = ac ? ac.getAttribute("data-f") : "all";
      var af = oldI.querySelector('.ki-subs .fbtn[aria-pressed="true"]');
      af = af ? af.getAttribute("data-f") : null;
      var freshI = issues();
      if (freshI){
        oldI.parentNode.replaceChild(freshI, oldI);
        if (ac && ac !== "all"){
          var bc = freshI.querySelector('.ki-cats .ltab[data-f="'+ac+'"]');
          if (bc) bc.click();   // (a vanished "mine" tab after clear-all safely stays "all")
        }
        if (af){
          var bf = freshI.querySelector('.ki-subs .fbtn[data-f="'+af+'"]');
          if (bf) bf.click();
        }
      }
    }
    var oldP = document.getElementById("platforms");
    if (oldP){ var fp = platforms(); if (fp) oldP.parentNode.replaceChild(fp, oldP); }
    var oldC = document.getElementById("components");
    if (oldC){ var fc = componentHealth(); if (fc) oldC.parentNode.replaceChild(fc, oldC); }
    // Keep the hero CTA's live per-setup verdict mini-summary in sync with the stack.
    var cta = document.getElementById("setup-cta");
    if (cta){
      cta.textContent = "";
      setupCtaLabel().forEach(function(n){
        cta.appendChild(typeof n === "object" ? n : document.createTextNode(String(n)));
      });
    }
    if (stackActive()){
      var svd = setupVerdict();
      announce("For your setup: " + ((VERDICTS[svd.rec]||{}).label || String(svd.rec)));
    } else {
      announce("Setup cleared — showing the global verdict.");
    }
    addAnchors();   // rebuilt sections lost their permalink "#" — re-add (idempotent)
  }
  function personalRisk(){
    if (!stackActive()){
      // The how-to lives in .setup-intro above the chips; this stays short.
      return el("div",{"class":"hint"}, "No setup picked — you're reading the global verdict.");
    }
    var pi = DATA.platform_impact || {};
    var ki = DATA.known_issues || [];
    var W = {none:0, low:1, medium:2, high:3};                 // platform-impact weight
    var SEVW = {critical:3, high:3, medium:2, low:1};          // severity → comparable weight
    var SEV_IMP = {critical:"high", high:"high", medium:"medium", low:"low"};  // → badge colour
    // A platform's *own* issues = those that explicitly name it. The blanket "all"
    // (cross-cutting) issues are deliberately excluded here so every channel doesn't
    // repeat the same IDs; they get one shared row below instead.
    function specificForPlat(k){
      return ki.filter(function(i){ return issuePlatforms(i).indexOf(k) >= 0; });
    }
    function issuesForComp(k){
      return ki.filter(function(i){ return issueComponents(i).indexOf(k) >= 0; });
    }
    // Cross-cutting issues that hit every platform/channel (tagged "all").
    var crossCutting = ki.filter(function(i){ return issuePlatforms(i).indexOf("all") >= 0; });
    var pickedPlats = stackPlatforms();

    var rows = [];
    pickedPlats.forEach(function(k){
      var lv = String(pi[k]||"none").toLowerCase(), m = PLAT_LABEL[k]||["globe",k];
      rows.push({kind:"plat", ic:m[0], label:m[1], w:(W[lv]||0),
                 badgeCls:"imp-"+lv, badgeTxt:(IMPACT[lv]||IMPACT.none).label, iss:specificForPlat(k)});
    });
    stackComponents().forEach(function(k){
      var iss = issuesForComp(k), worst = 0, wn = null, m = COMP_LABEL[k]||["build",k];
      iss.forEach(function(it){ var s = String(it.severity||"low").toLowerCase(), w = SEVW[s]||0; if (w>worst){ worst=w; wn=s; } });
      rows.push({kind:"comp", emoji:m[0], label:m[1], w:worst,
                 badgeCls: wn?("imp-"+SEV_IMP[wn]):"imp-none", badgeTxt: wn?(cap(wn)+" sev"):"Clear", iss:iss});
    });
    rows.sort(function(a,b){ return b.w-a.w || b.iss.length-a.iss.length; });

    var hot = rows.filter(function(r){ return r.w>=2; }).map(function(r){ return r.label; });

    // The per-setup VERDICT drives the tone + headline (and the badge below) so the copy
    // can never contradict the glyph — e.g. claim "spared" while still showing the global
    // Skip. See setupVerdict(): conservative, one-notch, fail-closed, never harsher.
    var svd = setupVerdict();
    var gv = VERDICTS[svd.global] || {label:String(svd.global||""), tone:"tone-warn"};
    var sv = VERDICTS[svd.rec] || {label:String(svd.rec||""), tone:"tone-warn"};
    var tone = sv.tone, head;
    if (svd.fresh){
      tone = gv.tone;
      head = "Too new to call for your stack — v"+(DATA.version||"")+" is a fresh release and "
           + "version-specific reports are still arriving, so we can't clear your setup yet. "
           + "Back up before updating.";
    } else if (svd.softened){
      head = "Lower risk for your stack — no corroborated blocking issue is confirmed to hit "
           + "what you run. The global “"+gv.label+"” verdict is driven by issues outside your "
           + "setup (or by reports without corroborating traction yet), so for you it eases to "
           + "“"+sv.label+".” Back up before updating anyway.";
    } else if (svd.blockers.length){
      head = "The “"+gv.label+"” verdict applies squarely to you — "
           + svd.blockers.length+" blocking "+(svd.blockers.length===1?"issue":"issues")
           + " hit "+(hot.length?hot.join(", "):"your stack")+" or every install.";
    } else {
      head = "Your stack looks clear for this release — this matches the global “"+gv.label+"” verdict.";
    }

    function issueLinks(items, n){
      var kids = [];
      items.slice(0,n).forEach(function(it,idx){
        if (idx) kids.push(document.createTextNode(", "));
        kids.push(el("a",{"class":"ilink", href:issueUrl(it.number)}, "#"+it.number));
      });
      if (items.length>n) kids.push(document.createTextNode(" +"+(items.length-n)+" more"));
      return kids;
    }

    var list = el("div",{"class":"prow-list"});
    rows.forEach(function(r){
      var badge = el("span",{"class":"pbadge "+r.badgeCls}, r.badgeTxt);
      var detail;
      if (r.iss.length){
        detail = el("span",{"class":"pdetail"}, issueLinks(r.iss, 5));
      } else if (r.kind==="plat" && r.w>=2){
        detail = el("span",{"class":"pdetail muted2"},
          crossCutting.length ? ("no "+r.label+"-specific issues — affected via the cross-cutting issues below")
                              : "rated from cross-cutting regressions — see Known issues below");
      } else {
        detail = el("span",{"class":"pdetail muted2"}, "clear this release");
      }
      list.appendChild(el("div",{"class":"prow"},[
        el("span",{"class":"ppn"}, [icon(r.ic,13), r.label]),
        badge, detail
      ]));
    });

    // One shared row for the issues tagged "all" — they hit every channel/platform,
    // so listing them once (instead of under each) keeps the per-platform rows distinct.
    // Cross-cutting issues hit every platform & channel, so show this row whenever the
    // user has picked ANY stack — previously gated on platforms only, so component-only
    // pickers never saw these core issues. Badge now carries worst severity + a count,
    // and the note flags how many are confirmed to affect the assessed version.
    if (stackActive() && crossCutting.length){
      var ccW = 0, ccN = null;
      crossCutting.forEach(function(it){ var s=String(it.severity||"low").toLowerCase(), w=SEVW[s]||0; if (w>ccW){ ccW=w; ccN=s; } });
      var ccLvl = ccN ? SEV_IMP[ccN] : "none";
      var ccAffV = crossCutting.filter(function(it){ return it.affects_version; }).length;
      list.appendChild(el("div",{"class":"prow prow-all"},[
        el("span",{"class":"ppn"}, [icon("globe",13), "All platforms & channels"]),
        el("span",{"class":"pbadge imp-"+ccLvl}, (IMPACT[ccLvl]||IMPACT.none).label+" · "+crossCutting.length),
        el("span",{"class":"pdetail"}, [el("span",{"class":"ccnote"}, "cross-cutting reports not tied to one OS or channel"+(ccAffV?(" ("+ccAffV+" affect v"+(DATA.version||"")+")"):"")+" — ")].concat(issueLinks(crossCutting, 5)))
      ]));
    }

    var badge = el("div",{"class":"sv"},[
      el("span",{"class":"sv-k"}, "For your setup"),
      el("span",{"class":"sv-em","aria-hidden":"true"}, svd.rec),
      el("span",{"class":"sv-l"}, sv.label),
      svd.softened ? el("span",{"class":"sv-note"}, "refined from “"+gv.label+"” (global)") : null
    ]);
    return el("div",{"class":"risk "+tone},[ badge, el("div",{"class":"rh"}, head), list ]);
  }

  // ── release-health trend (verdicts over time) ───────────────────────────────
  // ── Trends: 2×2 time-series charts from DATA.timeline (one point per ~6h run) ──
  // Shared SVG scaffold (viewBox coords; CSS scales width, height auto → no distortion).
  function chartSVG(){
    var W=340,H=150,r=10,b=24;
    return {svg:svgEl("svg",{"class":"tchart2", viewBox:"0 0 "+W+" "+H}), W:W,H:H, l:30,t:12,r:W-r,b:H-b};
  }
  function px(c,i,n){ return c.l+(c.r-c.l)*(n<=1?0.5:i/(n-1)); }
  function py(c,v,vmax){ return c.b-(c.b-c.t)*Math.min(v,vmax)/(vmax||1); }
  function gridY(c,vmax,ticks,unit){
    var g=svgEl("g",{"class":"tgrid"});
    for (var i=0;i<=ticks;i++){
      var v=vmax*i/ticks, y=c.b-(c.b-c.t)*i/ticks;
      g.appendChild(svgEl("line",{x1:c.l,x2:c.r,y1:y,y2:y}));
      var lab=svgEl("text",{"class":"taxis2", x:c.l-4, y:y+3, "text-anchor":"end"});
      lab.textContent = unit==="$" ? ("$"+v.toFixed(2)) : (unit==="s" ? (Math.round(v)+"s") : (unit==="%" ? (Math.round(v)+"%") : String(Math.round(v))));
      g.appendChild(lab);
    }
    c.svg.appendChild(g);
  }
  function plotLine(c,series,vmax,n,stroke,wd,fillArea,dash){
    var pts=series.map(function(v,i){ return px(c,i,n)+","+py(c,v,vmax); });
    if (fillArea) c.svg.appendChild(svgEl("polygon",{points:px(c,0,n)+","+c.b+" "+pts.join(" ")+" "+px(c,n-1,n)+","+c.b, fill:stroke, opacity:"0.13"}));
    var pl=svgEl("polyline",{points:pts.join(" "), fill:"none", stroke:stroke, "stroke-width":wd||2, "stroke-linejoin":"round","stroke-linecap":"round"});
    if (dash) pl.setAttribute("stroke-dasharray", dash);
    c.svg.appendChild(pl);
    c.svg.appendChild(svgEl("circle",{cx:px(c,n-1,n), cy:py(c,series[n-1],vmax), r:"3", fill:stroke}));
  }
  function tLegend(items){
    var lg=el("div",{"class":"tc-legend"});
    items.forEach(function(it){ lg.appendChild(el("span",{"class":"tc-k"},[ el("span",{"class":"tc-sw", style:"background:"+it[1]}), document.createTextNode(it[0]) ])); });
    return lg;
  }
  function tCard(title,sub,body){
    // Charts are unlabeled vector soup to assistive tech — expose the card's
    // title/subtitle as the chart's accessible name and hide the raw SVG geometry.
    if (body && body.querySelector){
      var cw = body.querySelector(".chartwrap");
      if (cw){
        cw.setAttribute("role","img");
        cw.setAttribute("aria-label", title + " chart — " + sub);
        var sv = cw.querySelector("svg");
        if (sv) sv.setAttribute("aria-hidden","true");
      }
    }
    return el("div",{"class":"tcard"},[ el("div",{"class":"tc-h"},[ el("span",{"class":"tc-t"},title), el("span",{"class":"tc-s"},sub) ]), body ]);
  }
  function tEmpty(){ return el("div",{"class":"tc-empty"}, "Collecting — fills in as runs accumulate"); }
  function wrapChart(c,legend){ return el("div",null,[ el("div",{"class":"chartwrap"}, c.svg), legend ]); }
  function maxOf(a){ return a.reduce(function(m,v){ return v>m?v:m; }, 0); }
  // The ledger tracks at most DATA.issues_cap issues per version (server-fed; older
  // payloads carry only the boolean, where the current list length IS the cap). A count
  // series pinned there is SATURATION, not a real plateau — the headline counters say
  // "60+", so the charts must not read as a precise flat 60.
  function issuesCap(){
    if (DATA.issues_cap) return DATA.issues_cap;
    return DATA.issues_capped ? (DATA.known_issues||[]).length : 0;
  }
  function capLine(c, capv, vmax){
    var y = py(c,capv,vmax);
    c.svg.appendChild(svgEl("line",{x1:c.l, x2:c.r, y1:y, y2:y,
      stroke:"var(--faint)", "stroke-width":1, "stroke-dasharray":"5 4", opacity:"0.9"}));
    var lab = svgEl("text",{"class":"taxis2 tcap", x:c.l+4, y:y-4});
    lab.textContent = "tracking cap ("+capv+")";
    c.svg.appendChild(lab);
  }

  function issuePressureChart(tl){
    var p=tl.filter(function(r){ return !(r.approx && !r.issues); });
    if (p.length<2) return tEmpty();
    var iss=p.map(function(r){return r.issues||0;}), reg=p.map(function(r){return r.regressions||0;});
    var vmax=Math.max(maxOf(iss.concat(reg))*1.15, 4), c=chartSVG(), n=p.length;
    var cap=issuesCap(), atCap=cap && iss[n-1]>=cap;
    gridY(c,vmax,3); plotLine(c,iss,vmax,n,"var(--accent)",2.5,true); plotLine(c,reg,vmax,n,"var(--orange)",2);
    if (cap && maxOf(iss)>=cap) capLine(c,cap,vmax);
    return wrapChart(c, tLegend([["known issues"+(atCap?" — "+cap+"+ at cap":""),"var(--accent)"],["regressions","var(--orange)"]]));
  }
  function severityChart(tl){
    var p=tl.filter(function(r){ return !(r.approx && !r.issues); });
    if (p.length<2) return tEmpty();
    var n=p.length, bands=[["low","var(--gray)"],["medium","var(--warn)"],["high","var(--orange)"],["critical","var(--bad)"]];
    var tot=p.map(function(r){ return r.issues || (r.critical+r.high+r.medium+r.low); });
    var vmax=Math.max(maxOf(tot)*1.1, 4);
    var c=chartSVG(); gridY(c,vmax,3);
    var cum=p.map(function(){return 0;});
    bands.forEach(function(band){
      var top=p.map(function(r,i){ return cum[i]+(r[band[0]]||0); });
      var up=top.map(function(v,i){ return px(c,i,n)+","+py(c,v,vmax); });
      var dn=cum.map(function(v,i){ return px(c,i,n)+","+py(c,v,vmax); }).reverse();
      c.svg.appendChild(svgEl("polygon",{points:up.concat(dn).join(" "), fill:band[1], opacity:"0.55"}));
      cum=top;
    });
    var cap=issuesCap();
    if (cap && maxOf(tot)>=cap) capLine(c,cap,vmax);
    return wrapChart(c, tLegend([["critical","var(--bad)"],["high","var(--orange)"],["medium","var(--warn)"],["low","var(--gray)"]]));
  }
  function verdictChart(tl){
    var p=tl.filter(function(r){ return !(r.approx && !r.issues); });  // same filter as siblings
    if (p.length<2) return tEmpty();
    var n=p.length, c=chartSVG();
    [[0,35,"var(--good)","update"],[35,70,"var(--warn)","care"],[70,100,"var(--bad)","skip"]].forEach(function(bd){
      var y1=py(c,bd[1],100), y2=py(c,bd[0],100);
      c.svg.appendChild(svgEl("rect",{x:c.l,y:y1,width:c.r-c.l,height:(y2-y1),fill:bd[2],opacity:"0.10"}));
      var lab=svgEl("text",{"class":"taxis2", x:c.r-2, y:(y1+y2)/2+3, "text-anchor":"end", fill:bd[2]}); lab.textContent=bd[3]; c.svg.appendChild(lab);
    });
    var risk=p.map(function(r){ return RISK[r.recommendation]||30; }), seq=[];
    for (var i=0;i<n;i++){ if(i) seq.push(px(c,i,n)+","+py(c,risk[i-1],100)); seq.push(px(c,i,n)+","+py(c,risk[i],100)); }
    c.svg.appendChild(svgEl("polyline",{points:seq.join(" "), fill:"none", stroke:"var(--accent)","stroke-width":2.5,"stroke-linejoin":"round","stroke-linecap":"round"}));
    for (var j=1;j<n;j++){ if (p[j].version!==p[j-1].version){ var mx=px(c,j,n); c.svg.appendChild(svgEl("line",{x1:mx,x2:mx,y1:c.t,y2:c.b,stroke:"var(--accent2)","stroke-width":1,"stroke-dasharray":"2 3",opacity:"0.7"})); } }
    c.svg.appendChild(svgEl("circle",{cx:px(c,n-1,n), cy:py(c,risk[n-1],100), r:"3", fill:"var(--accent)"}));
    return wrapChart(c, tLegend([["risk per run","var(--accent)"],["new version","var(--accent2)"]]));
  }
  function regressionShareChart(tl){
    // What fraction of known issues are post-release regressions (vs pre-existing)?
    var p=tl.filter(function(r){ return !(r.approx && !r.issues) && (r.issues||0)>0; });
    if (p.length<2) return tEmpty();
    var n=p.length, share=p.map(function(r){ return Math.round(100*(r.regressions||0)/(r.issues||1)); });
    var c=chartSVG(); gridY(c,100,4,"%");
    plotLine(c,share,100,n,"var(--orange)",2.5,true);
    return wrapChart(c, tLegend([["regressions ÷ known issues — "+share[n-1]+"%","var(--orange)"]]));
  }
  function trends(){
    var tl=(DATA.timeline||[]).slice();
    if (!tl.length) return null;
    tl.sort(function(a,b){ return String(a.t).localeCompare(String(b.t)); });
    tl = tl.slice(-30);
    var real = tl.filter(function(r){ return !r.approx; });
    // Hide the whole section until there are ≥3 real per-run points. The coarse
    // all-approx per-version fallback only ever drew near-empty charts (the chart
    // filters drop approx points with no issue counts), which read as placeholder noise.
    if (real.length < 3) return null;
    var s=el("div",{"class":"section", id:"trends"});
    s.appendChild(sectionHead("Trends", null, "tracked per assessment · adaptive cadence (8–24h)"));
    var grid=el("div",{"class":"trends-grid"});
    grid.appendChild(tCard("Issue pressure","open issues & regressions per run", issuePressureChart(tl)));
    grid.appendChild(tCard("Severity mix","make-up of known issues", severityChart(tl)));
    grid.appendChild(tCard("Verdict","risk per run · higher = riskier", verdictChart(tl)));
    grid.appendChild(tCard("Regression share","confirmed regressions as a share of known issues", regressionShareChart(tl)));
    s.appendChild(grid);
    return s;
  }

  // ── catching up: cumulative changelog since the user's version ──────────────
  function catchingUp(){
    var rh = (DATA.release_history || []).filter(function(r){ return r.version; });
    if (rh.length < 2) return null;
    rh.sort(function(a,b){ return String(b.published_at).localeCompare(String(a.published_at)); }); // newest first
    var s = el("div",{"class":"section", id:"catchup"});
    s.appendChild(sectionHead("Catching up?", null, "what's changed since your version"));
    var card = el("div",{"class":"catchup"});
    var sel = el("select",{"class":"cu-select", "aria-label":"your current version"});
    rh.forEach(function(r, idx){
      if (idx === 0) return;  // can't catch up FROM the newest release
      sel.appendChild(el("option",{value:r.version}, "v"+r.version));
    });
    card.appendChild(el("div",{"class":"cu-row"},[
      el("span",{"class":"cu-label"}, "I'm currently on"), sel
    ]));
    var out = el("div",{"class":"cu-out"});
    card.appendChild(out);

    function paint(fromVer){
      out.textContent = "";
      var fromIdx = rh.length;
      for (var k=0;k<rh.length;k++){ if (rh[k].version === fromVer){ fromIdx = k; break; } }
      var newer = rh.slice(0, fromIdx);   // every stable release newer than fromVer
      if (!newer.length){ out.appendChild(el("div",{"class":"empty"}, "You're on the latest stable — nothing to catch up on.")); return; }
      var totalH = newer.reduce(function(a,r){ return a + (r.highlights||[]).length; }, 0);
      out.appendChild(el("div",{"class":"cu-sum"},
        newer.length+" release"+(newer.length>1?"s":"")+" ahead · "+totalH+" highlight"+(totalH===1?"":"s")+" since v"+fromVer));
      newer.forEach(function(r){
        var ul = el("ul",{"class":"cu-list"});
        (r.highlights||[]).forEach(function(h){ ul.appendChild(el("li", null, linkify(h))); });
        if (!(r.highlights||[]).length) ul.appendChild(el("li",{"class":"empty"}, "(no highlights parsed for this release)"));
        out.appendChild(el("div",{"class":"cu-rel"},[
          el("div",{"class":"cu-rh"},[ el("span",{"class":"cu-ver"}, "v"+r.version), r.published_at ? el("span",{"class":"cu-date"}, " · "+r.published_at) : null ]),
          ul
        ]));
      });
    }
    sel.addEventListener("change", function(){ paint(sel.value); });
    paint(rh[1] && rh[1].version);   // default: everything since the release before the latest
    s.appendChild(card);
    return s;
  }

  // ── theme toggle ──────────────────────────────────────────────────────────
  function initTheme(){
    var btn = document.getElementById("theme-toggle");
    var saved = null;
    try { saved = localStorage.getItem("oc-theme"); } catch(e){}
    var prefersLight = (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches);
    var initial = saved || (prefersLight ? "light" : "dark");
    apply(initial);
    btn.addEventListener("click", function(){
      var next = document.documentElement.getAttribute("data-theme")==="light" ? "dark" : "light";
      apply(next);
      try { localStorage.setItem("oc-theme", next); } catch(e){}
    });
    function apply(t){
      document.documentElement.setAttribute("data-theme", t);
      btn.textContent = "";
      btn.appendChild(icon(t==="light" ? "moon" : "sun", 16));
      // keep the browser-chrome color in step with the manual toggle
      var mc = document.querySelector('meta[name="theme-color"]');
      if (mc) mc.setAttribute("content", t==="light" ? "#f6f7f9" : "#0b0d11");
    }
  }

  // ── freshness pill ────────────────────────────────────────────────────────
  function initFresh(){
    if (!DATA.assessed_at) return;
    var pill = document.getElementById("fresh");
    var txt = document.getElementById("fresh-text");
    var days = (Date.now() - new Date(DATA.assessed_at).getTime())/86400000;
    var tone = days < 2 ? "tone-good" : days < 7 ? "tone-warn" : "tone-bad";
    pill.className = "fresh " + tone;
    txt.textContent = "Updated " + timeAgo(DATA.assessed_at);
    pill.hidden = false;
  }

  // ── render ──────────────────────────────────────────────────────────────────
  // Rebuilds the page body from the current DATA. Safe to call more than once
  // (clears #app first) so the runtime-fetch path can re-render in place.
  // ── top-level long-tail tabs ────────────────────────────────────────────────
  // The decision content (verdict → setup → reasoning → known issues) stays a single
  // always-visible scroll; the secondary detail is grouped behind these tabs to cut
  // clutter without burying the verdict. SEO is unaffected — the crawlable answer is
  // the server-rendered <article> (render._seo_body), generated independently of this
  // client-side layout. Empty groups (e.g. gated-out Trends) drop their tab entirely.
  var activateLongTab = null;   // set below; lets scrollToHash() open a deep-linked section's tab
  function tabbedLongTail(){
    var groups = [
      {key:"impact",  label:"Impact",     build:[impact, triage]},
      {key:"new",     label:"What's new", build:[changes, catchingUp]},
      {key:"trends",  label:"Trends",     build:[trends]},
      {key:"history", label:"History",    build:[trackRecord, history]}
    ];
    var tablist = el("div",{"class":"ltabs", role:"tablist", "aria-label":"More detail"});
    var panelsWrap = el("div",{"class":"ltab-panels"});
    var tabs = [], pans = [];
    groups.forEach(function(g){
      var nodes = g.build.map(function(fn){ return fn(); }).filter(function(n){ return n; });
      if (!nodes.length) return;   // skip an empty group (e.g. Trends gated to ≥3 points)
      var panelId = "ltp-"+g.key, tabId = "ltt-"+g.key;
      var panel = el("div",{"class":"ltab-panel", id:panelId, role:"tabpanel",
                            "aria-labelledby":tabId, tabindex:"0"});
      nodes.forEach(function(n){ panel.appendChild(n); });
      var btn = el("button",{"class":"ltab", id:tabId, type:"button", role:"tab",
                             "aria-controls":panelId, "aria-selected":"false"}, g.label);
      btn.addEventListener("click", function(){ activate(btn); });
      tablist.appendChild(btn); panelsWrap.appendChild(panel);
      tabs.push(btn); pans.push(panel);
    });
    if (!tabs.length) return null;

    function activate(btn){
      tabs.forEach(function(t,i){
        var on = (t === btn);
        t.setAttribute("aria-selected", on ? "true" : "false");
        t.setAttribute("tabindex", on ? "0" : "-1");
        if (on){
          pans[i].removeAttribute("hidden");
          // sections in a freshly-shown panel never tripped the IntersectionObserver
          // (they had no layout while hidden) — reveal them directly.
          pans[i].querySelectorAll(".reveal").forEach(function(n){ n.classList.add("in"); });
        } else {
          pans[i].setAttribute("hidden","");
        }
      });
    }
    tablist.addEventListener("keydown", function(ev){
      var i = tabs.indexOf(document.activeElement);
      if (i < 0) return;
      var j = -1;
      if (ev.key === "ArrowRight" || ev.key === "ArrowDown") j = (i+1) % tabs.length;
      else if (ev.key === "ArrowLeft" || ev.key === "ArrowUp") j = (i-1+tabs.length) % tabs.length;
      else if (ev.key === "Home") j = 0;
      else if (ev.key === "End") j = tabs.length-1;
      if (j < 0) return;
      ev.preventDefault(); activate(tabs[j]); tabs[j].focus();
    });

    activate(tabs[0]);                        // first non-empty tab open by default
    activateLongTab = function(panel){        // open the tab that holds a deep-linked section
      var k = pans.indexOf(panel);
      if (k >= 0) activate(tabs[k]);
    };
    return el("div",{"class":"ltab-wrap"},[tablist, panelsWrap]);
  }

  function render(){
    app.textContent = "";
    if (!DATA || !DATA.recommendation){
      showError("The assessment data could not be loaded. The pipeline may not have run yet.");
      return;
    }
    var v = VERDICTS[DATA.recommendation] || {label:String(DATA.recommendation), tone:"tone-muted", blurb:""};
    // Page-level verdict-tinted backdrop glow. A data-* attr + dedicated --pglow var,
    // NOT a .tone-* class: a tone class on the body element would cascade --tone into
    // every component that relies on inheriting it from its own wrapper.
    // (No angle-bracket tag names in comments — the HTML smoke test counts them.)
    try { document.body.setAttribute("data-tone", v.tone.replace("tone-","")); } catch(e){}
    // Tab title stays the tidy static <title> — no version/verdict appended.
    // Order: lead with the decision-relevant content as one always-visible scroll
    // — verdict → your-setup → reasoning (why+sentiment → case) — then the long-tail
    // tab strip (Impact / What's new / Trends / History), and below it the Known
    // issues section (its own category-tab strip); footer stays at the bottom.
    [ lowConfBanner(), freshBanner(), hero(v), about(), bestVersion(), stats(),
      personalize(), thesis(), evidence(), flipConditions(),
      tabbedLongTail(),
      issues(),
      footer()
    ].forEach(function(node){ if (node) app.appendChild(node); });
    initFresh();
    revealOn();
    addAnchors();
  }
  function revealOn(){
    var items = app.querySelectorAll(".section, .stats, .bestver");
    // No IntersectionObserver → just show everything (never gate content on JS animation).
    if (!("IntersectionObserver" in window)){
      items.forEach(function(n){ n.classList.add("in"); });
      return;
    }
    // threshold:0 = reveal on the FIRST visible pixel. A fractional threshold (the old
    // 0.06) is unreachable-in-practice for very tall sections on a phone — the section's
    // max on-screen ratio is ~viewport/height, so a fast fling scrolls right past the
    // narrow band where it would fire, leaving the section stuck invisible. A small
    // positive bottom margin reveals a touch early and keeps page-bottom sections firing.
    var io = new IntersectionObserver(function(es){
      es.forEach(function(en){ if (en.isIntersecting){ en.target.classList.add("in"); io.unobserve(en.target); } });
    }, {rootMargin:"0px 0px 10% 0px", threshold:0});
    items.forEach(function(n){ n.classList.add("reveal"); io.observe(n); });
    // Safety net: nothing may stay invisible. After the above-the-fold animation has had
    // time to play, reveal anything still hidden (covers any observer miss on a fast fling).
    setTimeout(function(){
      app.querySelectorAll(".reveal:not(.in)").forEach(function(n){ io.unobserve(n); n.classList.add("in"); });
    }, 1800);
  }

  // ── permalinks: give each section a stable #id, an anchorable header, and
  // honor a deep-link hash once render() has built the sections. ───────────────
  function slugify(s){ return String(s||"").toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-+|-+$/g,"") || "section"; }
  function addAnchors(){
    app.querySelectorAll(".section").forEach(function(sec){
      var head = sec.querySelector(".sec-head"), title = sec.querySelector(".sec-title");
      if (!head || !title) return;
      var id = sec.id || slugify(title.textContent);
      sec.id = id;
      if (head.querySelector(".sec-anchor")) return;
      var a = el("a",{"class":"sec-anchor", title:"Copy link to this section",
                      "aria-label":"Permalink: "+title.textContent}, "#");
      a.setAttribute("href", "#"+id);   // in-page anchor — bypass el()'s external target=_blank
      a.addEventListener("click", function(){
        var url = location.origin + location.pathname + "#" + id;
        try { if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(url); } catch(e){}
        a.classList.add("copied"); a.textContent = "✓";
        setTimeout(function(){ a.classList.remove("copied"); a.textContent = "#"; }, 1200);
      });
      head.insertBefore(a, head.firstChild);
    });
  }
  function scrollToHash(){
    if (!location.hash || location.hash.length < 2) return;
    var t = null;
    try { t = document.getElementById(decodeURIComponent(location.hash.slice(1))); } catch(e){}
    if (t){
      var panel = t.closest ? t.closest(".ltab-panel") : null;
      if (panel && activateLongTab) activateLongTab(panel);   // open the tab holding the target
      t.scrollIntoView({behavior:"smooth", block:"start"});
      t.classList.add("tgt"); setTimeout(function(){ t.classList.remove("tgt"); }, 1800);
    }
  }

  // ── boot ──────────────────────────────────────────────────────────────────
  initTheme();
  DATA = parseInline();   // build-time copy: always present, renders instantly
  render();
  if (location.hash) setTimeout(scrollToHash, 60);   // honor a deep-link on load

  // Progressive enhancement: when latest.json is reachable (served pages, not
  // file://), refresh from it and re-render. Pure addition — any failure leaves
  // the already-rendered inline data on screen.
  if (window.fetch){
    fetch("latest.json", {cache:"no-store"})
      .then(function(r){ if (!r.ok) throw new Error("http "+r.status); return r.json(); })
      .then(function(d){
        if (!d || !d.recommendation) return;
        // Don't let a stale (e.g. intermediary-cached) latest.json downgrade a fresher
        // inline copy — and skip the swap when it's the SAME run (the served page's
        // inline copy already matches; a re-render would only reset open tabs,
        // expanded issue rows, and scroll-reveal state for zero visual change).
        var cur = (DATA && DATA.assessed_at) ? Date.parse(DATA.assessed_at) : 0;
        var nxt = d.assessed_at ? Date.parse(d.assessed_at) : 0;
        if (cur && nxt && nxt <= cur) return;
        DATA = d; render();
        if (location.hash) setTimeout(scrollToHash, 60);
      })
      .catch(function(){ /* keep the inlined data */ });
  }

  // Test hook (pure reads only): lets a headless test exercise the REAL per-setup verdict
  // logic — see tests/browser/per_setup_verdict.test.js — instead of a Python re-implementation
  // that could drift. No effect on the page; exposes nothing not already derivable from DATA.
  try {
    window.__perSetupTest = {
      setupVerdict: setupVerdict,
      setupBlockers: setupBlockers,
      keyVerdict: keyVerdict,
      setStack: function(keys){
        for (var k in STACK){ if (Object.prototype.hasOwnProperty.call(STACK,k)) delete STACK[k]; }
        (keys || []).forEach(function(k){ STACK[k] = true; });
      }
    };
  } catch(e){}
})();
</script>
</body>
</html>
