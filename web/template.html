<style>
/* ═══════════════════════════════════════════════════════════════════════════
   ClawStat.us — "status board / data-viz" design system
   Zero-dependency, dark/light, mobile-first. Inlined into template.html on ship.
   ═══════════════════════════════════════════════════════════════════════════ */

/* Self-hosted display font — Space Grotesk (variable, latin subset, ~22KB).
   No runtime CDN: the woff2 ships next to the page (web/fonts/), so the page
   stays offline/file:///CSP-safe. Headings only; body + numerals stay system/mono. */
@font-face{
  font-family:"Space Grotesk";
  font-style:normal; font-weight:300 700; font-display:swap;
  src:url(fonts/SpaceGrotesk-var.woff2) format("woff2");
}

:root{
  /* palette — dark (status-board: deep navy-slate, cyan data accent) */
  --bg:#080b12; --bg-elev:#0b0f18;
  --card:#101626; --card2:#141c2e; --card3:#18223a;
  --border:#1e2a42; --border2:#293954;
  --text:#e9eef7; --muted:#94a1b8; --faint:#5d6a82;
  --accent:#34d2e6; --accent2:#5b8cff;        /* cyan → blue data gradient */
  --good:#3fd07a; --warn:#e8b53a; --orange:#ff9446; --bad:#ff5d6c; --info:#5b9dff; --gray:#8794a8;
  --good-bg:rgba(63,208,122,.12); --warn-bg:rgba(232,181,58,.13);
  --bad-bg:rgba(255,93,108,.13); --info-bg:rgba(91,157,255,.13); --gray-bg:rgba(135,148,168,.12);
  --good-bd:rgba(63,208,122,.40); --warn-bd:rgba(232,181,58,.42);
  --bad-bd:rgba(255,93,108,.42); --info-bd:rgba(91,157,255,.42); --gray-bd:rgba(135,148,168,.34);

  /* type */
  --sans:ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --display:"Space Grotesk",ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,sans-serif;
  --mono:ui-monospace,"SFMono-Regular","SF Mono",Menlo,"JetBrains Mono",Consolas,monospace;

  /* radius / shadow / motion */
  --r-sm:8px; --r-md:12px; --r-lg:16px; --r-xl:22px;
  --shadow-1:0 1px 2px rgba(0,0,0,.4);
  --shadow-2:0 6px 24px -8px rgba(0,0,0,.55),0 1px 2px rgba(0,0,0,.4);
  --shadow-glow:0 0 0 1px var(--tone-bd),0 10px 40px -16px var(--tone);
  --ease:cubic-bezier(.4,.14,.3,1);
  --grid-line:rgba(120,150,200,.05);
}
html[data-theme="light"]{
  --bg:#eef1f7; --bg-elev:#e7ebf3;
  --card:#ffffff; --card2:#f6f8fc; --card3:#eef2f9;
  --border:#dce2ec; --border2:#cbd4e1;
  --text:#0f1726; --muted:#54627a; --faint:#8794a8;
  --accent:#0aa5c2; --accent2:#3b6df0;
  --good:#13a05a; --warn:#9a6b00; --orange:#c2540a; --bad:#d23048; --info:#2563eb; --gray:#64748b;
  --good-bg:rgba(19,160,90,.10); --warn-bg:rgba(154,107,0,.12);
  --bad-bg:rgba(210,48,72,.09); --info-bg:rgba(37,99,235,.10); --gray-bg:rgba(100,116,139,.10);
  --good-bd:rgba(19,160,90,.38); --warn-bd:rgba(154,107,0,.40);
  --bad-bd:rgba(210,48,72,.38); --info-bd:rgba(37,99,235,.36); --gray-bd:rgba(100,116,139,.30);
  --shadow-1:0 1px 2px rgba(15,23,38,.06);
  --shadow-2:0 10px 30px -12px rgba(15,23,38,.18),0 1px 2px rgba(15,23,38,.06);
  --grid-line:rgba(40,70,120,.05);
}

*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%; scroll-behavior:smooth}
body{
  font-family:var(--sans);
  background:var(--bg); color:var(--text);
  line-height:1.6; font-size:15px; letter-spacing:.01em; min-height:100vh;
  position:relative;
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
}
/* status-board backdrop: faint grid + two soft tonal glows */
body::before{
  content:""; position:fixed; inset:0; z-index:-2; pointer-events:none;
  background:
    linear-gradient(var(--grid-line) 1px,transparent 1px) 0 0/34px 34px,
    linear-gradient(90deg,var(--grid-line) 1px,transparent 1px) 0 0/34px 34px;
  mask-image:radial-gradient(120% 90% at 50% 0%,#000 35%,transparent 78%);
}
body::after{
  content:""; position:fixed; inset:0 0 auto 0; height:60vh; z-index:-3; pointer-events:none;
  background:
    radial-gradient(60% 60% at 12% 0%,color-mix(in srgb,var(--accent) 12%,transparent),transparent 70%),
    radial-gradient(55% 60% at 92% 4%,color-mix(in srgb,var(--accent2) 10%,transparent),transparent 70%);
}

.tone-good{--tone:var(--good);--tone-bg:var(--good-bg);--tone-bd:var(--good-bd)}
.tone-warn{--tone:var(--warn);--tone-bg:var(--warn-bg);--tone-bd:var(--warn-bd)}
.tone-bad{--tone:var(--bad);--tone-bg:var(--bad-bg);--tone-bd:var(--bad-bd)}
.tone-info{--tone:var(--info);--tone-bg:var(--info-bg);--tone-bd:var(--info-bd)}
.tone-muted{--tone:var(--gray);--tone-bg:var(--gray-bg);--tone-bd:var(--gray-bd)}

/* ── top bar ───────────────────────────────────────────────────────────── */
.topbar{
  position:sticky; top:0; z-index:30;
  display:flex; align-items:center; justify-content:space-between; gap:1rem;
  padding:.6rem clamp(1rem,4vw,2rem);
  background:color-mix(in srgb,var(--bg) 72%,transparent);
  backdrop-filter:saturate(150%) blur(14px);
  -webkit-backdrop-filter:saturate(150%) blur(14px);
  border-bottom:1px solid var(--border);
}
.brand{display:flex; align-items:center; gap:.6rem; font-weight:800; font-size:1.05rem; letter-spacing:-.02em}
.brand .logo{
  width:30px; height:30px; display:grid; place-items:center; color:var(--accent);
  border-radius:9px; background:var(--card2); border:1px solid var(--border2);
  box-shadow:inset 0 0 14px -6px var(--accent);
}
.brand .logo svg{display:block}
.brand .wm{font-family:var(--display)}
.brand .wm .dot{color:var(--accent)}
.brand .dim{
  font-family:var(--mono); font-weight:600; font-size:.66rem; letter-spacing:.14em;
  text-transform:uppercase; color:var(--muted);
  padding:.18rem .5rem; border-radius:999px; border:1px solid var(--border2); background:var(--card);
  margin-left:.15rem;
}
.bar-right{display:flex; align-items:center; gap:.55rem}
.fresh{
  display:inline-flex; align-items:center; gap:.4rem;
  font-size:.76rem; font-weight:700; padding:.32rem .7rem; border-radius:999px;
  background:var(--tone-bg); color:var(--tone); border:1px solid var(--tone-bd);
}
.fresh .dot{width:7px;height:7px;border-radius:50%;background:var(--tone); box-shadow:0 0 0 0 var(--tone); animation:pulse 2.4s var(--ease) infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 color-mix(in srgb,var(--tone) 55%,transparent)}70%{box-shadow:0 0 0 6px transparent}100%{box-shadow:0 0 0 0 transparent}}
.icon-btn{
  display:inline-flex; align-items:center; justify-content:center;
  width:34px;height:34px;border-radius:10px; cursor:pointer;
  background:var(--card); border:1px solid var(--border2); color:var(--text);
  font-size:.95rem; transition:.16s var(--ease);
}
.icon-btn:hover{background:var(--card2); border-color:var(--accent); transform:translateY(-1px)}

.wrap{max-width:1000px; margin:0 auto; padding:clamp(1.2rem,3.5vw,2.4rem) clamp(1rem,4vw,2rem) 5rem}

/* ── hero / status header ──────────────────────────────────────────────── */
.hero{
  position:relative; overflow:hidden;
  border:1px solid var(--border2); border-radius:var(--r-xl);
  background:
    radial-gradient(130% 130% at 0% 0%, var(--tone-bg), transparent 52%),
    linear-gradient(180deg,var(--card2),var(--card));
  padding:1.6rem 1.7rem; margin-bottom:1.1rem;
  box-shadow:var(--shadow-2);
  display:grid; grid-template-columns:1.35fr .95fr; gap:1.4rem 1.8rem;
}
.hero::before{content:""; position:absolute; left:0; top:0; bottom:0; width:5px; background:linear-gradient(var(--tone),transparent)}
.hero-main{min-width:0}
.eyebrow{
  display:inline-flex; align-items:center; gap:.5rem;
  font-family:var(--mono); font-size:.7rem; letter-spacing:.12em; text-transform:uppercase;
  color:var(--muted); font-weight:600;
}
.eyebrow::before{content:""; width:6px; height:6px; border-radius:50%; background:var(--tone); box-shadow:0 0 8px var(--tone)}
.hero-version{font-family:var(--display); font-size:clamp(1.6rem,4.6vw,2.3rem); font-weight:800; margin-top:.5rem; letter-spacing:-.03em; line-height:1.05}
.hero-version .vnum{font-family:var(--mono); color:var(--tone); font-weight:700}
.hero-sub{color:var(--muted); font-size:.84rem; margin-top:.3rem; font-family:var(--mono)}
.hero-sub .sep{opacity:.45; margin:0 .45rem}
.verdict{
  display:inline-flex; align-items:center; gap:.6rem; margin-top:1.25rem;
  font-family:var(--display); font-size:1.4rem; font-weight:800; letter-spacing:-.02em;
  padding:.7rem 1.15rem; border-radius:var(--r-md);
  background:var(--tone-bg); color:var(--tone); border:1px solid var(--tone-bd);
  box-shadow:inset 0 0 24px -14px var(--tone);
}
.verdict .em{font-size:1.5rem; line-height:1}
.verdict-blurb{margin-top:.85rem; color:var(--text); font-weight:600; font-size:1.02rem}
.hero-headline{margin-top:.5rem; color:var(--muted); font-size:.95rem; max-width:60ch}
.conf-row{display:flex; flex-wrap:wrap; gap:.5rem; margin-top:1.1rem; align-items:center}
.chip{
  display:inline-flex; align-items:center; gap:.4rem; font-size:.75rem; font-weight:600;
  padding:.34rem .72rem; border-radius:999px; border:1px solid var(--border2);
  background:var(--card3); color:var(--muted);
}
.chip b{color:var(--text); font-weight:700}
.chip.lvl-high{color:var(--good); border-color:var(--good-bd); background:var(--good-bg)}
.chip.lvl-medium{color:var(--warn); border-color:var(--warn-bd); background:var(--warn-bg)}
.chip.lvl-low{color:var(--bad); border-color:var(--bad-bd); background:var(--bad-bg)}

/* hero right column: the "signal panel" — confidence gauge + live mini-viz */
.signal{
  align-self:stretch; min-width:0;
  border:1px solid var(--border); border-radius:var(--r-lg);
  background:color-mix(in srgb,var(--bg-elev) 70%,transparent);
  padding:1rem 1.05rem; display:flex; flex-direction:column; gap:.95rem;
}
.signal .sg-h{font-family:var(--mono); font-size:.66rem; letter-spacing:.14em; text-transform:uppercase; color:var(--faint); font-weight:600}
/* confidence gauge */
.gauge{display:flex; flex-direction:column; gap:.4rem}
.gauge .g-top{display:flex; align-items:baseline; justify-content:space-between}
.gauge .g-val{font-family:var(--mono); font-weight:800; font-size:1.05rem; color:var(--tone)}
.gauge .g-lab{font-size:.74rem; color:var(--muted); font-weight:600}
.gauge .g-track{height:9px; border-radius:999px; background:var(--card3); overflow:hidden; border:1px solid var(--border)}
.gauge .g-fill{height:100%; border-radius:999px; background:linear-gradient(90deg,var(--tone),color-mix(in srgb,var(--tone) 55%,var(--accent))); box-shadow:0 0 12px -2px var(--tone); transition:width .8s var(--ease)}
/* signal: platform sparkbars */
.sigplat{display:grid; grid-template-columns:1fr 1fr; gap:.55rem .9rem}
.sigplat .sp{display:flex; align-items:center; gap:.5rem; min-width:0}
.sigplat .sp .ico{font-size:.85rem; width:1.1rem; text-align:center}
.sigplat .sp .nm{font-size:.74rem; color:var(--muted); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.sparkbar{display:flex; gap:2px; align-items:flex-end; height:14px}
.sparkbar i{width:4px; border-radius:1px; background:var(--ic,var(--gray)); opacity:.3}
.sparkbar i.on{opacity:1}
.imp-none{--ic:var(--good)} .imp-low{--ic:var(--info)} .imp-medium{--ic:var(--warn)} .imp-high{--ic:var(--bad)}
.cs-critical{--ic:var(--bad)} .cs-high{--ic:var(--bad)} .cs-medium{--ic:var(--warn)} .cs-low{--ic:var(--gray)}
/* severity colour ramp (worst-severity → colour): critical≠high≠medium≠low, distinct steps */
.sv-critical{--ic:var(--bad)} .sv-high{--ic:var(--orange)} .sv-medium{--ic:var(--warn)} .sv-low{--ic:var(--gray)} .sv-none{--ic:var(--good)}
/* signal: risk sparkline */
.sigtrend{display:flex; flex-direction:column; gap:.35rem}
.sigtrend svg{width:100%; height:42px; display:block; overflow:visible}
.sigtrend .cap{display:flex; justify-content:space-between; font-size:.68rem; color:var(--faint); font-family:var(--mono)}

/* ── low-confidence banner ─────────────────────────────────────────────── */
.banner{
  display:flex; gap:.7rem; align-items:flex-start; margin-bottom:1.1rem;
  padding:.9rem 1.05rem; border-radius:var(--r-md);
  background:var(--warn-bg); border:1px solid var(--warn-bd); color:var(--text); font-size:.88rem;
}
.banner .bi{font-size:1.1rem; line-height:1.3}

/* ── signal tiles (stats) ──────────────────────────────────────────────── */
.stats{display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:.8rem; margin-bottom:1.8rem}
.stat{
  position:relative; overflow:hidden;
  background:linear-gradient(180deg,var(--card2),var(--card));
  border:1px solid var(--border); border-radius:var(--r-md);
  padding:.95rem 1.05rem; box-shadow:var(--shadow-1);
  transition:transform .18s var(--ease), border-color .18s var(--ease);
}
.stat::before{content:""; position:absolute; left:0; top:0; right:0; height:2px; background:linear-gradient(90deg,var(--sc,var(--accent)),transparent)}
.stat:hover{transform:translateY(-2px); border-color:var(--border2)}
.stat .v{font-size:1.9rem; font-weight:800; font-family:var(--mono); line-height:1.05; color:var(--sc,var(--text))}
.stat .l{font-size:.72rem; color:var(--muted); margin-top:.25rem; text-transform:uppercase; letter-spacing:.05em; font-weight:700}
.stat .s{font-size:.74rem; color:var(--faint); margin-top:.15rem}

/* ── sections ──────────────────────────────────────────────────────────── */
.section{margin-top:2.2rem}
.reveal{opacity:0; transform:translateY(14px); transition:opacity .55s var(--ease), transform .55s var(--ease)}
.reveal.in{opacity:1; transform:none}
.sec-head{display:flex; align-items:baseline; gap:.6rem; margin-bottom:1rem; padding-bottom:.55rem; border-bottom:1px solid var(--border)}
.sec-title{font-family:var(--display); font-size:1.2rem; font-weight:800; letter-spacing:-.02em}
.sec-count{font-family:var(--mono); font-size:.78rem; color:var(--accent); font-weight:700; padding:.1rem .5rem; border:1px solid var(--border2); border-radius:999px; background:var(--card)}
.sec-note{font-size:.8rem; color:var(--muted); margin-left:auto; font-weight:500}

/* permalinks: anchorable section headers + deep-link target highlight */
.sec-head{position:relative}
.sec-anchor{position:absolute; left:-1.15em; top:0; font-family:var(--mono); font-weight:700; color:var(--faint); text-decoration:none; opacity:0; transition:opacity .15s var(--ease)}
.sec-head:hover .sec-anchor, .sec-anchor:focus-visible, .sec-anchor.copied{opacity:1}
.sec-anchor:hover{color:var(--accent)}
.sec-anchor.copied{color:var(--good)}
.section{scroll-margin-top:74px}
.section:target .sec-title, .section.tgt .sec-title{color:var(--accent)}
.section:target .sec-head, .section.tgt .sec-head{border-bottom-color:var(--accent)}

.prose{
  background:var(--card); border:1px solid var(--border); border-radius:var(--r-md);
  padding:1.2rem 1.3rem; font-size:.97rem; color:var(--text); box-shadow:var(--shadow-1);
}
.prose p{margin-bottom:.8rem} .prose p:last-child{margin-bottom:0}
.ilink{color:var(--accent); text-decoration:none; font-family:var(--mono); font-size:.92em; font-weight:600}
.ilink:hover{text-decoration:underline}

/* ── evidence ──────────────────────────────────────────────────────────── */
.ev-grid{display:grid; grid-template-columns:1fr 1fr; gap:.9rem}
@media(max-width:680px){.ev-grid{grid-template-columns:1fr}}
.ev-card{background:var(--card); border:1px solid var(--border); border-radius:var(--r-md); padding:1.1rem 1.2rem; box-shadow:var(--shadow-1)}
.ev-card h3{font-size:.8rem; text-transform:uppercase; letter-spacing:.05em; display:flex; align-items:center; gap:.45rem; margin-bottom:.75rem; font-weight:800}
.ev-for h3{color:var(--good)} .ev-against h3{color:var(--bad)} .ev-neutral h3{color:var(--muted)}
.ev-card ul{list-style:none; display:flex; flex-direction:column; gap:.6rem; max-height:17rem; overflow-y:auto; padding-right:.4rem}
.ev-card li{position:relative; padding-left:1.15rem; font-size:.9rem; color:var(--text)}
.ev-card li::before{content:""; position:absolute; left:0; top:.5em; width:7px; height:7px; border-radius:50%}
.ev-for li::before{background:var(--good)} .ev-against li::before{background:var(--bad)} .ev-neutral li::before{background:var(--gray)}
.ev-neutral{grid-column:1/-1}

/* ── filters / issues ──────────────────────────────────────────────────── */
.filters{display:flex; flex-wrap:wrap; gap:.45rem; margin-bottom:1rem}
.fbtn{
  font-size:.78rem; font-weight:600; padding:.34rem .82rem; border-radius:999px; cursor:pointer;
  background:var(--card); border:1px solid var(--border2); color:var(--muted); transition:.15s var(--ease);
}
.fbtn:hover{color:var(--text); border-color:var(--accent)}
.fbtn[aria-pressed="true"]{background:var(--accent); border-color:var(--accent); color:#04121a; font-weight:700}
.fcomp[aria-pressed="true"]{background:var(--accent2); border-color:var(--accent2)}
.fsep{display:inline-flex; align-items:center; margin-left:.35rem; padding-left:.5rem; border-left:1px solid var(--border2);
  font-size:.64rem; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--faint)}
.issue{
  display:flex; gap:.9rem; align-items:flex-start;
  background:var(--card); border:1px solid var(--border); border-left-width:3px; border-radius:var(--r-md);
  padding:.85rem 1rem; margin-bottom:.6rem; box-shadow:var(--shadow-1); transition:border-color .15s var(--ease), transform .15s var(--ease)}
.issue:hover{transform:translateX(2px); border-color:var(--border2)}
.issue.sev-critical{border-left-color:var(--bad); border-left-width:4px}
.issue.sev-high{border-left-color:var(--bad)}
.issue.sev-medium{border-left-color:var(--warn)}
.issue.sev-low{border-left-color:var(--gray)}
.issue .num{font-family:var(--mono); font-size:.82rem; font-weight:700; color:var(--accent); text-decoration:none; white-space:nowrap; padding-top:.05rem}
.issue .num:hover{text-decoration:underline}
.issue .body{flex:1; min-width:0}
.issue .title{font-weight:600; font-size:.93rem}
.issue .tags{display:flex; flex-wrap:wrap; gap:.35rem; margin-top:.5rem}
.tag{
  display:inline-flex; align-items:center; gap:.3rem; font-size:.71rem; font-weight:600;
  padding:.2rem .55rem; border-radius:999px; border:1px solid var(--border2);
  background:var(--card3); color:var(--muted);
}
.tag.t-bad{color:var(--bad); border-color:var(--bad-bd); background:var(--bad-bg)}
.tag.t-warn{color:var(--warn); border-color:var(--warn-bd); background:var(--warn-bg)}
.tag.t-good{color:var(--good); border-color:var(--good-bd); background:var(--good-bg)}
.tag.t-info{color:var(--accent); border-color:var(--info-bd); background:var(--info-bg)}
.tag.t-plat{color:var(--text); border-color:var(--border2); background:var(--card2); font-weight:700}
.tag.t-comp{color:var(--accent2); font-weight:700; border-color:color-mix(in srgb,var(--accent2) 38%,transparent); background:color-mix(in srgb,var(--accent2) 13%,transparent)}
.issue.mine{border-color:var(--info-bd); box-shadow:0 0 0 1px var(--info-bd), var(--shadow-1)}
.tag.t-me{color:var(--accent); border-color:var(--info-bd); background:var(--info-bg)}

/* ── tabs (changes) ────────────────────────────────────────────────────── */
.tabs{display:flex; gap:.4rem; margin-bottom:1rem; flex-wrap:wrap}
.tab{
  font-size:.83rem; font-weight:600; padding:.42rem .95rem; border-radius:10px; cursor:pointer;
  background:var(--card); border:1px solid var(--border2); color:var(--muted); transition:.15s var(--ease);
  display:inline-flex; align-items:center; gap:.45rem;
}
.tab:hover{color:var(--text)}
.tab[aria-selected="true"]{background:var(--card3); color:var(--text); border-color:var(--accent)}
.tab .cnt{font-family:var(--mono); font-size:.74rem; background:var(--bg-elev); padding:.05rem .42rem; border-radius:6px; color:var(--muted)}

details.triage{background:var(--card); border:1px solid var(--border); border-radius:var(--r-md); box-shadow:var(--shadow-1); overflow:hidden}

.tl .tlv{font-weight:700; font-family:var(--mono); font-size:.92rem}

.setup .chips{display:flex; flex-wrap:wrap; align-items:center; gap:.45rem; margin-bottom:.9rem}

<script>
(function(){
  "use strict";

  // ── data source ──────────────────────────────────────────────────────────
  // DATA comes from one of two places: the inlined assessment-data JSON block
  // (the build-time copy, always present) and, when reachable, a runtime
  // fetch('latest.json'). The page renders from the inline copy instantly, then
  // re-renders if latest.json brings fresher data — so a data refresh doesn't need
  // a full HTML rebuild, while offline / file:// viewing still works from inline.
  var DATA = null;
  function parseInline(){
    try { return JSON.parse(document.getElementById("assessment-data").textContent); }
    catch (e) { return null; }
  }

  var app = document.getElementById("app");

  function showError(msg){
    app.textContent = "";
    var box = el("div", {"class":"errbox"}, [
      el("h2", null, "Assessment unavailable"),
      el("p", null, msg)
    ]);
    app.appendChild(box);
  }

  // ── tiny safe DOM helper ─────────────────────────────────────────────────
  function el(tag, props, kids){
    var n = document.createElement(tag);
    if (props) for (var k in props){
      if (!Object.prototype.hasOwnProperty.call(props,k)) continue;
      var val = props[k];
      if (val == null) continue;
      if (k === "class") n.className = val;
      else if (k === "href"){
        var u = safeUrl(val);
        if (u){ n.setAttribute("href", u); n.setAttribute("target","_blank"); n.setAttribute("rel","noopener noreferrer"); }
      }
      else n.setAttribute(k, val);
    }
    if (kids != null){
      if (!Array.isArray(kids)) kids = [kids];
      for (var i=0;i<kids.length;i++){
        var c = kids[i];
        if (c == null) continue;
        n.appendChild(typeof c === "object" ? c : document.createTextNode(String(c)));
      }
    }
    return n;
  }
  function safeUrl(u){
    if (!u) return "";
    var s = String(u).trim();
    if (/^(javascript|data|vbscript):/i.test(s)) return "";
    return s;
  }
  function issueUrl(n){ return "https://github.com/openclaw/openclaw/issues/" + n; }

  // turn "#91035" inside prose into a github link
  function linkify(text){
    var out = [], re = /#(\d{3,})/g, last = 0, m;
    text = String(text || "");
    while ((m = re.exec(text))){
      if (m.index > last) out.push(document.createTextNode(text.slice(last, m.index)));
      out.push(el("a", {"class":"ilink", href: issueUrl(m[1])}, "#" + m[1]));
      last = re.lastIndex;
    }
    if (last < text.length) out.push(document.createTextNode(text.slice(last)));
    return out;
  }

  function timeAgo(iso){
    var t = new Date(iso); if (isNaN(t)) return "";
    var s = (Date.now() - t.getTime())/1000;
    if (s < 0) s = 0;
    var d = Math.floor(s/86400);
    if (d >= 1) return d + (d===1?" day ago":" days ago");
    var h = Math.floor(s/3600); if (h >= 1) return h + "h ago";
    var mn = Math.floor(s/60); return mn + "m ago";
  }
  function fmtDate(iso){
    if (!iso) return "";
    var d = new Date(iso); if (isNaN(d)) return String(iso).slice(0,10);
    return d.toLocaleDateString(undefined,{year:"numeric",month:"short",day:"numeric"});
  }
  function cap(s){ s = String(s||""); return s.charAt(0).toUpperCase()+s.slice(1); }

  // ── lookup tables ─────────────────────────────────────────────────────────
  var VERDICTS = {
    "✅": {label:"Update now",              tone:"tone-good", blurb:"Safe to update — no blocking issues found in this release."},
    "⚠️": {label:"Update with precautions", tone:"tone-warn", blurb:"Worthwhile, but back up first — some real risk remains."},
    "⏸️": {label:"Skip this version",       tone:"tone-bad",  blurb:"Hold off — the open issues outweigh the benefits right now."},
    "🔄": {label:"Wait for next release",   tone:"tone-info", blurb:"Hold for the next stable — a pre-release is in the works, but its fixes aren't confirmed yet."}
  };
  var CAT = {
    regression:    {icon:"🔄", label:"Regression",      cls:"t-bad"},
    post_release:  {icon:"🔶", label:"Post-release",     cls:"t-warn"},
    diamond_lobster:{icon:"💎", label:"Diamond Lobster", cls:"t-info"},
    active:        {icon:"🟢", label:"Active",          cls:"t-warn"}
  };
  var PLAT = [
    ["windows","🪟","Windows"],["macos","🍎","macOS"],["linux","🐧","Linux"],
    ["discord","💬","Discord"],["slack","💼","Slack"],["telegram","✈️","Telegram"]
  ];
  var PLAT_LABEL = {}; PLAT.forEach(function(p){ PLAT_LABEL[p[0]] = [p[1], p[2]]; });
  // Components = which subsystem of OpenClaw an issue touches (orthogonal to platforms).
  var COMP = [
    ["gateway","🛰️","Gateway"],["models","🧠","Models"],["memory","🗂️","Memory"],
    ["sessions","🧵","Sessions"],["auth","🔐","Auth"],["channels","📡","Channels"],
    ["plugins","🧩","Plugins"],["agents","🤖","Agents"],["tasks","⏱️","Tasks"],
    ["tools","🔧","Tools"],["build","📦","Build"]
  ];
  var COMP_LABEL = {}; COMP.forEach(function(c){ COMP_LABEL[c[0]] = [c[1], c[2]]; });
  // Components come pre-derived in DATA (render side); just normalize to known keys.
  function issueComponents(i){
    var raw = (i && i.components) || [], out = [];
    if (Array.isArray(raw)) raw.forEach(function(c){
      c = String(c||"").toLowerCase(); if (COMP_LABEL[c] && out.indexOf(c)<0) out.push(c);
    });
    return out;
  }
  var IMPACT = {none:{label:"None",w:10},low:{label:"Low",w:38},medium:{label:"Medium",w:68},high:{label:"High",w:100}};

  // ── meter scale: encode BOTH facts the data carries — how MUCH (volume → bar
  // length) and how BAD (worst severity → colour). A graded scale so the worst
  // platforms/components stand out even when every one is "bad".
  var SEVW = {critical:4, high:3, medium:2, low:1};
  function worstSeverity(issues){
    var w = 0, name = "none";
    issues.forEach(function(it){
      var s = String((it&&it.severity)||"low").toLowerCase(), sw = SEVW[s]||0;
      if (sw > w){ w = sw; name = s; }
    });
    return {name:name, w:w};
  }
  // Issues hitting a platform = its own tag OR a cross-cutting "all" issue.
  function platformIssues(k, ki){
    return ki.filter(function(i){ var ps = issuePlatforms(i); return ps.indexOf(k)>=0 || ps.indexOf("all")>=0; });
  }
  function componentIssues(k, ki){
    return ki.filter(function(i){ return issueComponents(i).indexOf(k) >= 0; });
  }
  // Lit segments (0..segs), proportional to count/max with a floor of 1 when non-zero.
  function volFill(count, max, segs){
    if (!count) return 0;
    if (max <= 0) return 1;
    return Math.max(1, Math.min(segs, Math.round(count / max * segs)));
  }
  function issueWord(n){ return n + (n === 1 ? " issue" : " issues"); }

  // ── personalization: the user's platform/channel "stack" (localStorage) ──
  // A plain { key:true } set; render() reads it so a re-render re-applies the
  // highlights consistently. Toggling a chip just saves + re-renders.
  var STACK = {};
  (function(){
    try {
      var saved = JSON.parse(localStorage.getItem("oc-stack")) || [];
      for (var i=0;i<saved.length;i++) STACK[saved[i]] = true;
    } catch(e){}
  })();
  function stackKeys(){ var a=[]; for (var k in STACK){ if (Object.prototype.hasOwnProperty.call(STACK,k) && STACK[k]) a.push(k); } return a; }
  function stackActive(){ return stackKeys().length > 0; }
  // The stack mixes platform keys and component keys (disjoint sets); split by membership.
  function stackPlatforms(){ return stackKeys().filter(function(k){ return PLAT_LABEL[k]; }); }
  function stackComponents(){ return stackKeys().filter(function(k){ return COMP_LABEL[k]; }); }
  function saveStack(){ try { localStorage.setItem("oc-stack", JSON.stringify(stackKeys())); } catch(e){} }
  // Title keyword match — the FALLBACK for issues with no analyst `platforms` tag.
  var STACK_MATCH = {
    windows:/windows|win32|\.exe|powershell/i,
    macos:/macos|mac os|imessage|\bios\b|apple|darwin/i,
    linux:/linux|docker|systemd|ubuntu|debian|cgroup/i,
    discord:/discord/i,
    slack:/slack/i,
    telegram:/telegram/i
  };
  var PLAT_KEYS = {windows:1,macos:1,linux:1,discord:1,slack:1,telegram:1,all:1};
  // Surfaces an issue hits: prefer the analyst's structured `platforms`; if absent
  // (pre-structured assessments), fall back to the title keyword heuristic.
  function issuePlatforms(i){
    var out = [], raw = i && i.platforms;
    if (Array.isArray(raw)){
      raw.forEach(function(p){ p=String(p||"").toLowerCase(); if (PLAT_KEYS[p] && out.indexOf(p)<0) out.push(p); });
    }
    if (out.length) return out;
    var title = String((i && i.title) || "");
    for (var k in STACK_MATCH){ if (STACK_MATCH[k].test(title)) out.push(k); }
    return out;
  }
  // Does this issue touch the user's stack? Matches any selected platform (or a
  // cross-cutting "all" issue when platforms are picked) OR any selected component.
  function issueHitsStack(i){
    if (!stackActive()) return false;
    var ps = issuePlatforms(i), selP = stackPlatforms();
    if (selP.length){
      if (ps.indexOf("all") >= 0) return true;
      for (var j=0;j<selP.length;j++){ if (ps.indexOf(selP[j]) >= 0) return true; }
    }
    var cs = issueComponents(i), selC = stackComponents();
    for (var m=0;m<selC.length;m++){ if (cs.indexOf(selC[m]) >= 0) return true; }
    return false;
  }
  // Risk height (%) per verdict for the release-health trend — taller = riskier.
  var RISK = {"✅":18,"⚠️":52,"🔄":74,"⏸️":100};

  // ── sections ──────────────────────────────────────────────────────────────
  function sectionHead(title, count, note){
    return el("div",{"class":"sec-head"},[
      el("h2",{"class":"sec-title"}, title),
      count != null ? el("span",{"class":"sec-count"}, count) : null,
      note ? el("span",{"class":"sec-note"}, note) : null
    ]);
  }

  // Confidence is categorical; map to an approximate gauge value.
  var CONF_PCT = {high:92, medium:64, low:34};
  function signalPanel(v){
    var conf = String(DATA.confidence||"medium").toLowerCase();
    var pct = CONF_PCT[conf] != null ? CONF_PCT[conf] : 50;
    var gauge = el("div",{"class":"gauge "+v.tone},[
      el("div",{"class":"g-top"},[
        el("span",{"class":"g-lab"},"Verdict confidence"),
        el("span",{"class":"g-val"}, cap(conf))
      ]),
      el("div",{"class":"g-track"},[ el("div",{"class":"g-fill", style:"width:"+pct+"%"}, null) ])
    ]);
    // Platform glance: bar height = issue volume, colour = worst severity (same
    // scale as the "Platform impact" section), derived from the issue tags.
    var ki = DATA.known_issues || [];
    var stat = {}, maxCount = 0, rows = [];
    PLAT.forEach(function(p){
      var iss = platformIssues(p[0], ki);
      if (!iss.length) return;
      stat[p[0]] = {count:iss.length, worst:worstSeverity(iss).name};
      if (iss.length > maxCount) maxCount = iss.length;
      rows.push(p);
    });
    rows.sort(function(a,b){ return stat[b[0]].count - stat[a[0]].count; });
    var grid = el("div",{"class":"sigplat"});
    rows.slice(0,6).forEach(function(p){
      var a = stat[p[0]];
      grid.appendChild(el("div",{"class":"sp sv-"+a.worst},[
        el("span",{"class":"ico"}, p[1]),
        el("span",{"class":"nm"}, p[2]),
        sparkbar(volFill(a.count, maxCount, 5))
      ]));
    });
    var kids = [ el("div",{"class":"sg-h"},"Confidence"), gauge ];
    if (rows.length){ kids.push(el("div",{"class":"sg-h"},"Platform impact")); kids.push(grid); }
    var spark = riskSparkline();
    if (spark){ kids.push(el("div",{"class":"sg-h"},"Risk trend")); kids.push(spark); }
    return el("div",{"class":"signal"}, kids);
  }
  function sparkbar(on){   // `on` = number of lit bars (0..5); colour inherited via --ic
    var bar = el("span",{"class":"sparkbar"});
    for (var i=0;i<5;i++){ bar.appendChild(el("i",{"class": i<on?"on":"", style:"height:"+(5+i*2)+"px"}, null)); }
    return bar;
  }
  var SVGNS = "http://www.w3.org/2000/svg";
  function svgEl(name, attrs){
    var n = document.createElementNS(SVGNS, name);
    if (attrs) for (var k in attrs){ if (Object.prototype.hasOwnProperty.call(attrs,k) && attrs[k]!=null) n.setAttribute(k, attrs[k]); }
    return n;
  }
  function riskSparkline(){
    var h = (DATA.version_history||[]).slice();
    if (h.length < 2) return null;
    h.sort(function(a,b){ return String(a.assessed_at).localeCompare(String(b.assessed_at)); });
    h = h.slice(-12);
    var W=200, H=42, n=h.length, pad=3;
    var xs=function(i){ return pad + (n===1?0:i*((W-2*pad)/(n-1))); };
    var ys=function(r){ return (H-pad) - (r/100)*(H-2*pad); };
    var pts = h.map(function(e,i){ return xs(i)+","+ys(RISK[e.recommendation]||30); });
    var svg = svgEl("svg",{viewBox:"0 0 "+W+" "+H, preserveAspectRatio:"none"});
    svg.appendChild(svgEl("polygon",{points: xs(0)+","+(H-pad)+" "+pts.join(" ")+" "+xs(n-1)+","+(H-pad), fill:"var(--tone-bg)"}));
    svg.appendChild(svgEl("polyline",{points: pts.join(" "), fill:"none", stroke:"var(--tone)", "stroke-width":"2", "stroke-linejoin":"round", "stroke-linecap":"round"}));
    svg.appendChild(svgEl("circle",{cx:xs(n-1), cy:ys(RISK[h[n-1].recommendation]||30), r:"3", fill:"var(--tone)"}));
    var wrap = el("div",{"class":"sigtrend"});
    wrap.appendChild(svg);
    wrap.appendChild(el("div",{"class":"cap"},[ el("span",null,"v"+h[0].version), el("span",null,"now") ]));
    return wrap;
  }
  function hero(v){
    var rel = DATA.latest_release || {}, npm = DATA.npm || {};
    var sub = [];
    if (rel.published_at) sub.push("Released " + fmtDate(rel.published_at));
    if (npm.version) sub.push("npm " + npm.version);
    var subNodes = [];
    sub.forEach(function(s,i){
      if (i) subNodes.push(el("span",{"class":"sep"},"·"));
      subNodes.push(document.createTextNode(s));
    });

    var conf = String(DATA.confidence||"medium").toLowerCase();
    var pre = DATA.latest_prerelease || {};
    var chips = [
      el("span",{"class":"chip lvl-"+conf},[document.createTextNode("Confidence: "), el("b",null,cap(conf))]),
      el("span",{"class":"chip"},[document.createTextNode("Assessed "), el("b",null,timeAgo(DATA.assessed_at))])
    ];
    if (pre.tag) chips.push(el("span",{"class":"chip"},[el("b",null,"Pre-release "+pre.tag)," available"]));

    var main = el("div",{"class":"hero-main"},[
      el("div",{"class":"eyebrow"},"Release assessment"),
      el("div",{"class":"hero-version"},["OpenClaw ", el("span",{"class":"vnum"},"v"+(DATA.version||"?"))]),
      el("div",{"class":"hero-sub"}, subNodes),
      el("div",{"class":"verdict "+v.tone},[el("span",{"class":"em"},DATA.recommendation||"?"), document.createTextNode(v.label)]),
      el("div",{"class":"verdict-blurb"}, v.blurb),
      DATA.headline ? el("div",{"class":"hero-headline"}, DATA.headline) : null,
      el("div",{"class":"conf-row"}, chips)
    ]);
    return el("div",{"class":"hero "+v.tone},[ main, signalPanel(v) ]);
  }

  function lowConfBanner(){
    if (String(DATA.confidence||"").toLowerCase() !== "low") return null;
    return el("div",{"class":"banner"},[
      el("span",{"class":"bi"},"⚠️"),
      el("span",null,"This assessment was made with low confidence — the underlying data may be incomplete. Treat the verdict as a weak signal and verify against the linked issues before deciding.")
    ]);

  function stats(){
    var ki = DATA.known_issues || [];
    var ch = DATA.changes || {};
    var regs = ki.filter(function(i){return i.category==="regression";}).length;
    var severe = ki.filter(function(i){return i.severity==="high"||i.severity==="critical";}).length;

  function issueCard(i){
    var sev = String(i.severity||"medium");
    var mine = issueHitsStack(i);
    var cat = CAT[i.category] || {icon:"📋",label:cap(i.category||"issue"),cls:""};
    var tags = [ el("span",{"class":"tag "+cat.cls},[cat.icon+" "+cat.label]) ];
    // System(s) this issue hits — analyst-tagged, heuristic fallback (see issuePlatforms).
    var ips = issuePlatforms(i);
    if (ips.indexOf("all") >= 0){
      tags.push(el("span",{"class":"tag t-plat"}, "🌐 All platforms"));
    } else {
      ips.slice(0,4).forEach(function(pk){
        var meta = PLAT_LABEL[pk];
        if (meta) tags.push(el("span",{"class":"tag t-plat"}, meta[0]+" "+meta[1]));
      });
    }
    // Component pills — which subsystem of OpenClaw this issue touches.
    issueComponents(i).forEach(function(ck){
      var cm = COMP_LABEL[ck];
      if (cm) tags.push(el("span",{"class":"tag t-comp"}, cm[0]+" "+cm[1]));
    });
    if (i.affects_version){
      tags.push(el("span",{"class":"tag t-bad"}, "⊘ affects this version"));
    }
    var dec = i.clawsweeper_decision;
    if (dec && dec!=="unknown"){
      tags.push(el("span",{"class":"tag "+(dec==="keep_open"?"t-warn":"t-good")}, (dec==="keep_open"?"⊙ keep open":"✓ "+dec)));
    }
    if (i.fixed_in){

    } else if (i.category==="regression" || i.category==="post_release"){
      tags.push(el("span",{"class":"tag t-bad"}, "● unfixed"));
    }
    if (i.reactions){
      tags.push(el("span",{"class":"tag"}, "👍 "+i.reactions));
    }
    var sevCls = (sev==="critical"||sev==="high")?"t-bad":(sev==="medium"?"t-warn":"");
    tags.push(el("span",{"class":"tag "+sevCls}, sev+" severity"));
    if (i.first_seen) tags.push(el("span",{"class":"tag"}, "tracked "+timeAgo(i.first_seen)));
    if (mine) tags.unshift(el("span",{"class":"tag t-me"}, "★ your stack"));
    if (i.is_new) tags.unshift(el("span",{"class":"tag t-good"}, "🆕 new"));

  function issues(){
    var ki = (DATA.known_issues||[]).slice();
    if (!ki.length) return null;
    var order = {critical:0,high:1,medium:2,low:3};
    var catOrder = {regression:0,post_release:1,diamond_lobster:2,active:3};
    function rank(map,key){ return (key in map) ? map[key] : 9; }  // NB: 0 is falsy, don't use ||
    ki.sort(function(a,b){
      var s = rank(order,a.severity) - rank(order,b.severity);
      if (s) return s;
      return rank(catOrder,a.category) - rank(catOrder,b.category);
    });
    var s = el("div",{"class":"section", id:"issues"});
    var newCount = ki.filter(function(i){return i.is_new;}).length;
    s.appendChild(sectionHead("Known issues", ki.length,
      (newCount ? ("🆕 "+newCount+" new since last run · ") : "")+"critical first"));

    var cats = {};
    ki.forEach(function(i){ if(i.category) cats[i.category]=(cats[i.category]||0)+1; });
    var filters = el("div",{"class":"filters"});
    var allBtn = el("button",{"class":"fbtn", type:"button", "aria-pressed":"true", "data-f":"all"}, "All ("+ki.length+")");
    filters.appendChild(allBtn);
    Object.keys(cats).forEach(function(c){
      var meta = CAT[c]||{icon:"📋",label:cap(c)};
      filters.appendChild(el("button",{"class":"fbtn", type:"button", "aria-pressed":"false", "data-f":c}, meta.icon+" "+meta.label+" ("+cats[c]+")"));
    });
    if (stackActive()){

      filters.appendChild(el("button",{"class":"fbtn", type:"button", "aria-pressed":"false", "data-f":"mine"}, "★ My stack ("+mineN+")"));
    }
    // Component filters — one chip per subsystem present, in taxonomy order.
    var compCounts = {};
    ki.forEach(function(i){ issueComponents(i).forEach(function(c){ compCounts[c]=(compCounts[c]||0)+1; }); });
    var compKeys = COMP.map(function(c){return c[0];}).filter(function(k){ return compCounts[k]; });
    if (compKeys.length){
      filters.appendChild(el("span",{"class":"fsep"}, "subsystem"));
      compKeys.forEach(function(k){
        var m = COMP_LABEL[k];
        filters.appendChild(el("button",{"class":"fbtn fcomp", type:"button", "aria-pressed":"false", "data-f":"comp:"+k},
          m[0]+" "+m[1]+" ("+compCounts[k]+")"));
      });
    }
    s.appendChild(filters);

    var list = el("div",{"class":"issue-list"});
    ki.forEach(function(i){ list.appendChild(issueCard(i)); });
    s.appendChild(list);

    filters.addEventListener("click", function(ev){
      var btn = ev.target.closest(".fbtn"); if(!btn) return;
      var f = btn.getAttribute("data-f");
      filters.querySelectorAll(".fbtn").forEach(function(b){ b.setAttribute("aria-pressed", b===btn?"true":"false"); });
      list.querySelectorAll(".issue").forEach(function(row){
        var show;
        if (f==="all") show = true;
        else if (f==="mine") show = row.getAttribute("data-mine")==="1";
        else if (f.indexOf("comp:")===0) show = (row.getAttribute("data-comp")||"").split(" ").indexOf(f.slice(5)) >= 0;
        else show = row.getAttribute("data-cat")===f;
        row.style.display = show ? "" : "none";
      });
    });
    return s;
  }

  // Component health — which subsystems this release hits. Bar length = issue volume,
  // colour = worst severity (so a 6-critical hot spot reads louder than a 1-high blip).
  function componentHealth(){
    var ki = DATA.known_issues || [];
    var agg = {};
    ki.forEach(function(i){
      var sv = String(i.severity||"low").toLowerCase(), w = SEVW[sv]||0;
      issueComponents(i).forEach(function(c){
        var a = agg[c] || (agg[c] = {count:0, regr:0, worst:"low", w:0});
        a.count++;
        if (i.category==="regression") a.regr++;
        if (w > a.w){ a.w = w; a.worst = sv; }
      });
    });
    var keys = Object.keys(agg);
    if (!keys.length) return null;
    var maxCount = 0; keys.forEach(function(k){ if (agg[k].count > maxCount) maxCount = agg[k].count; });
    keys.sort(function(a,b){ return agg[b].count-agg[a].count || agg[b].w-agg[a].w; });  // hot spots first
    var s = el("div",{"class":"section", id:"components"});
    s.appendChild(sectionHead("Component health", null, "bar = issue volume · colour = worst severity"));
    var SEG = 5;
    var g = el("div",{"class":"plat-grid"});
    keys.forEach(function(k){
      var a = agg[k], meta = COMP_LABEL[k] || ["📦", cap(k)], mine = !!STACK[k];
      var on = volFill(a.count, maxCount, SEG);
      var seg = el("div",{"class":"seg"});
      for (var j=0;j<SEG;j++){ seg.appendChild(el("i",{"class": j<on?"on":""}, null)); }
      var sub = issueWord(a.count) + (a.regr? " · "+a.regr+" regr" : "");
      g.appendChild(el("div",{"class":"plat sv-"+a.worst+(mine?" you":"")},[
        el("div",{"class":"ph"},[
          el("span",{"class":"pn"}, [document.createTextNode(meta[0]+" "), el("span",{"class":"pname"}, meta[1]), mine?el("span",{"class":"me"}," ★you"):null])
        ]),
        el("div",{"class":"pmeter"},[ seg, el("span",{"class":"pl"}, sub) ])
      ]));
    });
    s.appendChild(g);
    return s;
  }

  // ── best version to run (from the verdict history) ──────────────────────────
  function bestVersion(){
    var h = (DATA.version_history||[]).slice();
    if (!h.length) return null;
    h.sort(function(a,b){ return String(b.assessed_at).localeCompare(String(a.assessed_at)); });
    var SAFE = {"✅":1,"⚠️":1};                 // "safe to run" verdicts
    var curSafe = SAFE[DATA.recommendation];
    var arch = {}; (DATA.archived_versions||[]).forEach(function(v){ arch[v]=1; });
    var best = null;
    for (var i=0;i<h.length;i++){ if (h[i].version!==DATA.version && SAFE[h[i].recommendation]){ best = h[i]; break; } }
    var tone, bi, body;
    if (curSafe){
      tone="tone-good"; bi="✅";
      body = [el("b",null,"You're on the safest version."),
              document.createTextNode(" v"+(DATA.version||"")+" is the latest and it's cleared to run.")];
    } else if (best){
      tone="tone-info"; bi="↩️";
      var vl = arch[best.version]
        ? el("a",{"class":"snap", href:"archive/"+encodeURIComponent(best.version)+".html", title:"View the verdict for v"+best.version}, "v"+best.version)
        : el("b",null,"v"+best.version);
      var bl = (VERDICTS[best.recommendation]||{label:""}).label.toLowerCase();
      body = [el("b",null,"Safest version to run now: "), vl,
              document.createTextNode(" — the most recent release that was cleared"+(bl?(" ("+bl+")"):"")+". Hold here until the latest is fixed.")];
    } else {
      tone="tone-warn"; bi="⏳";
      body = [el("b",null,"No recently-cleared version."),
              document.createTextNode(" None of the tracked releases earned an update-now verdict yet — wait for a clean one.")];
    }
    return el("div",{"class":"bestver "+tone},[el("span",{"class":"bi"},bi), el("div",null,body)]);
  }

  // Toggling the stack only affects three sections. Update them in place (no
  // #app teardown) so the page doesn't flash, scroll holds, and other sections'
  // state (catch-up version, changes tab, issue filter) is preserved.
  function applyStack(){
    var setup = document.getElementById("setup");
    if (setup){
      setup.querySelectorAll(".pick").forEach(function(b){
        b.setAttribute("aria-pressed", STACK[b.getAttribute("data-k")] ? "true" : "false");
      });
      var risk = setup.querySelector(".risk, .hint");
      if (risk) risk.parentNode.replaceChild(personalRisk(), risk);
    }
    var oldI = document.getElementById("issues");
    if (oldI){
      var af = oldI.querySelector('.fbtn[aria-pressed="true"]');
      af = af ? af.getAttribute("data-f") : "all";
      var freshI = issues();
      if (freshI){
        oldI.parentNode.replaceChild(freshI, oldI);
        if (af && af !== "all"){
          var b = freshI.querySelector('.fbtn[data-f="'+af+'"]');
          if (b) b.click();   // re-apply the previously active filter (else stays "all")
        }
      }
    }
    var oldP = document.getElementById("platforms");
    if (oldP){ var fp = platforms(); if (fp) oldP.parentNode.replaceChild(fp, oldP); }
    var oldC = document.getElementById("components");
    if (oldC){ var fc = componentHealth(); if (fc) oldC.parentNode.replaceChild(fc, oldC); }
    addAnchors();   // rebuilt sections lost their permalink "#" — re-add (idempotent)
  }
  function personalRisk(){
    if (!stackActive()){
      return el("div",{"class":"hint"}, "Pick the platforms, channels, and OpenClaw components you rely on — your stack's issues get highlighted and the read below is tuned to it (saved on this device).");
    }
    var pi = DATA.platform_impact || {};
    var ki = DATA.known_issues || [];
    var W = {none:0, low:1, medium:2, high:3};                 // platform-impact weight
    var SEVW = {critical:3, high:3, medium:2, low:1};          // severity → comparable weight
    var SEV_IMP = {critical:"high", high:"high", medium:"medium", low:"low"};  // → badge colour
    // A platform's *own* issues = those that explicitly name it. The blanket "all"
    // (cross-cutting) issues are deliberately excluded here so every channel doesn't
    // repeat the same IDs; they get one shared row below instead.
    function specificForPlat(k){
      return ki.filter(function(i){ return issuePlatforms(i).indexOf(k) >= 0; });
    }
    function issuesForComp(k){
      return ki.filter(function(i){ return issueComponents(i).indexOf(k) >= 0; });
    }
    // Cross-cutting issues that hit every platform/channel (tagged "all").
    var crossCutting = ki.filter(function(i){ return issuePlatforms(i).indexOf("all") >= 0; });
    var pickedPlats = stackPlatforms();

    var rows = [];
    pickedPlats.forEach(function(k){
      var lv = String(pi[k]||"none").toLowerCase(), m = PLAT_LABEL[k]||["?",k];
      rows.push({kind:"plat", emoji:m[0], label:m[1], w:(W[lv]||0),
                 badgeCls:"imp-"+lv, badgeTxt:(IMPACT[lv]||IMPACT.none).label, iss:specificForPlat(k)});
    });
    stackComponents().forEach(function(k){
      var iss = issuesForComp(k), worst = 0, wn = null, m = COMP_LABEL[k]||["?",k];
      iss.forEach(function(it){ var s = String(it.severity||"low").toLowerCase(), w = SEVW[s]||0; if (w>worst){ worst=w; wn=s; } });
      rows.push({kind:"comp", emoji:m[0], label:m[1], w:worst,
                 badgeCls: wn?("imp-"+SEV_IMP[wn]):"imp-none", badgeTxt: wn?(cap(wn)+" sev"):"Clear", iss:iss});
    });
    rows.sort(function(a,b){ return b.w-a.w || b.iss.length-a.iss.length; });

    var worst = rows.length ? rows[0].w : 0;
    var hot = rows.filter(function(r){ return r.w>=2; }).map(function(r){ return r.label; });
    var verdict = (VERDICTS[DATA.recommendation]||{label:String(DATA.recommendation||"")}).label;
    var tone, head;
    if (worst>=3){ tone="tone-bad";
      head = "Your stack takes the brunt — "+hot.join(", ")+" "+(hot.length>1?"are":"is")+" among the hardest hit, so the “"+verdict+"” verdict applies squarely to you."; }
    else if (worst===2){ tone="tone-warn";
      head = "Moderate risk for your stack — "+hot.join(", ")+" show real exposure; weigh the “"+verdict+"” verdict accordingly."; }
    else { tone="tone-good";
      head = "Your stack looks largely spared — the issues behind the “"+verdict+"” verdict mostly land elsewhere."; }

    function issueLinks(items, n){
      var kids = [];
      items.slice(0,n).forEach(function(it,idx){
        if (idx) kids.push(document.createTextNode(", "));
        kids.push(el("a",{"class":"ilink", href:issueUrl(it.number)}, "#"+it.number));
      });
      if (items.length>n) kids.push(document.createTextNode(" +"+(items.length-n)+" more"));
      return kids;
    }

    var list = el("div",{"class":"prow-list"});
    rows.forEach(function(r){
      var badge = el("span",{"class":"pbadge "+r.badgeCls}, r.badgeTxt);
      var detail;
      if (r.iss.length){
        detail = el("span",{"class":"pdetail"}, issueLinks(r.iss, 5));
      } else if (r.kind==="plat" && r.w>=2){
        detail = el("span",{"class":"pdetail muted2"},
          crossCutting.length ? ("no "+r.label+"-specific issues — affected via the cross-cutting issues below")
                              : "rated from cross-cutting regressions — see Known issues below");
      } else {
        detail = el("span",{"class":"pdetail muted2"}, "clear this release");
      }
      list.appendChild(el("div",{"class":"prow"},[
        el("span",{"class":"ppn"}, r.emoji+" "+r.label),
        badge, detail
      ]));
    });

    // One shared row for the issues tagged "all" — they hit every channel/platform,
    // so listing them once (instead of under each) keeps the per-platform rows distinct.
    if (pickedPlats.length && crossCutting.length){
      var ccW = 0, ccN = null;
      crossCutting.forEach(function(it){ var s=String(it.severity||"low").toLowerCase(), w=SEVW[s]||0; if (w>ccW){ ccW=w; ccN=s; } });
      var ccLvl = ccN ? SEV_IMP[ccN] : "none";
      list.appendChild(el("div",{"class":"prow prow-all"},[
        el("span",{"class":"ppn"}, "🌐 All platforms & channels"),
        el("span",{"class":"pbadge imp-"+ccLvl}, (IMPACT[ccLvl]||IMPACT.none).label),
        el("span",{"class":"pdetail"}, [el("span",{"class":"ccnote"}, "core issues that hit every OS and channel — "), ].concat(issueLinks(crossCutting, 5)))
      ]));
    }

    return el("div",{"class":"risk "+tone},[ el("div",{"class":"rh"}, head), list ]);
  }

  // ── release-health trend (verdicts over time) ───────────────────────────────
  // ── Trends: 2×2 time-series charts from DATA.timeline (one point per ~6h run) ──
  // Shared SVG scaffold (viewBox coords; CSS scales width, height auto → no distortion).
  function chartSVG(){
    var W=340,H=150,r=10,b=24;
    return {svg:svgEl("svg",{"class":"tchart2", viewBox:"0 0 "+W+" "+H}), W:W,H:H, l:30,t:12,r:W-r,b:H-b};
  }
  function px(c,i,n){ return c.l+(c.r-c.l)*(n<=1?0.5:i/(n-1)); }
  function py(c,v,vmax){ return c.b-(c.b-c.t)*Math.min(v,vmax)/(vmax||1); }
  function gridY(c,vmax,ticks,unit){
    var g=svgEl("g",{"class":"tgrid"});
    for (var i=0;i<=ticks;i++){
      var v=vmax*i/ticks, y=c.b-(c.b-c.t)*i/ticks;
      g.appendChild(svgEl("line",{x1:c.l,x2:c.r,y1:y,y2:y}));
      var lab=svgEl("text",{"class":"taxis2", x:c.l-4, y:y+3, "text-anchor":"end"});
      lab.textContent = unit==="$" ? ("$"+v.toFixed(2)) : (unit==="s" ? (Math.round(v)+"s") : (unit==="%" ? (Math.round(v)+"%") : String(Math.round(v))));
      g.appendChild(lab);
    }
    c.svg.appendChild(g);
  }
  function plotLine(c,series,vmax,n,stroke,wd,fillArea,dash){
    var pts=series.map(function(v,i){ return px(c,i,n)+","+py(c,v,vmax); });
    if (fillArea) c.svg.appendChild(svgEl("polygon",{points:px(c,0,n)+","+c.b+" "+pts.join(" ")+" "+px(c,n-1,n)+","+c.b, fill:stroke, opacity:"0.13"}));
    var pl=svgEl("polyline",{points:pts.join(" "), fill:"none", stroke:stroke, "stroke-width":wd||2, "stroke-linejoin":"round","stroke-linecap":"round"});
    if (dash) pl.setAttribute("stroke-dasharray", dash);
    c.svg.appendChild(pl);
    c.svg.appendChild(svgEl("circle",{cx:px(c,n-1,n), cy:py(c,series[n-1],vmax), r:"3", fill:stroke}));
  }
  function tLegend(items){
    var lg=el("div",{"class":"tc-legend"});
    items.forEach(function(it){ lg.appendChild(el("span",{"class":"tc-k"},[ el("span",{"class":"tc-sw", style:"background:"+it[1]}), document.createTextNode(it[0]) ])); });
    return lg;
  }
  function tCard(title,sub,body){
    return el("div",{"class":"tcard"},[ el("div",{"class":"tc-h"},[ el("span",{"class":"tc-t"},title), el("span",{"class":"tc-s"},sub) ]), body ]);
  }
  function tEmpty(){ return el("div",{"class":"tc-empty"}, "Collecting — fills in as runs accumulate"); }
  function wrapChart(c,legend){ return el("div",null,[ el("div",{"class":"chartwrap"}, c.svg), legend ]); }
  function maxOf(a){ return a.reduce(function(m,v){ return v>m?v:m; }, 0); }

  function issuePressureChart(tl){
    var p=tl.filter(function(r){ return !(r.approx && !r.issues); });
    if (p.length<2) return tEmpty();
    var iss=p.map(function(r){return r.issues||0;}), reg=p.map(function(r){return r.regressions||0;});
    var vmax=Math.max(maxOf(iss.concat(reg))*1.15, 4), c=chartSVG(), n=p.length;
    gridY(c,vmax,3); plotLine(c,iss,vmax,n,"var(--accent)",2.5,true); plotLine(c,reg,vmax,n,"var(--orange)",2);
    return wrapChart(c, tLegend([["known issues","var(--accent)"],["regressions","var(--orange)"]]));
  }
  function severityChart(tl){
    var p=tl.filter(function(r){ return !(r.approx && !r.issues); });
    if (p.length<2) return tEmpty();
    var n=p.length, bands=[["low","var(--gray)"],["medium","var(--warn)"],["high","var(--orange)"],["critical","var(--bad)"]];
    var vmax=Math.max(maxOf(p.map(function(r){ return r.issues || (r.critical+r.high+r.medium+r.low); }))*1.1, 4);
    var c=chartSVG(); gridY(c,vmax,3);
    var cum=p.map(function(){return 0;});
    bands.forEach(function(band){
      var top=p.map(function(r,i){ return cum[i]+(r[band[0]]||0); });
      var up=top.map(function(v,i){ return px(c,i,n)+","+py(c,v,vmax); });
      var dn=cum.map(function(v,i){ return px(c,i,n)+","+py(c,v,vmax); }).reverse();
      c.svg.appendChild(svgEl("polygon",{points:up.concat(dn).join(" "), fill:band[1], opacity:"0.55"}));
      cum=top;
    });
    return wrapChart(c, tLegend([["critical","var(--bad)"],["high","var(--orange)"],["medium","var(--warn)"],["low","var(--gray)"]]));
  }
  function verdictChart(tl){
    var p=tl.filter(function(r){ return !(r.approx && !r.issues); });  // same filter as siblings
    if (p.length<2) return tEmpty();
    var n=p.length, c=chartSVG();
    [[0,35,"var(--good)","update"],[35,63,"var(--warn)","care"],[63,88,"var(--info)","wait"],[88,100,"var(--bad)","skip"]].forEach(function(bd){
      var y1=py(c,bd[1],100), y2=py(c,bd[0],100);
      c.svg.appendChild(svgEl("rect",{x:c.l,y:y1,width:c.r-c.l,height:(y2-y1),fill:bd[2],opacity:"0.10"}));
      var lab=svgEl("text",{"class":"taxis2", x:c.r-2, y:(y1+y2)/2+3, "text-anchor":"end", fill:bd[2]}); lab.textContent=bd[3]; c.svg.appendChild(lab);
    });
    var risk=p.map(function(r){ return RISK[r.recommendation]||30; }), seq=[];
    for (var i=0;i<n;i++){ if(i) seq.push(px(c,i,n)+","+py(c,risk[i-1],100)); seq.push(px(c,i,n)+","+py(c,risk[i],100)); }
    c.svg.appendChild(svgEl("polyline",{points:seq.join(" "), fill:"none", stroke:"var(--accent)","stroke-width":2.5,"stroke-linejoin":"round","stroke-linecap":"round"}));
    for (var j=1;j<n;j++){ if (p[j].version!==p[j-1].version){ var mx=px(c,j,n); c.svg.appendChild(svgEl("line",{x1:mx,x2:mx,y1:c.t,y2:c.b,stroke:"var(--accent2)","stroke-width":1,"stroke-dasharray":"2 3",opacity:"0.7"})); } }
    c.svg.appendChild(svgEl("circle",{cx:px(c,n-1,n), cy:py(c,risk[n-1],100), r:"3", fill:"var(--accent)"}));
    return wrapChart(c, tLegend([["risk per run","var(--accent)"],["new version","var(--accent2)"]]));
  }
  function regressionShareChart(tl){
    // What fraction of known issues are post-release regressions (vs pre-existing)?
    var p=tl.filter(function(r){ return !(r.approx && !r.issues) && (r.issues||0)>0; });
    if (p.length<2) return tEmpty();
    var n=p.length, share=p.map(function(r){ return Math.round(100*(r.regressions||0)/(r.issues||1)); });
    var c=chartSVG(); gridY(c,100,4,"%");
    plotLine(c,share,100,n,"var(--orange)",2.5,true);
    return wrapChart(c, tLegend([["regressions ÷ known issues — "+share[n-1]+"%","var(--orange)"]]));
  }
  function trends(){
    var tl=(DATA.timeline||[]).slice();
    if (!tl.length) return null;
    tl.sort(function(a,b){ return String(a.t).localeCompare(String(b.t)); });
    tl = tl.slice(-30);
    var real = tl.filter(function(r){ return !r.approx; });
    // Real per-run points need ≥3 before a line means anything — two near-simultaneous
    // seed points just draw a flat line that reads as placeholder data. The coarse
    // per-version fallback (all-approx, one point per release) is a genuine trend at ≥2.
    var enough = real.length ? real.length >= 3 : tl.length >= 2;
    var s=el("div",{"class":"section", id:"trends"});
    s.appendChild(sectionHead("Trends", null, "tracked every run · about every 6 hours"));
    if (!enough){   // show the section but explain the wait rather than a misleading line
      var n = real.length || tl.length;
      s.appendChild(el("div",{"class":"tcard"},[ el("div",{"class":"tc-empty"},
        "Charts populate as runs accumulate (about every 6 hours). Tracking "+n+
        " run"+(n===1?"":"s")+" so far — check back after the next one.") ]));
      return s;
    }
    var grid=el("div",{"class":"trends-grid"});
    grid.appendChild(tCard("Issue pressure","open issues & regressions per run", issuePressureChart(tl)));
    grid.appendChild(tCard("Severity mix","make-up of known issues", severityChart(tl)));
    grid.appendChild(tCard("Verdict","risk per run · higher = riskier", verdictChart(tl)));
    grid.appendChild(tCard("Regression share","confirmed regressions as a share of known issues", regressionShareChart(tl)));
    s.appendChild(grid);
    return s;
  }

  // ── catching up: cumulative changelog since the user's version ──────────────
  function catchingUp(){
    var rh = (DATA.release_history || []).filter(function(r){ return r.version; });
    if (rh.length < 2) return null;
    rh.sort(function(a,b){ return String(b.published_at).localeCompare(String(a.published_at)); }); // newest first
    var s = el("div",{"class":"section", id:"catchup"});
    s.appendChild(sectionHead("Catching up?", null, "what's changed since your version"));
    var card = el("div",{"class":"catchup"});
    var sel = el("select",{"class":"cu-select", "aria-label":"your current version"});
    rh.forEach(function(r, idx){
      if (idx === 0) return;  // can't catch up FROM the newest release
      sel.appendChild(el("option",{value:r.version}, "v"+r.version));
    });
    card.appendChild(el("div",{"class":"cu-row"},[
      el("span",{"class":"cu-label"}, "I'm currently on"), sel
    ]));
    var out = el("div",{"class":"cu-out"});
    card.appendChild(out);

    function paint(fromVer){
      out.textContent = "";
      var fromIdx = rh.length;
      for (var k=0;k<rh.length;k++){ if (rh[k].version === fromVer){ fromIdx = k; break; } }
      var newer = rh.slice(0, fromIdx);   // every stable release newer than fromVer
      if (!newer.length){ out.appendChild(el("div",{"class":"empty"}, "You're on the latest stable — nothing to catch up on.")); return; }
      var totalH = newer.reduce(function(a,r){ return a + (r.highlights||[]).length; }, 0);
      out.appendChild(el("div",{"class":"cu-sum"},
        newer.length+" release"+(newer.length>1?"s":"")+" ahead · "+totalH+" highlight"+(totalH===1?"":"s")+" since v"+fromVer));
      newer.forEach(function(r){
        var ul = el("ul",{"class":"cu-list"});
        (r.highlights||[]).forEach(function(h){ ul.appendChild(el("li", null, linkify(h))); });
        if (!(r.highlights||[]).length) ul.appendChild(el("li",{"class":"empty"}, "(no highlights parsed for this release)"));
        out.appendChild(el("div",{"class":"cu-rel"},[
          el("div",{"class":"cu-rh"},[ el("span",{"class":"cu-ver"}, "v"+r.version), r.published_at ? el("span",{"class":"cu-date"}, " · "+r.published_at) : null ]),
          ul
        ]));
      });
    }
    sel.addEventListener("change", function(){ paint(sel.value); });
    paint(rh[1] && rh[1].version);   // default: everything since the release before the latest
    s.appendChild(card);
    return s;
  }

  // ── theme toggle ──────────────────────────────────────────────────────────
  function initTheme(){
    var btn = document.getElementById("theme-toggle");
    var saved = null;
    try { saved = localStorage.getItem("oc-theme"); } catch(e){}
    var prefersLight = (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches);
    var initial = saved || (prefersLight ? "light" : "dark");
    apply(initial);
    btn.addEventListener("click", function(){
      var next = document.documentElement.getAttribute("data-theme")==="light" ? "dark" : "light";
      apply(next);
      try { localStorage.setItem("oc-theme", next); } catch(e){}
    });
    function apply(t){
      document.documentElement.setAttribute("data-theme", t);
      btn.textContent = t==="light" ? "🌙" : "☀️";
    }
  }

  // ── freshness pill ────────────────────────────────────────────────────────
  function initFresh(){
    if (!DATA.assessed_at) return;
    var pill = document.getElementById("fresh");
    var txt = document.getElementById("fresh-text");
    var days = (Date.now() - new Date(DATA.assessed_at).getTime())/86400000;
    var tone = days < 2 ? "tone-good" : days < 7 ? "tone-warn" : "tone-bad";
    pill.className = "fresh " + tone;
    txt.textContent = "Updated " + timeAgo(DATA.assessed_at);
    pill.hidden = false;
  }

  // ── render ──────────────────────────────────────────────────────────────────
  // Rebuilds the page body from the current DATA. Safe to call more than once
  // (clears #app first) so the runtime-fetch path can re-render in place.
  function render(){
    app.textContent = "";
    if (!DATA || !DATA.recommendation){
      showError("The assessment data could not be loaded. The pipeline may not have run yet.");
      return;
    }
    var v = VERDICTS[DATA.recommendation] || {label:String(DATA.recommendation), tone:"tone-muted", blurb:""};
    // Tab title stays the tidy static <title> — no version/verdict appended.
    // Order: lead with the decision-relevant content — verdict → your-setup →
    // reasoning (why + case) → known issues — then the derived summaries (the
    // platform/component meters), the changelog, and the long-tail trends/history.
    [ lowConfBanner(), hero(v), bestVersion(), stats(),
      personalize(), thesis(), evidence(), issues(),
      platforms(), componentHealth(), changes(), catchingUp(),
      sentiment(), trends(), triage(), history(), footer()
    ].forEach(function(node){ if (node) app.appendChild(node); });
    initFresh();
    revealOn();
    addAnchors();
  }
  function revealOn(){
    if (!("IntersectionObserver" in window)) return;
    var io = new IntersectionObserver(function(es){
      es.forEach(function(en){ if (en.isIntersecting){ en.target.classList.add("in"); io.unobserve(en.target); } });
    }, {rootMargin:"0px 0px -8% 0px", threshold:0.06});
    app.querySelectorAll(".section, .stats, .bestver").forEach(function(n){ n.classList.add("reveal"); io.observe(n); });
  }

  // ── permalinks: give each section a stable #id, an anchorable header, and
  // honor a deep-link hash once render() has built the sections. ───────────────
  function slugify(s){ return String(s||"").toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-+|-+$/g,"") || "section"; }
  function addAnchors(){
    app.querySelectorAll(".section").forEach(function(sec){
      var head = sec.querySelector(".sec-head"), title = sec.querySelector(".sec-title");
      if (!head || !title) return;
      var id = sec.id || slugify(title.textContent);
      sec.id = id;
      if (head.querySelector(".sec-anchor")) return;
      var a = el("a",{"class":"sec-anchor", title:"Copy link to this section",
                      "aria-label":"Permalink: "+title.textContent}, "#");
      a.setAttribute("href", "#"+id);   // in-page anchor — bypass el()'s external target=_blank
      a.addEventListener("click", function(){
        var url = location.origin + location.pathname + "#" + id;
        try { if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(url); } catch(e){}
        a.classList.add("copied"); a.textContent = "✓";
        setTimeout(function(){ a.classList.remove("copied"); a.textContent = "#"; }, 1200);
      });
      head.insertBefore(a, head.firstChild);
    });
  }
  function scrollToHash(){
    if (!location.hash || location.hash.length < 2) return;
    var t = null;
    try { t = document.getElementById(decodeURIComponent(location.hash.slice(1))); } catch(e){}
    if (t){
      t.scrollIntoView({behavior:"smooth", block:"start"});
      t.classList.add("tgt"); setTimeout(function(){ t.classList.remove("tgt"); }, 1800);
    }
  }

  // ── boot ──────────────────────────────────────────────────────────────────
  initTheme();
  DATA = parseInline();   // build-time copy: always present, renders instantly
  render();
  if (location.hash) setTimeout(scrollToHash, 60);   // honor a deep-link on load

  // Progressive enhancement: when latest.json is reachable (served pages, not
  // file://), refresh from it and re-render. Pure addition — any failure leaves
  // the already-rendered inline data on screen.
  if (window.fetch){
    fetch("latest.json", {cache:"no-store"})
      .then(function(r){ if (!r.ok) throw new Error("http "+r.status); return r.json(); })
      .then(function(d){ if (d && d.recommendation){ DATA = d; render(); if (location.hash) setTimeout(scrollToHash, 60); } })
      .catch(function(){ /* keep the inlined data */ });
  }
})();
</script>
</body>
