<!--SEO-HEAD-->
<style>
/* ═══════════════════════════════════════════════════════════════════════════
   ClawStat.us — "status board / data-viz" design system
   Zero-dependency, dark/light, mobile-first. Inlined into template.html on ship.
   ═══════════════════════════════════════════════════════════════════════════ */

/* Self-hosted display font — Space Grotesk (variable, latin subset, ~22KB).
   No runtime CDN: the woff2 ships next to the page (web/fonts/), so the page
   stays offline/file:///CSP-safe. Headings only; body + numerals stay system/mono. */
@font-face{
  font-family:"Space Grotesk";
  font-style:normal; font-weight:300 700; font-display:swap;
  src:url(fonts/SpaceGrotesk-var.woff2) format("woff2");
}

:root{
  /* palette — dark ("Midnight Slate": near-black cool canvas; depth comes from the
     surface ladder + ~9% hairline borders, not strokes and glows) */
  --bg:#0b0d11; --bg-elev:#101319;
  --card:#14171d; --card2:#191d24; --card3:#20252e;
  --border:color-mix(in srgb,#a8b8d0 9%,transparent);
  --border2:color-mix(in srgb,#a8b8d0 16%,transparent);
  --text:#e3e7ed; --muted:#9aa4b3; --faint:#8a93a2;  /* faint ≥4.5:1 on bg+card (AA small text) */
  --on-accent:#06171b;                               /* text on accent-filled chips/buttons */
  --accent:#4dd0d9; --accent2:#8f9fe3;        /* teal → periwinkle, tuned for the darker canvas */
  --good:#5cd191; --warn:#e0b45f; --orange:#f09a62; --bad:#f37f8e; --info:#87a9ec; --gray:#8f97a5;
  /* tone tints/borders are recipes over the per-theme status colors — the light
     theme only re-declares the base colors and these resolve against them */
  --good-bg:color-mix(in srgb,var(--good) 10%,transparent); --warn-bg:color-mix(in srgb,var(--warn) 10%,transparent);
  --bad-bg:color-mix(in srgb,var(--bad) 10%,transparent); --info-bg:color-mix(in srgb,var(--info) 10%,transparent);
  --gray-bg:color-mix(in srgb,var(--gray) 10%,transparent);
  --good-bd:color-mix(in srgb,var(--good) 30%,transparent); --warn-bd:color-mix(in srgb,var(--warn) 30%,transparent);
  --bad-bd:color-mix(in srgb,var(--bad) 30%,transparent); --info-bd:color-mix(in srgb,var(--info) 30%,transparent);
  --gray-bd:color-mix(in srgb,var(--gray) 26%,transparent);

  /* type */
  --sans:ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --display:"Space Grotesk",ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,sans-serif;
  --mono:ui-monospace,"SFMono-Regular","SF Mono",Menlo,"JetBrains Mono",Consolas,monospace;
  /* strict type scale — every UI font-size maps to a step (SVG-internal axis text excepted) */
  --fs-2xs:.7rem; --fs-xs:.76rem; --fs-sm:.84rem; --fs-base:.92rem; --fs-md:1rem;
  --fs-lg:1.3rem; --fs-xl:clamp(1.5rem,1.15rem + 1.5vw,1.95rem); --fs-2xl:clamp(2rem,1.4rem + 2.9vw,3rem);

  /* spacing rhythm */
  --sp-1:.5rem; --sp-2:.75rem; --sp-3:1rem; --sp-4:1.5rem; --sp-5:2.25rem; --sp-6:3.25rem;

  /* radius / shadow / motion */
  --r-xs:6px; --r-sm:10px; --r-md:14px; --r-lg:18px; --r-xl:24px; --r-pill:999px;
  --shadow-1:0 1px 2px rgba(0,0,0,.35);
  --shadow-2:0 1px 2px rgba(0,0,0,.3),0 12px 32px -16px rgba(0,0,0,.5);
  --shadow-3:0 1px 2px rgba(0,0,0,.35),0 32px 80px -36px rgba(0,0,0,.55);
  --sheen:linear-gradient(180deg,color-mix(in srgb,#fff 2.5%,var(--card)),var(--card));
  --ease:cubic-bezier(.4,.14,.3,1);
}
html[data-theme="light"]{
  /* light — clean cool neutral: white cards on a soft gray canvas
     (tone tints/borders inherit the :root color-mix recipes over these colors) */
  --bg:#f6f7f9; --bg-elev:#eef0f4;
  --card:#ffffff; --card2:#f7f8fa; --card3:#eff1f4;
  --border:color-mix(in srgb,#42506a 12%,transparent);
  --border2:color-mix(in srgb,#42506a 20%,transparent);
  --text:#1e242d; --muted:#5a6474; --faint:#656d7b;  /* ≥4.5:1 on bg+card+card3 */
  --on-accent:#ffffff;
  /* accent/status darkened so colored TEXT on its own tint still clears AA */
  --accent:#0a686f; --accent2:#4759ae;
  --good:#197245; --warn:#7b5f1c; --orange:#9f4c1b; --bad:#b13643; --info:#385fbc; --gray:#60646c;
  --shadow-1:0 1px 2px rgba(25,30,40,.06);
  --shadow-2:0 1px 2px rgba(25,30,40,.05),0 12px 32px -18px rgba(25,30,40,.18);
  --shadow-3:0 1px 2px rgba(25,30,40,.06),0 28px 70px -38px rgba(25,30,40,.22);
  --sheen:linear-gradient(180deg,#fff,#fff);
}

*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%; scroll-behavior:smooth}
body{
  font-family:var(--sans);
  background:var(--bg); color:var(--text);
  line-height:1.6; font-size:15px; min-height:100vh;
  position:relative;
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
}
/* backdrop: ONE soft verdict-tinted glow bleeding from the top edge.
   JS sets body[data-tone] (an isolated attr + dedicated --pglow var — deliberately
   NOT a .tone-* class, which would leak into the component tone cascade). */
body::after{
  content:""; position:fixed; inset:0 0 auto 0; height:52vh; z-index:-2; pointer-events:none;
  background:radial-gradient(52% 46% at 50% -8%,color-mix(in srgb,var(--pglow,var(--accent)) 13%,transparent),transparent 72%);
}
body[data-tone="good"]{--pglow:var(--good)}
body[data-tone="warn"]{--pglow:var(--warn)}
body[data-tone="bad"]{--pglow:var(--bad)}
body[data-tone="info"]{--pglow:var(--info)}
body[data-tone="muted"]{--pglow:var(--gray)}
html[data-theme="light"] body::after{background:radial-gradient(52% 46% at 50% -8%,color-mix(in srgb,var(--pglow,var(--accent)) 8%,transparent),transparent 72%)}

.tone-good{--tone:var(--good);--tone-bg:var(--good-bg);--tone-bd:var(--good-bd)}
.tone-warn{--tone:var(--warn);--tone-bg:var(--warn-bg);--tone-bd:var(--warn-bd)}
.tone-bad{--tone:var(--bad);--tone-bg:var(--bad-bg);--tone-bd:var(--bad-bd)}
.tone-info{--tone:var(--info);--tone-bg:var(--info-bg);--tone-bd:var(--info-bd)}
.tone-muted{--tone:var(--gray);--tone-bg:var(--gray-bg);--tone-bd:var(--gray-bd)}

/* ── top bar ───────────────────────────────────────────────────────────── */
.topbar{
  position:sticky; top:0; z-index:30;
  display:flex; align-items:center; justify-content:space-between; gap:1rem;
  padding:.75rem clamp(1rem,4vw,2rem);
  background:color-mix(in srgb,var(--bg) 65%,transparent);
  backdrop-filter:saturate(150%) blur(18px);
  -webkit-backdrop-filter:saturate(150%) blur(18px);
  border-bottom:1px solid var(--border);
}
.brand{display:flex; align-items:center; gap:.6rem; font-weight:800; font-size:var(--fs-md); letter-spacing:-.02em}
.brand .logo{
  width:30px; height:30px; display:grid; place-items:center; color:var(--accent);
  border-radius:var(--r-sm); background:var(--card2); border:1px solid var(--border);
}
.brand .logo svg{display:block}
.brand .wm{font-family:var(--display)}
.brand .wm .dot{color:var(--accent)}
.brand .dim{
  font-family:var(--mono); font-weight:600; font-size:var(--fs-2xs); letter-spacing:.14em;
  text-transform:uppercase; color:var(--faint);
  margin-left:.35rem;
}
.bar-right{display:flex; align-items:center; gap:.55rem}
.fresh{
  display:inline-flex; align-items:center; gap:.4rem;
  font-size:var(--fs-xs); font-weight:700; padding:.32rem .7rem; border-radius:var(--r-pill);
  background:var(--tone-bg); color:var(--tone); border:1px solid var(--tone-bd);
}
.fresh .dot{width:7px;height:7px;border-radius:50%;background:var(--tone); box-shadow:0 0 0 0 var(--tone); animation:pulse 2.4s var(--ease) infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 color-mix(in srgb,var(--tone) 55%,transparent)}70%{box-shadow:0 0 0 6px transparent}100%{box-shadow:0 0 0 0 transparent}}
.icon-btn{
  display:inline-flex; align-items:center; justify-content:center;
  width:34px;height:34px;border-radius:var(--r-sm); cursor:pointer;
  background:transparent; border:1px solid var(--border); color:var(--text);
  font-size:var(--fs-md); transition:.16s var(--ease);
}
.icon-btn:hover{background:var(--card2); border-color:var(--border2)}

.wrap{max-width:1060px; margin:0 auto; padding:clamp(1.2rem,3.5vw,2.4rem) clamp(1rem,4vw,2rem) 5rem}

/* ── hero / status header ──────────────────────────────────────────────── */
.hero{
  position:relative; overflow:hidden;
  border:1px solid var(--border); border-radius:var(--r-xl);
  background:var(--sheen);
  padding:clamp(1.7rem,3vw,2.3rem); margin-bottom:var(--sp-3);
  box-shadow:var(--shadow-3);
  display:grid; grid-template-columns:1.35fr .95fr; gap:1.4rem 1.8rem;
}
.hero-main{min-width:0}
.eyebrow{
  display:inline-flex; align-items:center; gap:.5rem;
  font-family:var(--mono); font-size:var(--fs-2xs); letter-spacing:.12em; text-transform:uppercase;
  color:var(--muted); font-weight:600;
}
.eyebrow::before{content:""; width:6px; height:6px; border-radius:50%; background:var(--tone)}
.hero-version{font-family:var(--display); font-size:var(--fs-2xl); font-weight:700; margin:.5rem 0 0; letter-spacing:-.035em; line-height:1.05; text-wrap:balance}
.hero-version .vnum{font-family:var(--mono); color:var(--tone); font-weight:700}
.hero-sub{color:var(--muted); font-size:var(--fs-sm); margin-top:.3rem; font-family:var(--mono)}
.hero-sub .sep{opacity:.45; margin:0 .45rem}
.verdict{
  display:inline-flex; align-items:center; gap:.6rem; margin-top:1.25rem;
  font-family:var(--display); font-size:var(--fs-xl); font-weight:700; letter-spacing:-.025em;
  padding:.8rem 1.25rem; border-radius:var(--r-md);
  background:var(--tone-bg); color:var(--tone); border:1px solid var(--tone-bd);
}
.verdict .em{font-size:1.1em; line-height:1}
/* verdict pill / pre-release chip as links to the GitHub release */
a.verdict{text-decoration:none; cursor:pointer; transition:background .15s var(--ease), box-shadow .15s var(--ease)}
a.verdict:hover{background:color-mix(in srgb,var(--tone) 16%,transparent); box-shadow:0 0 0 1px var(--tone-bd)}
.verdict .v-ext{font-size:var(--fs-base); opacity:.65; margin-left:.15rem; align-self:flex-start}
a.chip{text-decoration:none; cursor:pointer; transition:border-color .15s var(--ease), color .15s var(--ease)}
a.chip:hover{--p-bd:var(--accent); --p-fg:var(--text)}
.chip .v-ext{font-size:var(--fs-xs); opacity:.7; margin-left:.1rem}
.verdict-blurb{margin-top:.85rem; color:var(--text); font-weight:600; font-size:var(--fs-md)}
.hero-headline{margin-top:.5rem; color:var(--muted); font-size:var(--fs-sm); max-width:62ch}
.conf-row{display:flex; flex-wrap:wrap; gap:.5rem; margin-top:1.1rem; align-items:center}
/* hero CTA → jump to "Your setup"; becomes a live per-setup verdict once a stack is picked */
.setup-cta{margin-top:.95rem; display:inline-flex; flex-wrap:wrap; align-items:center; justify-content:center; gap:.15rem .4rem; font:inherit; font-size:var(--fs-sm); cursor:pointer; background:transparent; border:1px dashed var(--tone-bd); color:var(--muted); padding:.4rem .85rem; border-radius:var(--r-pill); transition:.15s var(--ease)}
.setup-cta:hover{color:var(--text); border-color:var(--tone); background:var(--tone-bg)}
.setup-cta .sv-em{font-size:1rem; line-height:1}
.setup-cta b{color:var(--tone); white-space:nowrap}
/* ── unified pill recipe ────────────────────────────────────────────────
   Every chip/tag/badge species shares one base and tunes it via --p-*
   custom properties; selected state is ONE convention (accent tint on
   aria-pressed/aria-selected) instead of per-species solid fills. */
.chip,.fbtn,.pick,.vchip,.tag,.pbadge,.tr-badge,.sec-count{
  display:inline-flex; align-items:center; gap:.4rem;
  font-family:inherit; font-size:var(--p-fs,var(--fs-xs)); font-weight:var(--p-fw,600); line-height:1.4;
  padding:var(--p-pad,.32rem .75rem); border-radius:var(--r-pill);
  background:var(--p-bg,var(--card3)); color:var(--p-fg,var(--muted));
  border:1px solid var(--p-bd,var(--border));
}
.fbtn,.pick,button.chip{cursor:pointer; transition:color .15s var(--ease), background-color .15s var(--ease), border-color .15s var(--ease)}
.fbtn:hover,.pick:hover{--p-fg:var(--text); --p-bd:var(--border2)}
.fbtn[aria-pressed="true"],.pick[aria-pressed="true"]{
  --p-bg:color-mix(in srgb,var(--accent) 15%,transparent);
  --p-fg:var(--accent);
  --p-bd:color-mix(in srgb,var(--accent) 40%,transparent);
  --p-fw:700;
}
.fcomp[aria-pressed="true"]{
  --p-bg:color-mix(in srgb,var(--accent2) 15%,transparent);
  --p-fg:var(--accent2);
  --p-bd:color-mix(in srgb,var(--accent2) 40%,transparent);
}
.chip b{color:var(--text); font-weight:700}
.chip.lvl-high{--p-fg:var(--good); --p-bd:var(--good-bd); --p-bg:var(--good-bg)}
.chip.lvl-medium{--p-fg:var(--warn); --p-bd:var(--warn-bd); --p-bg:var(--warn-bg)}
.chip.lvl-low{--p-fg:var(--bad); --p-bd:var(--bad-bd); --p-bg:var(--bad-bg)}

/* ── ⚖︎ chip → second-model review expander ─────────────────────────────── */
button.chip:hover{--p-bd:var(--accent); --p-fg:var(--text)}
.chip .cx{font-size:.58rem; color:var(--muted); transition:transform .15s var(--ease); display:inline-block}
.chip[aria-expanded="true"] .cx{transform:rotate(180deg)}
.rev-detail{margin-top:.85rem; max-width:62ch; background:var(--card); border:1px solid var(--border); border-left:2px solid var(--accent); border-radius:var(--r-md); padding:.95rem 1.1rem; font-size:var(--fs-sm); text-align:left}
.rev-detail .rvd-h{font-size:var(--fs-2xs); text-transform:uppercase; letter-spacing:.06em; font-weight:800; color:var(--accent); margin-bottom:.5rem}
.rev-detail .rvd-status{color:var(--text)}
.rev-detail .rvd-quote{border-left:2px solid var(--border2); margin:.6rem 0; padding:.1rem 0 .1rem .75rem; color:var(--muted); font-style:italic}
.rev-detail .rvd-k{font-weight:700; font-size:var(--fs-xs); margin-top:.7rem; color:var(--text)}
.rev-detail .rvd-list{list-style:none; margin-top:.35rem; display:flex; flex-direction:column; gap:.3rem}
.rev-detail .rvd-list li{position:relative; padding-left:1rem; color:var(--muted)}
.rev-detail .rvd-list li::before{content:"›"; position:absolute; left:0; color:var(--accent)}
.rev-detail .rvd-note{margin-top:.7rem; font-size:var(--fs-xs); color:var(--faint)}

/* hero right column: the "signal panel" — confidence gauge + live mini-viz */
.signal{
  align-self:stretch; min-width:0;
  border:1px solid var(--border); border-radius:var(--r-lg);
  background:var(--bg-elev);
  padding:var(--sp-3) 1.05rem; display:flex; flex-direction:column; gap:.95rem;
}
.signal .sg-h{font-family:var(--mono); font-size:var(--fs-2xs); letter-spacing:.14em; text-transform:uppercase; color:var(--faint); font-weight:600}
/* confidence gauge */
.gauge{display:flex; flex-direction:column; gap:.4rem}
.gauge .g-top{display:flex; align-items:baseline; justify-content:space-between}
.gauge .g-val{font-family:var(--mono); font-weight:800; font-size:var(--fs-md); color:var(--tone)}
.gauge .g-lab{font-size:var(--fs-xs); color:var(--muted); font-weight:600}
.gauge .g-segs{display:flex; gap:5px}
.gauge .g-seg{flex:1; height:8px; border-radius:var(--r-pill); background:var(--card3)}
.gauge .g-seg.on{background:var(--tone)}
.gauge .g-note{font-size:var(--fs-xs); color:var(--muted); line-height:1.4}
/* signal: platform sparkbars */
.sigplat{display:grid; grid-template-columns:1fr 1fr; gap:.55rem .9rem}
.sigplat .sp{display:flex; align-items:center; gap:.5rem; min-width:0}
.sigplat .sp .ico{width:1.1rem; display:inline-flex; justify-content:center; color:var(--muted)}
/* inline icon svg — aligns in both flex pills (gap does spacing) and text flow */
.ic-svg{flex:none; vertical-align:-.12em}
.sigplat .sp .nm{font-size:var(--fs-xs); color:var(--muted); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.sparkbar{display:flex; gap:2px; align-items:flex-end; height:14px}
.sparkbar i{width:4px; border-radius:1px; background:var(--ic,var(--gray)); opacity:.3}
.sparkbar i.on{opacity:1}
.imp-none{--ic:var(--good)} .imp-low{--ic:var(--info)} .imp-medium{--ic:var(--warn)} .imp-high{--ic:var(--bad)}
/* severity colour ramp (worst-severity → colour): critical≠high≠medium≠low, distinct steps */
.sv-critical{--ic:var(--bad)} .sv-high{--ic:var(--orange)} .sv-medium{--ic:var(--warn)} .sv-low{--ic:var(--gray)} .sv-none{--ic:var(--good)}
/* signal: risk sparkline */
.sigtrend{display:flex; flex-direction:column; gap:.35rem}
.sigtrend svg{width:100%; height:42px; display:block; overflow:visible}
.sigtrend .cap{display:flex; justify-content:space-between; font-size:var(--fs-2xs); color:var(--faint); font-family:var(--mono)}

/* ── low-confidence banner ─────────────────────────────────────────────── */
.banner{
  display:flex; gap:.7rem; align-items:flex-start; margin-bottom:1.1rem;
  padding:.9rem 1.05rem; border-radius:var(--r-md);
  background:var(--warn-bg); border:1px solid var(--warn-bd); color:var(--text); font-size:var(--fs-base);
}
.banner .bi{font-size:var(--fs-md); line-height:1.3}
/* fresh-release notice — informational (teal), distinct from the red low-conf one */
.banner-fresh{background:var(--info-bg); border-color:var(--info-bd)}
.banner-fresh .bi{font-size:1.25rem}
.banner-body{display:flex; flex-direction:column; gap:.3rem; min-width:0}
.banner-title{font-weight:700; color:var(--text)}
.banner-body .ba strong{color:var(--accent)}

/* ── signal tiles (stats) ──────────────────────────────────────────────── */
.stats{display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:.8rem; margin-bottom:var(--sp-5)}
.stat{
  position:relative; overflow:hidden;
  background:var(--sheen);
  border:1px solid var(--border); border-radius:var(--r-md);
  padding:1.05rem 1.15rem; box-shadow:var(--shadow-1);
  transition:transform .18s var(--ease), border-color .18s var(--ease);
}
.stat::before{content:""; position:absolute; left:0; top:0; right:0; height:2px; background:linear-gradient(90deg,var(--sc,var(--accent)),transparent)}
.stat:hover{transform:translateY(-1px); border-color:var(--border2)}
.stat .v{font-size:clamp(2rem,1.7rem + 1.2vw,2.5rem); font-weight:800; font-family:var(--mono); line-height:1.05; color:var(--sc,var(--text))}
.stat .l{font-size:var(--fs-xs); color:var(--muted); margin-top:.25rem; text-transform:uppercase; letter-spacing:.05em; font-weight:700}
.stat .s{font-size:var(--fs-xs); color:var(--faint); margin-top:.15rem}

/* ── sections ──────────────────────────────────────────────────────────── */
.section{margin-top:var(--sp-6)}
.reveal{opacity:0; transform:translateY(10px); transition:opacity .45s var(--ease), transform .45s var(--ease)}
.reveal.in{opacity:1; transform:none}
.sec-head{display:flex; align-items:baseline; gap:.6rem; margin-bottom:var(--sp-4); padding-bottom:.55rem; border-bottom:1px solid var(--border)}
.sec-title{font-family:var(--display); font-size:var(--fs-lg); font-weight:700; letter-spacing:-.02em; text-wrap:balance}
.sec-count{font-family:var(--mono); --p-fg:var(--accent); --p-fw:700; --p-pad:.1rem .5rem; --p-bg:var(--card); --p-bd:var(--border2)}
.sec-note{font-size:var(--fs-xs); color:var(--muted); margin-left:auto; font-weight:500}
.cal-note{font-size:var(--fs-xs); color:var(--faint); margin:-.2rem 0 var(--sp-4)}

/* permalinks: anchorable section headers + deep-link target highlight */
.sec-head{position:relative}
.sec-anchor{position:absolute; left:-1.15em; top:0; font-family:var(--mono); font-weight:700; color:var(--faint); text-decoration:none; opacity:0; transition:opacity .15s var(--ease)}
.sec-head:hover .sec-anchor, .sec-anchor:focus-visible, .sec-anchor.copied{opacity:1}
.sec-anchor:hover{color:var(--accent)}
.sec-anchor.copied{color:var(--good)}
.section{scroll-margin-top:74px}
.section:target .sec-title, .section.tgt .sec-title{color:var(--accent)}
.section:target .sec-head, .section.tgt .sec-head{border-bottom-color:var(--accent)}

.prose{
  background:var(--card); border:1px solid var(--border); border-radius:var(--r-md);
  padding:1.2rem 1.3rem; font-size:var(--fs-md); line-height:1.7; color:var(--text); box-shadow:var(--shadow-1);
}
.prose p{margin-bottom:.8rem} .prose p:last-child{margin-bottom:0}
.ilink{color:var(--accent); text-decoration:none; font-family:var(--mono); font-size:.92em; font-weight:600}
.ilink:hover{text-decoration:underline}

/* ── evidence ──────────────────────────────────────────────────────────── */
.ev-grid{display:grid; grid-template-columns:1fr 1fr; gap:.9rem}
@media(max-width:680px){.ev-grid{grid-template-columns:1fr}}
.ev-card{background:var(--card); border:1px solid var(--border); border-radius:var(--r-md); padding:1.1rem 1.2rem; box-shadow:var(--shadow-1)}
.ev-card h3{font-family:var(--mono); font-size:var(--fs-2xs); text-transform:uppercase; letter-spacing:.08em; display:flex; align-items:center; gap:.45rem; margin-bottom:.75rem; font-weight:700}
.ev-for h3{color:var(--good)} .ev-against h3{color:var(--bad)} .ev-neutral h3{color:var(--muted)}
.ev-card ul{list-style:none; display:flex; flex-direction:column; gap:.6rem; max-height:17rem; overflow-y:auto; padding-right:.4rem}
.ev-card li{position:relative; padding-left:1.15rem; font-size:var(--fs-base); color:var(--text)}
.ev-card li::before{content:""; position:absolute; left:0; top:.5em; width:7px; height:7px; border-radius:50%}
.ev-for li::before{background:var(--good)} .ev-against li::before{background:var(--bad)} .ev-neutral li::before{background:var(--gray)}
.ev-neutral{grid-column:1/-1}

/* ── flip conditions (what would change this verdict) ──────────────────── */
.flip-card{background:var(--card); border:1px solid var(--border); border-radius:var(--r-md); padding:1.1rem 1.2rem; box-shadow:var(--shadow-1)}
.flip-card ul{list-style:none; display:flex; flex-direction:column; gap:.65rem}
.flip-card li{position:relative; padding-left:1.2rem; font-size:var(--fs-base); color:var(--text)}
.flip-card li::before{content:"›"; position:absolute; left:0; top:-.05em; font-family:var(--mono); font-weight:700; font-size:var(--fs-md); color:var(--accent)}
.flip-note{font-size:var(--fs-xs); color:var(--faint); margin-top:.8rem}

/* ── verdict track record ───────────────────────────────────────────────── */
.tr-sum{font-size:var(--fs-sm); color:var(--muted); margin-bottom:.9rem}
.tr-list{display:flex; flex-direction:column; gap:.45rem}
.tr-row{display:flex; align-items:center; gap:.4rem .9rem; flex-wrap:wrap; background:var(--card); border:1px solid var(--border); border-radius:var(--r-sm); padding:.6rem .9rem; font-size:var(--fs-sm)}
.tr-row.cur{border-color:color-mix(in srgb,var(--accent) 45%,transparent); background:color-mix(in srgb,var(--accent) 5%,var(--card))}
.tr-ver{font-family:var(--mono); font-weight:700; min-width:8ch}
.tr-ver .cur-dot{color:var(--accent); font-size:.6rem; vertical-align:middle; margin-left:.25rem}
.tr-path{letter-spacing:.04em}
.tr-runs{color:var(--muted); font-size:var(--fs-xs)}
.tr-badge{--p-fs:var(--fs-2xs); --p-fw:700; --p-pad:.12rem .55rem; --p-bg:transparent; --p-bd:var(--border2); letter-spacing:.03em}
.tr-held{--p-fg:var(--good); --p-bd:var(--good-bd); --p-bg:var(--good-bg)}
.tr-hard{--p-fg:var(--warn); --p-bd:var(--warn-bd); --p-bg:var(--warn-bg)}
.tr-soft{--p-fg:var(--bad); --p-bd:var(--bad-bd); --p-bg:var(--bad-bg)}
.tr-dates{color:var(--faint); font-size:var(--fs-xs); margin-left:auto}
.tr-note{font-size:var(--fs-xs); color:var(--faint); margin-top:.8rem}
@media(max-width:680px){ .tr-dates{margin-left:0; width:100%} }

/* ── filters / issues ──────────────────────────────────────────────────── */
.filters{display:flex; flex-wrap:wrap; gap:.45rem; margin-bottom:1rem}
.fbtn{--p-bg:var(--card)}
.fsep{display:inline-flex; align-items:center; margin-left:.35rem; padding-left:.5rem; border-left:1px solid var(--border2);
  font-size:var(--fs-2xs); font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--faint)}
.issue{
  background:var(--card); border:1px solid var(--border); border-left-width:3px; border-radius:var(--r-sm);
  margin-bottom:.4rem; overflow:hidden; transition:border-color .15s var(--ease)}
.issue:hover{border-color:var(--border2)}
.issue.sev-critical{border-left-color:var(--bad); border-left-width:4px}
.issue.sev-high{border-left-color:var(--orange,#e08a3c)}
.issue.sev-medium{border-left-color:var(--warn)}
.issue.sev-low{border-left-color:var(--gray)}
/* compact summary row (click to expand) */
.irow{display:flex; align-items:center; gap:.55rem; width:100%; text-align:left; cursor:pointer;
  background:none; border:0; color:inherit; font:inherit; padding:.55rem .9rem}
.irow:hover{background:var(--card2)}
.irow:focus-visible{outline:2px solid var(--accent); outline-offset:-2px}
.sevdot{flex:none; width:9px; height:9px; border-radius:50%; background:var(--gray)}
.issue.sev-critical .sevdot{background:var(--bad)}
.issue.sev-high .sevdot{background:var(--orange,#e08a3c)}
.issue.sev-medium .sevdot{background:var(--warn)}
.inum{flex:none; font-family:var(--mono); font-size:var(--fs-xs); font-weight:700; color:var(--accent)}
.ititle{flex:1 1 auto; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-weight:600; font-size:var(--fs-base); color:var(--text)}
.ibs{flex:none; display:flex; align-items:center; gap:.35rem}
.ib{display:inline-flex; align-items:center; gap:.2rem; font-size:var(--fs-xs); font-weight:700; color:var(--muted)}
.chev{flex:none; color:var(--faint); font-size:var(--fs-2xs); transition:transform .15s var(--ease)}
.irow[aria-expanded="true"] .chev{transform:rotate(90deg)}
.idetail{padding:.15rem .85rem .8rem 1.45rem}
.idet-title{font-size:var(--fs-base); font-weight:600; color:var(--text); line-height:1.45; margin-bottom:.45rem; overflow-wrap:anywhere}
.idetail[hidden]{display:none}
.idet-link{display:inline-block; margin-top:.55rem; font-size:var(--fs-xs); font-weight:700; color:var(--accent); text-decoration:none}
.idet-link:hover{text-decoration:underline}
.ki-more{display:block; width:100%; margin:.5rem 0 0; font:inherit; font-size:var(--fs-sm); font-weight:600; color:var(--accent);
  background:transparent; border:1px solid var(--border); border-radius:var(--r-sm); padding:.55rem 1.15rem; cursor:pointer; transition:.15s var(--ease)}
.ki-more:hover{background:var(--card); border-color:var(--border2)}
.issue .tags{display:flex; flex-wrap:wrap; gap:.35rem; margin-top:.5rem}
.tag{gap:.3rem; --p-pad:.16rem .55rem}
.tag.t-bad{--p-fg:var(--bad); --p-bd:var(--bad-bd); --p-bg:var(--bad-bg)}
.tag.t-warn{--p-fg:var(--warn); --p-bd:var(--warn-bd); --p-bg:var(--warn-bg)}
.tag.t-good{--p-fg:var(--good); --p-bd:var(--good-bd); --p-bg:var(--good-bg)}
.tag.t-info{--p-fg:var(--accent); --p-bd:var(--info-bd); --p-bg:var(--info-bg)}
.tag.t-plat{--p-fg:var(--text); --p-bd:var(--border2); --p-bg:var(--card2); --p-fw:700}
.tag.t-comp{--p-fg:var(--accent2); --p-fw:700; --p-bd:color-mix(in srgb,var(--accent2) 38%,transparent); --p-bg:color-mix(in srgb,var(--accent2) 13%,transparent)}
.issue.mine{border-color:var(--info-bd); background:color-mix(in srgb,var(--info) 4%,var(--card))}
.tag.t-me{--p-fg:var(--accent); --p-bd:var(--info-bd); --p-bg:var(--info-bg)}
/* heuristic (auto-detected) platform/subsystem tags read quieter than asserted ones */
.tag.t-auto{--p-fg:var(--faint); border-style:dashed}
/* raw maintainer-assigned GitHub labels — a verifiable FACT, shown mono + muted */
.tag.tag-raw{--p-fg:var(--muted); --p-bg:var(--card); --p-bd:var(--border); font-family:var(--mono); --p-fw:500; --p-fs:var(--fs-2xs)}

/* ── tabs (changes) ────────────────────────────────────────────────────── */
.tabs{display:inline-flex; gap:3px; margin-bottom:1rem; flex-wrap:wrap; background:var(--card3); border:1px solid var(--border); border-radius:calc(var(--r-sm) + 3px); padding:3px}
.tab{
  font-size:var(--fs-sm); font-weight:600; padding:.38rem .9rem; border-radius:var(--r-sm); cursor:pointer;
  background:transparent; border:0; color:var(--muted); transition:.15s var(--ease);
  display:inline-flex; align-items:center; gap:.45rem;
}
.tab:hover{color:var(--text)}
.tab[aria-selected="true"]{background:var(--card); color:var(--text); box-shadow:var(--shadow-1)}
.tab .cnt{font-family:var(--mono); font-size:var(--fs-xs); background:var(--bg-elev); padding:.05rem .42rem; border-radius:var(--r-xs); color:var(--muted)}
/* ── top-level long-tail tabs (Impact / History / Trends / What's new) ─────────
   Group the secondary detail below the always-visible decision. Namespaced .ltab*
   so they never collide with the inner .tab pills used inside the changelog. */
.ltab-wrap{margin-top:var(--sp-6)}
.ltabs{display:flex; gap:.25rem; flex-wrap:wrap; border-bottom:1px solid var(--border)}
.ltab{
  font-family:var(--display); font-size:var(--fs-base); font-weight:650; letter-spacing:-.01em;
  color:var(--muted); background:transparent; border:0;
  padding:.6rem .9rem; cursor:pointer; position:relative;
  transition:color .15s var(--ease);
}
.ltab::after{content:""; position:absolute; left:.35rem; right:.35rem; bottom:-1px; height:2px; background:var(--accent); border-radius:2px; transform:scaleX(0); transition:transform .2s var(--ease)}
.ltab:hover{color:var(--text)}
.ltab[aria-selected="true"], .ltab[aria-pressed="true"]{color:var(--text)}
.ltab[aria-selected="true"]::after, .ltab[aria-pressed="true"]::after{transform:scaleX(1)}
/* Known-issues category tabs reuse .ltabs/.ltab; subsystem chips sit on a row below. */
.ki-cats{margin-bottom:1rem}
.ki-subs{margin-top:0}
.ltab:focus-visible{outline:2px solid var(--accent); outline-offset:2px}
.ltab-panel:focus{outline:none}
.ltab-panel .section:first-child{margin-top:1.4rem}
.change{background:transparent; border-bottom:1px solid var(--border); padding:.65rem .15rem}
.change:last-child{border-bottom:0}
.change .ct{font-weight:600; font-size:var(--fs-base)}
.change .cm{font-size:var(--fs-sm); color:var(--muted); margin-top:.25rem}
.panel{max-height:21rem; overflow-y:auto; padding-right:.3rem}
.empty{color:var(--faint); font-size:var(--fs-base); padding:.6rem 0}

/* ── platform impact: segmented dashboard meters ───────────────────────── */
/* 3 columns at the 1000px content cap → clean rows for both grids (6 platforms,
   9 components). Bar + count are stacked so the meter always spans the full card
   width (an inline count label used to squeeze the segments into thin slivers). */
.plat-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:.8rem}
.plat{
  background:var(--card); border:1px solid var(--border);
  border-radius:var(--r-md); padding:.9rem 1rem;
}
.plat .ph{display:flex; align-items:center; gap:.4rem; min-width:0}
.plat .pn{font-weight:700; font-size:var(--fs-base); display:flex; align-items:center; gap:.4rem; min-width:0; flex:1}
.plat .pname{overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.plat .pmeter{display:flex; flex-direction:column; align-items:flex-start; gap:.5rem; margin-top:.8rem}
.plat .vbar{display:block; width:100%; height:6px; border-radius:var(--r-pill); background:var(--card3); overflow:hidden}
.plat .vbar .vfill{display:block; height:100%; border-radius:var(--r-pill); background:var(--ic)}
.plat .pl{font-family:var(--mono); font-size:var(--fs-2xs); font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:var(--ic)}
.plat.you{border-color:color-mix(in srgb,var(--accent) 45%,transparent); background:color-mix(in srgb,var(--accent) 5%,var(--card))}
.plat .me{flex:none; white-space:nowrap; font-size:.6rem; font-weight:800; color:var(--accent); text-transform:uppercase; letter-spacing:.04em}

/* ── sentiment ─────────────────────────────────────────────────────────── */
.quote{
  background:var(--card); border:1px solid var(--border); border-radius:var(--r-md);
  border-left:2px solid var(--accent); padding:1.15rem 1.3rem; font-size:var(--fs-md); box-shadow:var(--shadow-1);
}
.quote .qh{font-family:var(--mono); font-size:var(--fs-2xs); text-transform:uppercase; letter-spacing:.08em; color:var(--muted); font-weight:700; margin-bottom:.5rem}
.quote .qsrc{margin-top:.75rem; padding-top:.6rem; border-top:1px solid var(--border); font-size:var(--fs-xs); color:var(--faint)}

/* ── triage ────────────────────────────────────────────────────────────── */
details.triage{background:var(--card); border:1px solid var(--border); border-radius:var(--r-md); box-shadow:var(--shadow-1); overflow:hidden}
details.triage summary{cursor:pointer; padding:.95rem 1.2rem; font-weight:700; font-size:var(--fs-md); list-style:none; display:flex; align-items:center; justify-content:space-between}
details.triage summary::-webkit-details-marker{display:none}
details.triage summary .caret{color:var(--muted); transition:.2s var(--ease); font-size:var(--fs-xs)}
details.triage[open] summary .caret{transform:rotate(90deg)}
.triage-body{padding:0 1.2rem 1.15rem; display:grid; grid-template-columns:minmax(0,1fr) minmax(0,1fr); gap:1.2rem}
@media(max-width:680px){.triage-body{grid-template-columns:1fr}}
.triage-col{min-width:0}
.triage-col h4{font-family:var(--mono); font-size:var(--fs-2xs); text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin:.4rem 0 .6rem; font-weight:700}
.trow{font-size:var(--fs-sm); padding:.42rem 0; border-bottom:1px solid var(--border); display:flex; gap:.5rem; align-items:baseline}
.trow:last-child{border-bottom:none}
.trow .tn{font-family:var(--mono); color:var(--accent); text-decoration:none; font-weight:600; white-space:nowrap}
.trow .tt{color:var(--text); flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.tscroll{max-height:260px; overflow-y:auto; padding-right:.35rem}

/* ── history timeline ──────────────────────────────────────────────────── */
.timeline{display:flex; flex-direction:column; gap:0}
.tl{display:flex; gap:.95rem; padding-bottom:1.05rem; position:relative}
.tl:not(:last-child)::before{content:""; position:absolute; left:11px; top:24px; bottom:0; width:1px; background:var(--border)}
.tl .marker{width:22px; height:22px; border-radius:50%; flex:none; display:flex; align-items:center; justify-content:center; font-size:var(--fs-xs); border:1.5px solid var(--tone); background:var(--tone-bg)}
.tl .tlb{flex:1}
.tl .tlv{font-weight:700; font-family:var(--mono); font-size:var(--fs-base)}
.tl .tlv .cur{font-size:var(--fs-2xs); font-weight:800; color:var(--accent); margin-left:.4rem; vertical-align:middle}
.tl .tlv a.snap{color:inherit; text-decoration:underline; text-decoration-style:dotted; text-underline-offset:3px; text-decoration-color:var(--tone)}
.tl .tlv a.snap:hover{text-decoration-style:solid}
.tl .tlr{font-size:var(--fs-sm); color:var(--muted); margin-top:.1rem; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden}
.tl .tld{font-size:var(--fs-xs); color:var(--faint); margin-top:.1rem}

/* ── best version ──────────────────────────────────────────────────────── */
.bestver{display:flex; gap:.75rem; align-items:flex-start; margin:2.2rem 0 1.8rem; padding:.9rem 1.1rem; border-radius:var(--r-md); background:var(--tone-bg); border:1px solid var(--tone-bd); color:var(--text); font-size:var(--fs-base)}
.bestver .bi{font-size:var(--fs-md); line-height:1.3}
.bestver a.snap{color:var(--accent); text-decoration:none; font-family:var(--mono); font-weight:700}
.bestver a.snap:hover{text-decoration:underline}
.about{display:flex; gap:.7rem; align-items:flex-start; margin:1.1rem 0 1.4rem; padding:.85rem 1.05rem; border-radius:var(--r-md); background:var(--card); border:1px solid var(--border); color:var(--muted); font-size:var(--fs-sm)}
.about .ai{font-size:var(--fs-md); line-height:1.4}
.about .atxt p{margin:0; line-height:1.55}
.about .atxt b{color:var(--text)}
.about .atxt a{color:var(--accent); text-decoration:none}
.about .atxt a:hover{text-decoration:underline}
.about .atxt p.alinks{margin:.55rem 0 0; display:flex; gap:1.1rem; flex-wrap:wrap; font-weight:600}
.about .atxt{flex:1 1 auto; min-width:0}
.about-sticker{flex:0 0 auto; order:-1; align-self:center; width:96px; height:auto; margin:-.15rem .4rem -.15rem -.1rem; filter:drop-shadow(0 3px 8px rgba(0,0,0,.22))}
@media(max-width:600px){.about-sticker{width:74px}}
.impact-sub{margin-top:1.3rem}
.impact-sub:first-of-type{margin-top:.2rem}
.impact-sublabel{font-family:var(--mono); font-size:var(--fs-2xs); letter-spacing:.12em; text-transform:uppercase; color:var(--faint); font-weight:600; margin-bottom:.55rem}

/* ── per-component verdict line ─────────────────────────────────────────── */
.vline{display:flex; flex-wrap:wrap; gap:.45rem}
.vchip{gap:.35rem; --p-bg:var(--card); cursor:help}
.vchip.hot{--p-bd:var(--bad-bd); --p-bg:var(--bad-bg); --p-fg:var(--text)}
.vchip .vc-em{font-size:var(--fs-sm); line-height:1}
.vchip .vc-n{font-family:var(--mono); font-size:var(--fs-2xs); background:var(--bg-elev); border-radius:var(--r-xs); padding:.05rem .35rem; color:var(--muted)}
.vline-note{font-size:var(--fs-xs); color:var(--faint); margin-top:.5rem}
.impact-note{font-size:var(--fs-xs); color:var(--muted); margin-bottom:.6rem}
.prose + .quote{margin-top:1.2rem}

/* ── your setup ────────────────────────────────────────────────────────── */
.setup-intro{font-size:var(--fs-sm); color:var(--muted); margin:-.3rem 0 .85rem; max-width:72ch}
.setup .chips{display:flex; flex-wrap:wrap; align-items:center; gap:.45rem; margin-bottom:.9rem}
.pick-clear{border-style:dashed; --p-fg:var(--faint)}
.pick-clear:hover{--p-fg:var(--bad); --p-bd:var(--bad-bd)}
.pick-share{border-style:dashed; --p-fg:var(--faint)}
.pick-share:hover{--p-fg:var(--accent); --p-bd:color-mix(in srgb,var(--accent) 40%,transparent)}
.setup .chip-grp{flex-basis:100%; font-size:var(--fs-2xs); font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--faint); margin-top:.3rem}
.setup .chip-grp:first-child{margin-top:0}
.pick{--p-bg:var(--card)}
.setup .risk{padding:.9rem 1.1rem; border-radius:var(--r-md); font-size:var(--fs-base); color:var(--text); background:var(--tone-bg); border:1px solid var(--tone-bd)}
.setup .risk .rh{font-weight:700; margin-bottom:.2rem}
.setup .hint{color:var(--faint); font-size:var(--fs-sm)}
/* per-setup verdict — a conservative refinement of the global verdict for the user's stack */
.setup .risk .sv{display:flex; align-items:center; flex-wrap:wrap; gap:.5rem; margin-bottom:.7rem; padding-bottom:.7rem; border-bottom:1px solid var(--tone-bd)}
.sv .sv-k{font-family:var(--mono); font-size:var(--fs-2xs); letter-spacing:.12em; text-transform:uppercase; color:var(--faint); font-weight:700}
.sv .sv-em{font-size:var(--fs-lg); line-height:1}
.sv .sv-l{font-weight:800; color:var(--tone); font-size:var(--fs-md)}
.sv .sv-note{font-size:var(--fs-xs); color:var(--muted); font-weight:600}
.risk .prow-list{margin-top:.85rem; display:flex; flex-direction:column; gap:.45rem}
.risk .prow{display:flex; align-items:center; gap:.5rem; flex-wrap:wrap; font-size:var(--fs-sm)}
.risk .ppn{font-weight:700; min-width:7rem; display:inline-flex; align-items:center; gap:.4rem}
.pbadge{flex:none; text-transform:uppercase; letter-spacing:.04em; --p-fs:var(--fs-2xs); --p-fw:800; --p-pad:.12rem .5rem; --p-bg:transparent; --p-bd:var(--ic); --p-fg:var(--ic)}
.risk .pdetail{color:var(--muted); font-size:var(--fs-sm)}
.risk .pdetail.muted2{color:var(--faint); font-style:italic}
.risk .prow-all{margin-top:.5rem; padding-top:.6rem; border-top:1px dashed var(--border2)}
.risk .ccnote{color:var(--faint); font-style:italic}

/* ── release-health trend: SVG area chart ──────────────────────────────── */
.trend{background:var(--sheen); border:1px solid var(--border); border-radius:var(--r-md); padding:1.2rem 1.3rem 1rem; box-shadow:var(--shadow-1)}
.trend .chartwrap{position:relative}
.trend svg.tchart{width:100%; height:170px; display:block; overflow:visible}
.trend .tgrid line{stroke:var(--border); stroke-width:1; stroke-dasharray:2 4; opacity:.4}
.trend .taxis{font-family:var(--mono); font-size:9px; fill:var(--faint)}

<script>
(function(){
  "use strict";

  // ── data source ──────────────────────────────────────────────────────────
  // DATA comes from one of two places: the inlined assessment-data JSON block
  // (the build-time copy, always present) and, when reachable, a runtime
  // fetch('latest.json'). The page renders from the inline copy instantly, then
  // re-renders if latest.json brings fresher data — so a data refresh doesn't need
  // a full HTML rebuild, while offline / file:// viewing still works from inline.
  var DATA = null;
  function parseInline(){
    try { return JSON.parse(document.getElementById("assessment-data").textContent); }
    catch (e) { return null; }
  }

  var app = document.getElementById("app");

  function showError(msg){
    app.textContent = "";
    var box = el("div", {"class":"errbox"}, [
      el("h2", null, "Assessment unavailable"),
      el("p", null, msg)
    ]);
    app.appendChild(box);
  }

  // ── tiny safe DOM helper ─────────────────────────────────────────────────
  function el(tag, props, kids){
    var n = document.createElement(tag);
    if (props) for (var k in props){
      if (!Object.prototype.hasOwnProperty.call(props,k)) continue;
      var val = props[k];
      if (val == null) continue;
      if (k === "class") n.className = val;
      else if (k === "href"){
        var u = safeUrl(val);
        if (u){ n.setAttribute("href", u); n.setAttribute("target","_blank"); n.setAttribute("rel","noopener noreferrer"); }
      }
      else n.setAttribute(k, val);
    }
    if (kids != null){
      if (!Array.isArray(kids)) kids = [kids];
      for (var i=0;i<kids.length;i++){
        var c = kids[i];
        if (c == null) continue;
        n.appendChild(typeof c === "object" ? c : document.createTextNode(String(c)));
      }
    }
    return n;
  }
  function safeUrl(u){
    if (!u) return "";
    var s = String(u).trim();
    if (/^(javascript|data|vbscript):/i.test(s)) return "";
    return s;
  }
  function issueUrl(n){ return "https://github.com/openclaw/openclaw/issues/" + n; }

  // This app's own repo — the report-a-problem path (keep in sync w/ config.APP_REPO_URL).
  var REPO = "https://github.com/camilla-oclm/openclaw_status_app";
  // Prefilled new-issue URL: the report lands with the exact page state (version,
  // verdict, assessed-at) already filled in, so "this looks wrong" is actionable.
  function reportUrl(){
    var title = "[report] v"+(DATA.version||"?")+" "+(DATA.recommendation||"")+" — something looks wrong";
    var body = "Page: https://clawstat.us/ · assessed "+(DATA.assessed_at||"?")+"\n"
             + "Version assessed: v"+(DATA.version||"?")+" · verdict shown: "+(DATA.recommendation||"?")+"\n\n"
             + "**What looks wrong?** (a mis-tagged issue, a wrong severity, a verdict that doesn't match the evidence, a page bug...)\n\n";
    return REPO+"/issues/new?title="+encodeURIComponent(title)+"&body="+encodeURIComponent(body);
  }

  // turn "#91035" inside prose into a github link
  function linkify(text){
    var out = [], re = /#(\d{3,})/g, last = 0, m;
    text = String(text || "");
    while ((m = re.exec(text))){
      if (m.index > last) out.push(document.createTextNode(text.slice(last, m.index)));
      out.push(el("a", {"class":"ilink", href: issueUrl(m[1])}, "#" + m[1]));
      last = re.lastIndex;
    }
    if (last < text.length) out.push(document.createTextNode(text.slice(last)));
    return out;
  }

  function timeAgo(iso){
    var t = new Date(iso); if (isNaN(t)) return "";
    var s = (Date.now() - t.getTime())/1000;
    if (s < 0) s = 0;
    var d = Math.floor(s/86400);
    if (d >= 1) return d + (d===1?" day ago":" days ago");
    var h = Math.floor(s/3600); if (h >= 1) return h + "h ago";
    var mn = Math.floor(s/60); return mn + "m ago";
  }
  function fmtDate(iso){
    if (!iso) return "";
    var d = new Date(iso); if (isNaN(d)) return String(iso).slice(0,10);
    return d.toLocaleDateString(undefined,{year:"numeric",month:"short",day:"numeric"});
  }
  function cap(s){ s = String(s||""); return s.charAt(0).toUpperCase()+s.slice(1); }

  // ── lookup tables ─────────────────────────────────────────────────────────
  var VERDICTS = {
    "✅": {label:"Update now",              tone:"tone-good", blurb:"Safe to update — no blocking issues found in this release."},
    "⚠️": {label:"Update with precautions", tone:"tone-warn", blurb:"Worthwhile, but back up first — some real risk remains."},
    "⏸️": {label:"Skip this version",       tone:"tone-bad",  blurb:"Hold off — the open issues outweigh the benefits right now."}
  };
  // Tables carry [key, iconKey, label] — iconKey resolves via ICONS/icon() (inline
  // stroke SVGs), no longer an emoji glyph. Keys/labels are unchanged.
  var CAT = {
    regression:    {icon:"regression", label:"Regression",      cls:"t-bad",  desc:"Confirmed regression — worked before, broken by a recent release."},
    post_release:  {icon:"post", label:"Post-release",     cls:"t-warn", desc:"Filed after this release and affects it, but not confirmed as a regression."},
    diamond_lobster:{icon:"gem", label:"Diamond Lobster", cls:"t-info", desc:"Maintainers' '🦞 diamond lobster' quality rating — a notable issue (not a severity)."},
    active:        {icon:"active", label:"Ongoing",          cls:"t-warn", desc:"Open and ongoing — a long-standing issue not specific to this release."}
  };
  var PLAT = [
    ["windows","windows","Windows"],["macos","macos","macOS"],["linux","linux","Linux"],
    ["ios","ios","iOS"],["android","android","Android"],["web","web","Web UI"],
    ["discord","discord","Discord"],["slack","slack","Slack"],["telegram","telegram","Telegram"],
    ["whatsapp","whatsapp","WhatsApp"],["other-channel","otherchan","Other channels"]
  ];
  var PLAT_LABEL = {}; PLAT.forEach(function(p){ PLAT_LABEL[p[0]] = [p[1], p[2]]; });
  // Components = which subsystem of OpenClaw an issue touches (orthogonal to platforms).
  var COMP = [
    ["gateway","gateway","Gateway"],["models","models","Models"],["memory","memory","Memory"],
    ["sessions","sessions","Sessions"],["auth","auth","Auth"],["channels","channels","Channels"],
    ["plugins","plugins","Plugins"],["agents","agents","Agents"],["tasks","tasks","Tasks"],
    ["tools","tools","Tools"],["build","build","Build"]
  ];
  var COMP_LABEL = {}; COMP.forEach(function(c){ COMP_LABEL[c[0]] = [c[1], c[2]]; });
  // Components come pre-derived in DATA (render side); just normalize to known keys.
  function issueComponents(i){
    var raw = (i && i.components) || [], out = [];
    if (Array.isArray(raw)) raw.forEach(function(c){
      c = String(c||"").toLowerCase(); if (COMP_LABEL[c] && out.indexOf(c)<0) out.push(c);
    });
    return out;
  }
  var IMPACT = {none:{label:"None",w:10},low:{label:"Low",w:38},medium:{label:"Medium",w:68},high:{label:"High",w:100}};

  // ── meter scale: encode BOTH facts the data carries — how MUCH (volume → bar
  // length) and how BAD (worst severity → colour). A graded scale so the worst
  // platforms/components stand out even when every one is "bad".
  var SEVW = {critical:4, high:3, medium:2, low:1};
  function worstSeverity(issues){
    var w = 0, name = "none";
    issues.forEach(function(it){
      var s = String((it&&it.severity)||"low").toLowerCase(), sw = SEVW[s]||0;
      if (sw > w){ w = sw; name = s; }
    });
    return {name:name, w:w};
  }
  // Issues hitting a platform = its own tag OR a cross-cutting "all" issue.
  function platformIssues(k, ki){
    return ki.filter(function(i){ var ps = issuePlatforms(i); return ps.indexOf(k)>=0 || ps.indexOf("all")>=0; });
  }
  function componentIssues(k, ki){
    return ki.filter(function(i){ return issueComponents(i).indexOf(k) >= 0; });
  }
  // Lit segments (0..segs), proportional to count/max with a floor of 1 when non-zero.
  function volFill(count, max, segs){
    if (!count) return 0;
    if (max <= 0) return 1;
    return Math.max(1, Math.min(segs, Math.round(count / max * segs)));
  }
  function issueWord(n){ return n + (n === 1 ? " issue" : " issues"); }

  // Announce a state change to assistive tech via the body-level polite live region
  // (filter results, per-setup verdict updates — changes that are otherwise silent).
  // Clear-then-set (with a beat in between) so repeating the same text re-announces.
  function announce(msg){
    var r = document.getElementById("live");
    if (!r) return;
    r.textContent = "";
    setTimeout(function(){ r.textContent = msg; }, 30);
  }

  // ── personalization: the user's platform/channel "stack" (localStorage) ──
  // A plain { key:true } set; render() reads it so a re-render re-applies the
  // highlights consistently. Toggling a chip just saves + re-renders.
  // A `?stack=linux,gateway` URL param wins over localStorage at boot (shared /
  // bookmarked links open pre-picked; unknown keys are dropped) but is NOT saved
  // until the visitor's first own toggle — opening someone's link doesn't
  // overwrite this device's remembered stack. The param is a QUERY param, not
  // the hash: in-page anchors (skip-link, permalinks) keep working untouched.
  var STACK = {};
  (function(){
    try {
      var fromUrl = (new URLSearchParams(location.search).get("stack") || "")
        .split(",").map(function(s){ return s.trim().toLowerCase(); })
        .filter(function(k){ return PLAT_LABEL[k] || COMP_LABEL[k]; });
      var saved = fromUrl.length ? fromUrl
        : (JSON.parse(localStorage.getItem("oc-stack")) || []);
      for (var i=0;i<saved.length;i++) STACK[saved[i]] = true;
    } catch(e){}
  })();
  function stackKeys(){ var a=[]; for (var k in STACK){ if (Object.prototype.hasOwnProperty.call(STACK,k) && STACK[k]) a.push(k); } return a; }
  function stackActive(){ return stackKeys().length > 0; }
  // The stack mixes platform keys and component keys (disjoint sets); split by membership.
  function stackPlatforms(){ return stackKeys().filter(function(k){ return PLAT_LABEL[k]; }); }
  function stackComponents(){ return stackKeys().filter(function(k){ return COMP_LABEL[k]; }); }
  function saveStack(){
    try { localStorage.setItem("oc-stack", JSON.stringify(stackKeys())); } catch(e){}
    // Mirror the stack into the URL so the address bar is always a shareable
    // deep link (replaceState: no history spam, hash/anchors preserved).
    // NB: window.history explicitly — the bare name is shadowed in this closure
    // by the history() section builder.
    try {
      var qs = new URLSearchParams(location.search), ks = stackKeys();
      if (ks.length) qs.set("stack", ks.join(",")); else qs.delete("stack");
      var q = qs.toString().replace(/%2C/gi, ",");   // commas are query-legal; keep the link readable
      window.history.replaceState(null, "", location.pathname + (q ? "?" + q : "") + location.hash);
    } catch(e){}
  }
  // Title keyword match — the FALLBACK for issues with no analyst `platforms` tag.
  var STACK_MATCH = {
    windows:/windows|win32|\.exe|powershell/i,
    macos:/macos|mac os|imessage|apple|darwin/i,
    linux:/linux|docker|systemd|ubuntu|debian|cgroup/i,
    ios:/\bios\b|iphone|ipad/i,
    android:/android|termux/i,
    web:/web[ -]?ui/i,
    discord:/discord/i,
    slack:/slack/i,
    telegram:/telegram/i,
    whatsapp:/whatsapp|baileys/i,
    "other-channel":/msteams|wechat|bluebubbles|mattermost|nostr|feishu|zalo|twitch|nextcloud|synology|qqbot|\bsms\b/i
  };
  var PLAT_KEYS = {windows:1,macos:1,linux:1,ios:1,android:1,web:1,discord:1,slack:1,telegram:1,whatsapp:1,"other-channel":1,all:1};
  // Surfaces an issue hits: prefer the analyst's structured `platforms`; if absent
  // (pre-structured assessments), fall back to the title keyword heuristic.
  function issuePlatforms(i){
    var out = [], raw = i && i.platforms;
    if (Array.isArray(raw)){
      raw.forEach(function(p){ p=String(p||"").toLowerCase(); if (PLAT_KEYS[p] && out.indexOf(p)<0) out.push(p); });
    }
    if (out.length) return out;
    var title = String((i && i.title) || "");
    for (var k in STACK_MATCH){ if (STACK_MATCH[k].test(title)) out.push(k); }
    return out;
  }
  // Does this issue touch the given platform/component key sets? The shared core of
  // the per-setup verdict AND the per-component line. Matches any listed platform (or
  // a cross-cutting "all" issue when platforms are given) OR any listed component.
  function hitsKeys(i, plats, comps){
    var ps = issuePlatforms(i);
    if (plats.length){
      if (ps.indexOf("all") >= 0) return true;
      for (var j=0;j<plats.length;j++){ if (ps.indexOf(plats[j]) >= 0) return true; }
    }
    var cs = issueComponents(i);
    for (var m=0;m<comps.length;m++){ if (cs.indexOf(comps[m]) >= 0) return true; }
    return false;
  }
  // Does this issue touch the user's stack?
  function issueHitsStack(i){
    if (!stackActive()) return false;
    return hitsKeys(i, stackPlatforms(), stackComponents());
  }
  // ── per-setup verdict ───────────────────────────────────────────────────────
  // A CONSERVATIVE, fail-closed refinement of the global verdict for the user's stack:
  // it softens the global verdict by AT MOST one step, and ONLY when no BLOCKING issue
  // touches them. Fresh releases never soften (the data is still arriving); the result
  // is never harsher than the global verdict. Shared by the panel + the hero CTA so
  // they can't disagree. latest.json/badge/RSS/SSR keep the canonical GLOBAL verdict —
  // this refinement is page-only and device-local.
  //
  // What counts as a BLOCKER is calibrated (the client twin of the analyst's "a hold
  // must be earned" rule): the repo's P labels are bot-applied at scale and the
  // severity-seeking ledger saturates its cap with version-confirmed highs, so
  // "high + version-confirmed" alone stopped discriminating — it pinned every stack on
  // every mature release. Two independent evidence gates, each failing CLOSED when its
  // field is absent (payloads predating the fields keep the old, stricter behavior):
  //   1. severity trust — a HIGH blocks only when a human stands behind its priority
  //      (priority_provenance other than "bot") or the community does (impact bucket
  //      above "low"). CRITICALS always block what they demonstrably touch.
  //   2. breadth — pinning EVERY stack (platforms "all", or the no-platform guard
  //      class) must be earned by megathread-class engagement (impact "high"): server-
  //      side, "all" usually records "no platform signal found", not "confirmed
  //      everywhere". Without that, the issue pins only through its explicit tags.
  var VERDICT_ORDER = ["✅","⚠️","⏸️"];   // increasing caution
  // Evidence-quality gates. Both fail CLOSED on absent fields.
  function humanBacked(i){                       // someone besides the triage bot stands behind it
    var p = i.priority_provenance;
    if (p == null || p === "") return true;      // field absent (pre-2026-07 payload) → trust it
    return String(p).toLowerCase() !== "bot";    // human / bot-corroborated / unknown all count
  }
  function impactAtLeast(i, lvl){                // community-engagement bucket check
    var imp = i.impact;
    if (imp == null || imp === "") return true;  // field absent → trust it (fail closed)
    imp = String(imp).toLowerCase();
    return lvl === "high" ? imp === "high" : imp !== "low";
  }
  // Like hitsKeys, but only EXPLICIT tags match — the cross-cutting "all" token doesn't.
  function hitsExplicit(i, plats, comps){
    var ps = issuePlatforms(i), cs = issueComponents(i);
    for (var j=0;j<plats.length;j++){ if (ps.indexOf(plats[j]) >= 0) return true; }
    for (var m=0;m<comps.length;m++){ if (cs.indexOf(comps[m]) >= 0) return true; }
    return false;
  }
  // Blocking issues for an arbitrary platform/component key set: high/critical AND
  // version-confirmed (or fresh) AND evidenced (gates above) AND landing on the keys.
  function blockersFor(plats, comps){
    var fresh = !!(DATA.freshness && DATA.freshness.fresh);
    return (DATA.known_issues || []).filter(function(i){
      var s = String(i.severity||"low").toLowerCase();
      if (s !== "high" && s !== "critical") return false;
      if (!i.affects_version && !fresh) return false;        // only version-confirmed counts
      // Gate 1 — severity trust: a bot-labeled HIGH with no community traction is the
      // noise class the capped ledger saturates with; it never blocks.
      if (s === "high" && !humanBacked(i) && !impactAtLeast(i, "medium")) return false;
      // Cross-cutting = tagged "all", or the fail-closed no-platform guard class (a
      // version-confirmed blocker with no platform must never "spare" a platform-only
      // picker on classification failure alone — component-only pickers still match
      // via hitsKeys/hitsExplicit below).
      var ps = issuePlatforms(i);
      var crossCut = ps.indexOf("all") >= 0 || (plats.length && ps.length === 0);
      if (crossCut){
        // Gate 2 — breadth: earned → hits everyone; not earned → explicit tags only.
        if (impactAtLeast(i, "high")) return true;
        return hitsExplicit(i, plats, comps);
      }
      return hitsKeys(i, plats, comps);
    });
  }
  function setupBlockers(){ return blockersFor(stackPlatforms(), stackComponents()); }
  // The per-setup machinery evaluated for an arbitrary key set (no picked stack
  // needed) — powers the per-component verdict line. Same conservative rules as
  // setupVerdict: softens AT MOST one notch, never harsher than the global verdict,
  // never ⏸️→✅ (one notch can't cross two steps), fresh releases never soften.
  function keyVerdict(plats, comps){
    var fresh = !!(DATA.freshness && DATA.freshness.fresh);
    var gRec = DATA.recommendation, gIdx = VERDICT_ORDER.indexOf(gRec);
    var blockers = blockersFor(plats, comps);
    var rec = gRec, softened = false;
    if (!fresh && !blockers.length && gIdx > 0){
      rec = VERDICT_ORDER[gIdx - 1];   // soften exactly one notch
      softened = true;
    }
    return {rec:rec, global:gRec, softened:softened, fresh:fresh, blockers:blockers};
  }
  function setupVerdict(){
    var fresh = !!(DATA.freshness && DATA.freshness.fresh);
    var gRec = DATA.recommendation, gIdx = VERDICT_ORDER.indexOf(gRec);
    var blockers = setupBlockers();
    var rec = gRec, softened = false;
    if (stackActive() && !fresh && !blockers.length && gIdx > 0){
      rec = VERDICT_ORDER[gIdx - 1];   // soften exactly one notch
      softened = true;
    }
    return {rec:rec, global:gRec, softened:softened, fresh:fresh, blockers:blockers};
  }
  // Risk height (%) per verdict for the release-health trend — taller = riskier.
  var RISK = {"✅":18,"⚠️":52,"⏸️":100};

  // ── sections ──────────────────────────────────────────────────────────────
  function sectionHead(title, count, note){
    return el("div",{"class":"sec-head"},[
      el("h2",{"class":"sec-title"}, title),
      count != null ? el("span",{"class":"sec-count"}, count) : null,
      note ? el("span",{"class":"sec-note"}, note) : null
    ]);
  }

  // Confidence is categorical (low/medium/high) — shown as a 3-step indicator (not a
  // false percentage) with a plain-language note so "medium" isn't a mystery.
  var CONF_STEP = {high:3, medium:2, low:1};
  var CONF_DESC = {
    high:   "Strong evidence — the data is consistent and fairly complete.",
    medium: "Some evidence gaps remain — treat the verdict as a moderate-strength signal.",
    low:    "Limited or conflicting data — treat as a weak signal and verify against the issues."
  };
  // On a fresh release the evidence is NOT complete yet (reports are still arriving), so
  // the confidence note must not claim completeness — that would contradict the fresh
  // banner. Confidence stays the analyst's read of the risks already found; we just
  // reconcile the caption: strong on what's seen so far, but an early, still-filling read.
  var CONF_DESC_FRESH = {
    high:   "Strong on the evidence so far — but this is a fresh release, so it isn't fully reported yet; the picture keeps filling in over the next few runs.",
    medium: "Some evidence gaps remain, and a fresh release isn't fully reported yet — treat it as a moderate-strength early read.",
    low:    "Limited or conflicting data on a freshly-dropped release — treat as a weak early signal and verify against the issues."
  };
  function confNote(conf){
    return ((DATA.freshness && DATA.freshness.fresh) ? CONF_DESC_FRESH : CONF_DESC)[conf] || "";
  }
  function signalPanel(v){
    var conf = String(DATA.confidence||"medium").toLowerCase();
    var lit = CONF_STEP[conf] || 2;
    var segs = el("div",{"class":"g-segs"});
    for (var gi=1; gi<=3; gi++){ segs.appendChild(el("span",{"class":"g-seg"+(gi<=lit?" on":"")}, null)); }
    var gauge = el("div",{"class":"gauge "+v.tone, title:confNote(conf)},[
      el("div",{"class":"g-top"},[
        el("span",{"class":"g-lab"},"Verdict confidence"),
        el("span",{"class":"g-val"}, cap(conf))
      ]),
      segs,
      el("div",{"class":"g-note"}, confNote(conf))
    ]);
    // Platform glance: bar height = issue volume, colour = worst severity (same
    // scale as the "Platform impact" section), derived from the issue tags.
    var ki = DATA.known_issues || [];
    var stat = {}, maxCount = 0, rows = [];
    PLAT.forEach(function(p){
      var iss = platformIssues(p[0], ki);
      if (!iss.length) return;
      stat[p[0]] = {count:iss.length, worst:worstSeverity(iss).name};
      if (iss.length > maxCount) maxCount = iss.length;
      rows.push(p);
    });
    rows.sort(function(a,b){ return stat[b[0]].count - stat[a[0]].count; });
    var grid = el("div",{"class":"sigplat"});
    rows.slice(0,6).forEach(function(p){
      var a = stat[p[0]];
      grid.appendChild(el("div",{"class":"sp sv-"+a.worst},[
        el("span",{"class":"ico"}, [icon(p[1], 13)]),
        el("span",{"class":"nm"}, p[2]),
        sparkbar(volFill(a.count, maxCount, 5))
      ]));
    });
    var kids = [ el("div",{"class":"sg-h"},"Confidence"), gauge ];
    if (rows.length){ kids.push(el("div",{"class":"sg-h"},"Platform impact")); kids.push(grid); }
    var spark = riskSparkline();
    if (spark){ kids.push(el("div",{"class":"sg-h"}, spark.head)); kids.push(spark.node); }
    return el("div",{"class":"signal"}, kids);
  }
  function sparkbar(on){   // `on` = number of lit bars (0..5); colour inherited via --ic
    var bar = el("span",{"class":"sparkbar"});
    for (var i=0;i<5;i++){ bar.appendChild(el("i",{"class": i<on?"on":"", style:"height:"+(5+i*2)+"px"}, null)); }
    return bar;
  }
  var SVGNS = "http://www.w3.org/2000/svg";
  function svgEl(name, attrs){
    var n = document.createElementNS(SVGNS, name);
    if (attrs) for (var k in attrs){ if (Object.prototype.hasOwnProperty.call(attrs,k) && attrs[k]!=null) n.setAttribute(k, attrs[k]); }
    return n;
  }

  // ── inline icon set — monochrome stroke SVGs (currentColor) replacing the
  //    platform/component/category emoji, which rendered differently on every OS.
  //    Verdict emoji (the ✅/⚠️/⏸️ data keys) stay text everywhere — they are the
  //    cross-surface identity shared with SSR / llms.txt / badge / RSS.

  function riskSparkline(){
    var H = (DATA.version_history||[]).slice(), vals, firstLabel, head;
    if (H.length >= 2){
      H.sort(function(a,b){ return String(a.assessed_at).localeCompare(String(b.assessed_at)); });
      H = H.slice(-12);
      vals = H.map(function(e){ return RISK[e.recommendation]||30; });
      firstLabel = "v"+H[0].version; head = "Risk trend";
    } else {
      // Only one release tracked so far → no cross-version line yet. Fall back to the
      // per-run timeline and plot issue pressure (open issues per run) — a live, moving
      // signal — then auto-promote to the cross-version Risk trend once a 2nd version lands.
      var tl = (DATA.timeline||[]).filter(function(r){ return !r.approx; });
      tl.sort(function(a,b){ return String(a.t).localeCompare(String(b.t)); });
      tl = tl.slice(-12);
      if (tl.length < 2) return null;
      var mx = Math.max.apply(null, tl.map(function(r){ return r.issues||0; })) || 1;
      vals = tl.map(function(r){ return Math.round(100*(r.issues||0)/mx); });
      firstLabel = timeAgo(tl[0].t); head = "Issue trend";
    }
    var W=200, HT=42, n=vals.length, pad=3;
    var xs=function(i){ return pad + (n===1?0:i*((W-2*pad)/(n-1))); };
    var ys=function(r){ return (HT-pad) - (r/100)*(HT-2*pad); };
    var pts = vals.map(function(v,i){ return xs(i)+","+ys(v); });
    var svg = svgEl("svg",{viewBox:"0 0 "+W+" "+HT, preserveAspectRatio:"none"});
    svg.appendChild(svgEl("polygon",{points: xs(0)+","+(HT-pad)+" "+pts.join(" ")+" "+xs(n-1)+","+(HT-pad), fill:"var(--tone-bg)"}));
    svg.appendChild(svgEl("polyline",{points: pts.join(" "), fill:"none", stroke:"var(--tone)", "stroke-width":"2", "stroke-linejoin":"round", "stroke-linecap":"round"}));
    svg.appendChild(svgEl("circle",{cx:xs(n-1), cy:ys(vals[n-1]), r:"3", fill:"var(--tone)"}));
    var wrap = el("div",{"class":"sigtrend", role:"img", "aria-label": head + " across recent assessments"});
    svg.setAttribute("aria-hidden","true");
    wrap.appendChild(svg);
    wrap.appendChild(el("div",{"class":"cap"},[ el("span",null,firstLabel), el("span",null,"now") ]));
    return {head:head, node:wrap};
  }

      el("span",{"class":"chip"},[document.createTextNode("Assessed "), el("b",null,timeAgo(DATA.assessed_at))])
    ];
    if (pre.tag){
      var preTip = "A newer release is staged in pre-release. Until those fixes ship in a stable release, the current version still carries the issues below — so the verdict stays Skip / Update-with-care.";

        : el("span",{"class":"chip", title:preTip}, preKids));
    }
    // Dual-model review outcome — the central reason to trust an automated verdict: show
    // that a second, independent model concurred, or that the verdict was REVISED after it
    // pushed back, rather than asking the user to take the first analyst on faith. The chip
    // expands into the validator's actual findings (reviewDetail) — the trust claim is
    // inspectable, not just asserted in a tooltip.
    var rv = DATA.review || {};
    var rvPanel = null;
    if (rv.validated){
      var rvText, rvTip;
      if (rv.refined && rv.primary_recommendation && rv.primary_recommendation !== (DATA.recommendation||"")){
        rvText = "Revised "+rv.primary_recommendation+"→"+(DATA.recommendation||"")+" on review";
        rvTip = "The first analyst model said "+rv.primary_recommendation+"; an independent second model challenged it and the verdict was revised.";
      } else if (rv.agreed){
        rvText = "2nd model agreed";
        rvTip = "An independent second model reviewed this verdict and concurred.";
      } else {

    var heroBlurb = v.blurb;

    }

    var main = el("div",{"class":"hero-main"},[
      el("div",{"class":"eyebrow"},"Release assessment"),
      el("h1",{"class":"hero-version"},["OpenClaw ", el("span",{"class":"vnum"},"v"+(DATA.version||"?"))]),
      el("div",{"class":"hero-sub"}, subNodes),
      (rel.url

            [el("span",{"class":"em"},DATA.recommendation||"?"), document.createTextNode(v.label), el("span",{"class":"v-ext","aria-hidden":"true"},"↗")])
        : el("div",{"class":"verdict "+v.tone},[el("span",{"class":"em"},DATA.recommendation||"?"), document.createTextNode(v.label)])),
      el("div",{"class":"verdict-blurb"}, heroBlurb),

  // What the second model actually said — expands from the ⚖︎ chip. Shows the exchange's

  function reviewDetail(rv){
    var d = rv.detail || {};

    var status;
    if (rv.refined && rv.primary_recommendation && rv.primary_recommendation !== (DATA.recommendation||""))
