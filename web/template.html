<style>
/* ═══════════════════════════════════════════════════════════════════════════
   ClawStat.us — "status board / data-viz" design system
   Zero-dependency, dark/light, mobile-first. Inlined into template.html on ship.
   ═══════════════════════════════════════════════════════════════════════════ */

/* Self-hosted display font — Space Grotesk (variable, latin subset, ~22KB).
   No runtime CDN: the woff2 ships next to the page (web/fonts/), so the page
   stays offline/file:///CSP-safe. Headings only; body + numerals stay system/mono. */
@font-face{
  font-family:"Space Grotesk";
  font-style:normal; font-weight:300 700; font-display:swap;
  src:url(fonts/SpaceGrotesk-var.woff2) format("woff2");
}

:root{
  /* palette — dark (Warm Charcoal: soft warm slate, muted teal accent; eased off
     pure-black/pure-white so body text sits ~12:1 instead of a harsh ~17:1) */
  --bg:#16181d; --bg-elev:#1a1d23;
  --card:#1e222a; --card2:#232831; --card3:#2a303b;
  --border:#30353f; --border2:#3d434f;
  --text:#d3d6dc; --muted:#969ca8; --faint:#808795;  /* faint ≥4.5:1 on bg+card (AA small text) */
  --on-accent:#04121a;                               /* text on accent-filled chips/buttons */
  --accent:#45c4cc; --accent2:#8294cf;        /* muted teal → periwinkle */
  --good:#57c285; --warn:#d6ab57; --orange:#e8945e; --bad:#e67483; --info:#7e9fd6; --gray:#8b919d;
  --good-bg:rgba(87,194,133,.12); --warn-bg:rgba(214,171,87,.13);
  --bad-bg:rgba(230,116,131,.13); --info-bg:rgba(126,159,214,.13); --gray-bg:rgba(139,145,157,.12);
  --good-bd:rgba(87,194,133,.40); --warn-bd:rgba(214,171,87,.42);
  --bad-bd:rgba(230,116,131,.42); --info-bd:rgba(126,159,214,.42); --gray-bd:rgba(139,145,157,.34);

  /* type */
  --sans:ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --display:"Space Grotesk",ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,sans-serif;
  --mono:ui-monospace,"SFMono-Regular","SF Mono",Menlo,"JetBrains Mono",Consolas,monospace;

  /* radius / shadow / motion */
  --r-sm:8px; --r-md:12px; --r-lg:16px; --r-xl:22px;
  --shadow-1:0 1px 2px rgba(0,0,0,.4);
  --shadow-2:0 6px 24px -8px rgba(0,0,0,.55),0 1px 2px rgba(0,0,0,.4);
  --shadow-glow:0 0 0 1px var(--tone-bd),0 10px 40px -16px var(--tone);
  --ease:cubic-bezier(.4,.14,.3,1);
  --grid-line:rgba(120,150,200,.05);
}
html[data-theme="light"]{
  /* light — warm paper to match Warm Charcoal; text eased off near-black (~12:1) */
  --bg:#f4f2ed; --bg-elev:#ece9e2;
  --card:#fbfaf7; --card2:#f3f1ea; --card3:#ece8e0;
  --border:#e2ddd3; --border2:#d0ccc0;
  --text:#2f3238; --muted:#5e616a; --faint:#696c74;  /* ≥4.5:1 on paper bg+card */
  --accent:#18929b; --accent2:#5566b8;
  --good:#1f8f57; --warn:#8a6a1f; --orange:#b9591f; --bad:#c5414f; --info:#3a63c4; --gray:#6b6f78;
  --good-bg:rgba(31,143,87,.10); --warn-bg:rgba(138,106,31,.12);
  --bad-bg:rgba(197,65,79,.09); --info-bg:rgba(58,99,196,.10); --gray-bg:rgba(107,111,120,.10);
  --good-bd:rgba(31,143,87,.38); --warn-bd:rgba(138,106,31,.40);
  --bad-bd:rgba(197,65,79,.38); --info-bd:rgba(58,99,196,.36); --gray-bd:rgba(107,111,120,.30);
  --shadow-1:0 1px 2px rgba(40,36,30,.06);
  --shadow-2:0 10px 30px -12px rgba(40,36,30,.16),0 1px 2px rgba(40,36,30,.06);
  --grid-line:rgba(90,80,60,.05);
}

*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%; scroll-behavior:smooth}
body{
  font-family:var(--sans);
  background:var(--bg); color:var(--text);
  line-height:1.6; font-size:15px; letter-spacing:.01em; min-height:100vh;
  position:relative;
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
}
/* status-board backdrop: faint grid + two soft tonal glows */
body::before{
  content:""; position:fixed; inset:0; z-index:-2; pointer-events:none;
  background:
    linear-gradient(var(--grid-line) 1px,transparent 1px) 0 0/34px 34px,
    linear-gradient(90deg,var(--grid-line) 1px,transparent 1px) 0 0/34px 34px;
  mask-image:radial-gradient(120% 90% at 50% 0%,#000 35%,transparent 78%);
}
body::after{
  content:""; position:fixed; inset:0 0 auto 0; height:60vh; z-index:-3; pointer-events:none;
  background:
    radial-gradient(60% 60% at 12% 0%,color-mix(in srgb,var(--accent) 12%,transparent),transparent 70%),
    radial-gradient(55% 60% at 92% 4%,color-mix(in srgb,var(--accent2) 10%,transparent),transparent 70%);
}

.tone-good{--tone:var(--good);--tone-bg:var(--good-bg);--tone-bd:var(--good-bd)}
.tone-warn{--tone:var(--warn);--tone-bg:var(--warn-bg);--tone-bd:var(--warn-bd)}
.tone-bad{--tone:var(--bad);--tone-bg:var(--bad-bg);--tone-bd:var(--bad-bd)}
.tone-info{--tone:var(--info);--tone-bg:var(--info-bg);--tone-bd:var(--info-bd)}
.tone-muted{--tone:var(--gray);--tone-bg:var(--gray-bg);--tone-bd:var(--gray-bd)}

/* ── top bar ───────────────────────────────────────────────────────────── */
.topbar{
  position:sticky; top:0; z-index:30;
  display:flex; align-items:center; justify-content:space-between; gap:1rem;
  padding:.6rem clamp(1rem,4vw,2rem);
  background:color-mix(in srgb,var(--bg) 72%,transparent);
  backdrop-filter:saturate(150%) blur(14px);
  -webkit-backdrop-filter:saturate(150%) blur(14px);
  border-bottom:1px solid var(--border);
}
.brand{display:flex; align-items:center; gap:.6rem; font-weight:800; font-size:1.05rem; letter-spacing:-.02em}
.brand .logo{
  width:30px; height:30px; display:grid; place-items:center; color:var(--accent);
  border-radius:9px; background:var(--card2); border:1px solid var(--border2);
  box-shadow:inset 0 0 14px -6px var(--accent);
}
.brand .logo svg{display:block}
.brand .wm{font-family:var(--display)}
.brand .wm .dot{color:var(--accent)}
.brand .dim{
  font-family:var(--mono); font-weight:600; font-size:.66rem; letter-spacing:.14em;
  text-transform:uppercase; color:var(--muted);
  padding:.18rem .5rem; border-radius:999px; border:1px solid var(--border2); background:var(--card);
  margin-left:.15rem;
}
.bar-right{display:flex; align-items:center; gap:.55rem}
.fresh{
  display:inline-flex; align-items:center; gap:.4rem;
  font-size:.76rem; font-weight:700; padding:.32rem .7rem; border-radius:999px;
  background:var(--tone-bg); color:var(--tone); border:1px solid var(--tone-bd);
}
.fresh .dot{width:7px;height:7px;border-radius:50%;background:var(--tone); box-shadow:0 0 0 0 var(--tone); animation:pulse 2.4s var(--ease) infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 color-mix(in srgb,var(--tone) 55%,transparent)}70%{box-shadow:0 0 0 6px transparent}100%{box-shadow:0 0 0 0 transparent}}
.icon-btn{
  display:inline-flex; align-items:center; justify-content:center;
  width:34px;height:34px;border-radius:10px; cursor:pointer;
  background:var(--card); border:1px solid var(--border2); color:var(--text);
  font-size:.95rem; transition:.16s var(--ease);
}
.icon-btn:hover{background:var(--card2); border-color:var(--accent); transform:translateY(-1px)}

.wrap{max-width:1000px; margin:0 auto; padding:clamp(1.2rem,3.5vw,2.4rem) clamp(1rem,4vw,2rem) 5rem}

/* ── hero / status header ──────────────────────────────────────────────── */
.hero{
  position:relative; overflow:hidden;
  border:1px solid var(--border2); border-radius:var(--r-xl);
  background:
    radial-gradient(130% 130% at 0% 0%, var(--tone-bg), transparent 52%),
    linear-gradient(180deg,var(--card2),var(--card));
  padding:1.6rem 1.7rem; margin-bottom:1.1rem;
  box-shadow:var(--shadow-2);
  display:grid; grid-template-columns:1.35fr .95fr; gap:1.4rem 1.8rem;
}
.hero::before{content:""; position:absolute; left:0; top:0; bottom:0; width:5px; background:linear-gradient(var(--tone),transparent)}
.hero-main{min-width:0}
.eyebrow{
  display:inline-flex; align-items:center; gap:.5rem;
  font-family:var(--mono); font-size:.7rem; letter-spacing:.12em; text-transform:uppercase;
  color:var(--muted); font-weight:600;
}
.eyebrow::before{content:""; width:6px; height:6px; border-radius:50%; background:var(--tone); box-shadow:0 0 8px var(--tone)}
.hero-version{font-family:var(--display); font-size:clamp(1.6rem,4.6vw,2.3rem); font-weight:800; margin:.5rem 0 0; letter-spacing:-.03em; line-height:1.05}
.hero-version .vnum{font-family:var(--mono); color:var(--tone); font-weight:700}
.hero-sub{color:var(--muted); font-size:.84rem; margin-top:.3rem; font-family:var(--mono)}
.hero-sub .sep{opacity:.45; margin:0 .45rem}
.verdict{
  display:inline-flex; align-items:center; gap:.6rem; margin-top:1.25rem;
  font-family:var(--display); font-size:1.4rem; font-weight:800; letter-spacing:-.02em;
  padding:.7rem 1.15rem; border-radius:var(--r-md);
  background:var(--tone-bg); color:var(--tone); border:1px solid var(--tone-bd);
  box-shadow:inset 0 0 24px -14px var(--tone);
}
.verdict .em{font-size:1.5rem; line-height:1}
/* verdict pill / pre-release chip as links to the GitHub release */
a.verdict{text-decoration:none; cursor:pointer; transition:filter .15s var(--ease), box-shadow .15s var(--ease)}
a.verdict:hover{filter:brightness(1.07); box-shadow:inset 0 0 24px -10px var(--tone), 0 0 0 1px var(--tone-bd)}
.verdict .v-ext{font-size:.9rem; opacity:.65; margin-left:.15rem; align-self:flex-start}
a.chip{text-decoration:none; cursor:pointer; transition:border-color .15s var(--ease), color .15s var(--ease)}
a.chip:hover{border-color:var(--accent); color:var(--text)}
.chip .v-ext{font-size:.72rem; opacity:.7; margin-left:.1rem}
.verdict-blurb{margin-top:.85rem; color:var(--text); font-weight:600; font-size:1.02rem}
.hero-headline{margin-top:.5rem; color:var(--muted); font-size:.95rem; max-width:60ch}
.conf-row{display:flex; flex-wrap:wrap; gap:.5rem; margin-top:1.1rem; align-items:center}
/* hero CTA → jump to "Your setup"; becomes a live per-setup verdict once a stack is picked */
.setup-cta{margin-top:.95rem; display:inline-flex; flex-wrap:wrap; align-items:center; justify-content:center; gap:.15rem .4rem; font:inherit; font-size:.82rem; cursor:pointer; background:transparent; border:1px dashed var(--tone-bd); color:var(--muted); padding:.4rem .85rem; border-radius:999px; transition:.15s var(--ease)}
.setup-cta:hover{color:var(--text); border-color:var(--tone); background:var(--tone-bg)}
.setup-cta .sv-em{font-size:1rem; line-height:1}
.setup-cta b{color:var(--tone); white-space:nowrap}
.chip{
  display:inline-flex; align-items:center; gap:.4rem; font-size:.75rem; font-weight:600;
  padding:.34rem .72rem; border-radius:999px; border:1px solid var(--border2);
  background:var(--card3); color:var(--muted);
}
.chip b{color:var(--text); font-weight:700}
.chip.lvl-high{color:var(--good); border-color:var(--good-bd); background:var(--good-bg)}
.chip.lvl-medium{color:var(--warn); border-color:var(--warn-bd); background:var(--warn-bg)}
.chip.lvl-low{color:var(--bad); border-color:var(--bad-bd); background:var(--bad-bg)}

/* ── ⚖︎ chip → second-model review expander ─────────────────────────────── */
button.chip{font:inherit; font-size:.75rem; cursor:pointer; transition:border-color .15s var(--ease), color .15s var(--ease)}
button.chip:hover{border-color:var(--accent); color:var(--text)}
.chip .cx{font-size:.58rem; color:var(--muted); transition:transform .15s var(--ease); display:inline-block}
.chip[aria-expanded="true"] .cx{transform:rotate(180deg)}
.rev-detail{margin-top:.85rem; max-width:62ch; background:var(--card); border:1px solid var(--border); border-left:3px solid var(--accent); border-radius:var(--r-md); padding:.95rem 1.1rem; font-size:.86rem; text-align:left}
.rev-detail .rvd-h{font-size:.7rem; text-transform:uppercase; letter-spacing:.06em; font-weight:800; color:var(--accent); margin-bottom:.5rem}
.rev-detail .rvd-status{color:var(--text)}
.rev-detail .rvd-quote{border-left:2px solid var(--border2); margin:.6rem 0; padding:.1rem 0 .1rem .75rem; color:var(--muted); font-style:italic}
.rev-detail .rvd-k{font-weight:700; font-size:.78rem; margin-top:.7rem; color:var(--text)}
.rev-detail .rvd-list{list-style:none; margin-top:.35rem; display:flex; flex-direction:column; gap:.3rem}
.rev-detail .rvd-list li{position:relative; padding-left:1rem; color:var(--muted)}
.rev-detail .rvd-list li::before{content:"›"; position:absolute; left:0; color:var(--accent)}
.rev-detail .rvd-note{margin-top:.7rem; font-size:.76rem; color:var(--faint)}

/* hero right column: the "signal panel" — confidence gauge + live mini-viz */
.signal{
  align-self:stretch; min-width:0;
  border:1px solid var(--border); border-radius:var(--r-lg);
  background:color-mix(in srgb,var(--bg-elev) 70%,transparent);
  padding:1rem 1.05rem; display:flex; flex-direction:column; gap:.95rem;
}
.signal .sg-h{font-family:var(--mono); font-size:.66rem; letter-spacing:.14em; text-transform:uppercase; color:var(--faint); font-weight:600}
/* confidence gauge */
.gauge{display:flex; flex-direction:column; gap:.4rem}
.gauge .g-top{display:flex; align-items:baseline; justify-content:space-between}
.gauge .g-val{font-family:var(--mono); font-weight:800; font-size:1.05rem; color:var(--tone)}
.gauge .g-lab{font-size:.74rem; color:var(--muted); font-weight:600}
.gauge .g-segs{display:flex; gap:5px}
.gauge .g-seg{flex:1; height:9px; border-radius:999px; background:var(--card3); border:1px solid var(--border)}
.gauge .g-seg.on{background:var(--tone); border-color:var(--tone); box-shadow:0 0 10px -3px var(--tone)}
.gauge .g-note{font-size:.72rem; color:var(--muted); line-height:1.4}
/* signal: platform sparkbars */
.sigplat{display:grid; grid-template-columns:1fr 1fr; gap:.55rem .9rem}
.sigplat .sp{display:flex; align-items:center; gap:.5rem; min-width:0}
.sigplat .sp .ico{font-size:.85rem; width:1.1rem; text-align:center}
.sigplat .sp .nm{font-size:.74rem; color:var(--muted); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.sparkbar{display:flex; gap:2px; align-items:flex-end; height:14px}
.sparkbar i{width:4px; border-radius:1px; background:var(--ic,var(--gray)); opacity:.3}
.sparkbar i.on{opacity:1}
.imp-none{--ic:var(--good)} .imp-low{--ic:var(--info)} .imp-medium{--ic:var(--warn)} .imp-high{--ic:var(--bad)}
/* severity colour ramp (worst-severity → colour): critical≠high≠medium≠low, distinct steps */
.sv-critical{--ic:var(--bad)} .sv-high{--ic:var(--orange)} .sv-medium{--ic:var(--warn)} .sv-low{--ic:var(--gray)} .sv-none{--ic:var(--good)}
/* signal: risk sparkline */
.sigtrend{display:flex; flex-direction:column; gap:.35rem}
.sigtrend svg{width:100%; height:42px; display:block; overflow:visible}
.sigtrend .cap{display:flex; justify-content:space-between; font-size:.68rem; color:var(--faint); font-family:var(--mono)}

/* ── low-confidence banner ─────────────────────────────────────────────── */
.banner{
  display:flex; gap:.7rem; align-items:flex-start; margin-bottom:1.1rem;
  padding:.9rem 1.05rem; border-radius:var(--r-md);
  background:var(--warn-bg); border:1px solid var(--warn-bd); color:var(--text); font-size:.88rem;
}
.banner .bi{font-size:1.1rem; line-height:1.3}
/* fresh-release notice — informational (teal), distinct from the red low-conf one */
.banner-fresh{background:var(--info-bg); border-color:var(--info-bd)}
.banner-fresh .bi{font-size:1.25rem}
.banner-body{display:flex; flex-direction:column; gap:.3rem; min-width:0}
.banner-title{font-weight:700; color:var(--text)}
.banner-body .ba strong{color:var(--accent)}

/* ── signal tiles (stats) ──────────────────────────────────────────────── */
.stats{display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:.8rem; margin-bottom:1.8rem}
.stat{
  position:relative; overflow:hidden;
  background:linear-gradient(180deg,var(--card2),var(--card));
  border:1px solid var(--border); border-radius:var(--r-md);
  padding:.95rem 1.05rem; box-shadow:var(--shadow-1);
  transition:transform .18s var(--ease), border-color .18s var(--ease);
}
.stat::before{content:""; position:absolute; left:0; top:0; right:0; height:2px; background:linear-gradient(90deg,var(--sc,var(--accent)),transparent)}
.stat:hover{transform:translateY(-2px); border-color:var(--border2)}
.stat .v{font-size:1.9rem; font-weight:800; font-family:var(--mono); line-height:1.05; color:var(--sc,var(--text))}
.stat .l{font-size:.72rem; color:var(--muted); margin-top:.25rem; text-transform:uppercase; letter-spacing:.05em; font-weight:700}
.stat .s{font-size:.74rem; color:var(--faint); margin-top:.15rem}

/* ── sections ──────────────────────────────────────────────────────────── */
.section{margin-top:2.2rem}
.reveal{opacity:0; transform:translateY(14px); transition:opacity .55s var(--ease), transform .55s var(--ease)}
.reveal.in{opacity:1; transform:none}
.sec-head{display:flex; align-items:baseline; gap:.6rem; margin-bottom:1rem; padding-bottom:.55rem; border-bottom:1px solid var(--border)}
.sec-title{font-family:var(--display); font-size:1.2rem; font-weight:800; letter-spacing:-.02em}
.sec-count{font-family:var(--mono); font-size:.78rem; color:var(--accent); font-weight:700; padding:.1rem .5rem; border:1px solid var(--border2); border-radius:999px; background:var(--card)}
.sec-note{font-size:.8rem; color:var(--muted); margin-left:auto; font-weight:500}

/* permalinks: anchorable section headers + deep-link target highlight */
.sec-head{position:relative}
.sec-anchor{position:absolute; left:-1.15em; top:0; font-family:var(--mono); font-weight:700; color:var(--faint); text-decoration:none; opacity:0; transition:opacity .15s var(--ease)}
.sec-head:hover .sec-anchor, .sec-anchor:focus-visible, .sec-anchor.copied{opacity:1}
.sec-anchor:hover{color:var(--accent)}
.sec-anchor.copied{color:var(--good)}
.section{scroll-margin-top:74px}
.section:target .sec-title, .section.tgt .sec-title{color:var(--accent)}
.section:target .sec-head, .section.tgt .sec-head{border-bottom-color:var(--accent)}

.prose{
  background:var(--card); border:1px solid var(--border); border-radius:var(--r-md);
  padding:1.2rem 1.3rem; font-size:.97rem; color:var(--text); box-shadow:var(--shadow-1);
}
.prose p{margin-bottom:.8rem} .prose p:last-child{margin-bottom:0}
.ilink{color:var(--accent); text-decoration:none; font-family:var(--mono); font-size:.92em; font-weight:600}
.ilink:hover{text-decoration:underline}

/* ── evidence ──────────────────────────────────────────────────────────── */
.ev-grid{display:grid; grid-template-columns:1fr 1fr; gap:.9rem}
@media(max-width:680px){.ev-grid{grid-template-columns:1fr}}
.ev-card{background:var(--card); border:1px solid var(--border); border-radius:var(--r-md); padding:1.1rem 1.2rem; box-shadow:var(--shadow-1)}
.ev-card h3{font-size:.8rem; text-transform:uppercase; letter-spacing:.05em; display:flex; align-items:center; gap:.45rem; margin-bottom:.75rem; font-weight:800}
.ev-for h3{color:var(--good)} .ev-against h3{color:var(--bad)} .ev-neutral h3{color:var(--muted)}
.ev-card ul{list-style:none; display:flex; flex-direction:column; gap:.6rem; max-height:17rem; overflow-y:auto; padding-right:.4rem}
.ev-card li{position:relative; padding-left:1.15rem; font-size:.9rem; color:var(--text)}
.ev-card li::before{content:""; position:absolute; left:0; top:.5em; width:7px; height:7px; border-radius:50%}
.ev-for li::before{background:var(--good)} .ev-against li::before{background:var(--bad)} .ev-neutral li::before{background:var(--gray)}
.ev-neutral{grid-column:1/-1}

/* ── flip conditions (what would change this verdict) ──────────────────── */
.flip-card{background:var(--card); border:1px solid var(--border); border-radius:var(--r-md); padding:1.1rem 1.2rem; box-shadow:var(--shadow-1)}
.flip-card ul{list-style:none; display:flex; flex-direction:column; gap:.65rem}
.flip-card li{position:relative; padding-left:1.5rem; font-size:.9rem; color:var(--text)}
.flip-card li::before{content:"⚡"; position:absolute; left:0; top:0; font-size:.85rem; color:var(--accent)}
.flip-note{font-size:.76rem; color:var(--faint); margin-top:.8rem}

/* ── filters / issues ──────────────────────────────────────────────────── */
.filters{display:flex; flex-wrap:wrap; gap:.45rem; margin-bottom:1rem}
.fbtn{
  font-size:.78rem; font-weight:600; padding:.34rem .82rem; border-radius:999px; cursor:pointer;
  background:var(--card); border:1px solid var(--border2); color:var(--muted); transition:.15s var(--ease);
}
.fbtn:hover{color:var(--text); border-color:var(--accent)}
.fbtn[aria-pressed="true"]{background:var(--accent); border-color:var(--accent); color:var(--on-accent); font-weight:700}
.fcomp[aria-pressed="true"]{background:var(--accent2); border-color:var(--accent2)}
.fsep{display:inline-flex; align-items:center; margin-left:.35rem; padding-left:.5rem; border-left:1px solid var(--border2);
  font-size:.64rem; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--faint)}
.issue{
  background:var(--card); border:1px solid var(--border); border-left-width:3px; border-radius:var(--r-md);
  margin-bottom:.4rem; box-shadow:var(--shadow-1); overflow:hidden; transition:border-color .15s var(--ease)}
.issue:hover{border-color:var(--border2)}
.issue.sev-critical{border-left-color:var(--bad); border-left-width:4px}
.issue.sev-high{border-left-color:var(--orange,#e08a3c)}
.issue.sev-medium{border-left-color:var(--warn)}
.issue.sev-low{border-left-color:var(--gray)}
/* compact summary row (click to expand) */
.irow{display:flex; align-items:center; gap:.55rem; width:100%; text-align:left; cursor:pointer;
  background:none; border:0; color:inherit; font:inherit; padding:.5rem .85rem}
.irow:hover{background:var(--card2)}
.irow:focus-visible{outline:2px solid var(--accent); outline-offset:-2px}
.sevdot{flex:none; width:9px; height:9px; border-radius:50%; background:var(--gray)}
.issue.sev-critical .sevdot{background:var(--bad)}
.issue.sev-high .sevdot{background:var(--orange,#e08a3c)}
.issue.sev-medium .sevdot{background:var(--warn)}
.inum{flex:none; font-family:var(--mono); font-size:.78rem; font-weight:700; color:var(--accent)}
.ititle{flex:1 1 auto; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-weight:600; font-size:.9rem; color:var(--text)}
.ibs{flex:none; display:flex; align-items:center; gap:.35rem}
.ib{display:inline-flex; align-items:center; gap:.2rem; font-size:.72rem; font-weight:700; color:var(--muted)}
.chev{flex:none; color:var(--faint); font-size:.7rem; transition:transform .15s var(--ease)}
.irow[aria-expanded="true"] .chev{transform:rotate(90deg)}
.idetail{padding:.15rem .85rem .8rem 1.45rem}
.idet-title{font-size:.88rem; font-weight:600; color:var(--text); line-height:1.45; margin-bottom:.45rem; overflow-wrap:anywhere}
.idetail[hidden]{display:none}
.idet-link{display:inline-block; margin-top:.55rem; font-size:.78rem; font-weight:700; color:var(--accent); text-decoration:none}
.idet-link:hover{text-decoration:underline}
.ki-more{display:block; margin:.5rem auto 0; font-size:.82rem; font-weight:700; color:var(--accent);
  background:var(--card); border:1px solid var(--border2); border-radius:999px; padding:.4rem 1.15rem; cursor:pointer; transition:.15s var(--ease)}
.ki-more:hover{border-color:var(--accent); color:var(--text)}
.issue .tags{display:flex; flex-wrap:wrap; gap:.35rem; margin-top:.5rem}
.tag{
  display:inline-flex; align-items:center; gap:.3rem; font-size:.71rem; font-weight:600;
  padding:.2rem .55rem; border-radius:999px; border:1px solid var(--border2);
  background:var(--card3); color:var(--muted);
}
.tag.t-bad{color:var(--bad); border-color:var(--bad-bd); background:var(--bad-bg)}
.tag.t-warn{color:var(--warn); border-color:var(--warn-bd); background:var(--warn-bg)}
.tag.t-good{color:var(--good); border-color:var(--good-bd); background:var(--good-bg)}
.tag.t-info{color:var(--accent); border-color:var(--info-bd); background:var(--info-bg)}
.tag.t-plat{color:var(--text); border-color:var(--border2); background:var(--card2); font-weight:700}
.tag.t-comp{color:var(--accent2); font-weight:700; border-color:color-mix(in srgb,var(--accent2) 38%,transparent); background:color-mix(in srgb,var(--accent2) 13%,transparent)}
.issue.mine{border-color:var(--info-bd); box-shadow:0 0 0 1px var(--info-bd), var(--shadow-1)}
.tag.t-me{color:var(--accent); border-color:var(--info-bd); background:var(--info-bg)}
/* heuristic (auto-detected) platform/subsystem tags read quieter than asserted ones */
.tag.t-auto{color:var(--faint); border-style:dashed}
/* raw maintainer-assigned GitHub labels — a verifiable FACT, shown mono + muted */
.tag.tag-raw{color:var(--muted); background:var(--card); border-color:var(--border); font-family:var(--mono); font-weight:500; font-size:.66rem}

/* ── tabs (changes) ────────────────────────────────────────────────────── */
.tabs{display:flex; gap:.4rem; margin-bottom:1rem; flex-wrap:wrap}
.tab{
  font-size:.83rem; font-weight:600; padding:.42rem .95rem; border-radius:10px; cursor:pointer;
  background:var(--card); border:1px solid var(--border2); color:var(--muted); transition:.15s var(--ease);
  display:inline-flex; align-items:center; gap:.45rem;
}
.tab:hover{color:var(--text)}
.tab[aria-selected="true"]{background:var(--card3); color:var(--text); border-color:var(--accent)}
.tab .cnt{font-family:var(--mono); font-size:.74rem; background:var(--bg-elev); padding:.05rem .42rem; border-radius:6px; color:var(--muted)}
/* ── top-level long-tail tabs (Impact / History / Trends / What's new) ─────────
   Group the secondary detail below the always-visible decision. Namespaced .ltab*
   so they never collide with the inner .tab pills used inside the changelog. */
.ltab-wrap{margin-top:2.8rem}
.ltabs{display:flex; gap:.4rem; flex-wrap:wrap; border-bottom:1px solid var(--border)}
.ltab{
  font-family:var(--display); font-size:.95rem; font-weight:700; letter-spacing:-.01em;
  color:var(--muted); background:var(--card2); border:1px solid var(--border); border-bottom:none;
  border-radius:10px 10px 0 0; padding:.58rem 1.15rem; cursor:pointer; position:relative; top:1px;
  transition:color .15s var(--ease), background .15s var(--ease), border-color .15s var(--ease);
}
.ltab:hover{color:var(--text); background:var(--card3); border-color:var(--border2)}
.ltab[aria-selected="true"], .ltab[aria-pressed="true"]{
  color:var(--accent); background:color-mix(in srgb,var(--accent) 13%,var(--card));
  border-color:color-mix(in srgb,var(--accent) 45%,var(--border)); border-bottom-color:transparent;
}
.ltab[aria-selected="true"]::after, .ltab[aria-pressed="true"]::after{content:""; position:absolute; left:.6rem; right:.6rem; bottom:-1px; height:3px; background:var(--accent); border-radius:3px; box-shadow:0 0 10px -1px color-mix(in srgb,var(--accent) 70%,transparent)}
/* Known-issues category tabs reuse .ltabs/.ltab; subsystem chips sit on a row below. */
.ki-cats{margin-bottom:1rem}
.ki-subs{margin-top:0}
.ltab:focus-visible{outline:2px solid var(--accent); outline-offset:2px}
.ltab-panel:focus{outline:none}
.ltab-panel .section:first-child{margin-top:1.4rem}
.change{background:var(--card); border:1px solid var(--border); border-radius:10px; padding:.6rem .85rem; margin-bottom:.45rem; box-shadow:var(--shadow-1)}
.change .ct{font-weight:600; font-size:.88rem}
.change .cm{font-size:.82rem; color:var(--muted); margin-top:.25rem}
.panel{max-height:21rem; overflow-y:auto; padding-right:.3rem}
.empty{color:var(--faint); font-size:.88rem; padding:.6rem 0}

/* ── platform impact: segmented dashboard meters ───────────────────────── */
/* 3 columns at the 1000px content cap → clean rows for both grids (6 platforms,
   9 components). Bar + count are stacked so the meter always spans the full card
   width (an inline count label used to squeeze the segments into thin slivers). */
.plat-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:.8rem}
.plat{
  background:linear-gradient(180deg,var(--card2),var(--card)); border:1px solid var(--border);
  border-radius:var(--r-md); padding:.9rem 1rem; box-shadow:var(--shadow-1);
}
.plat .ph{display:flex; align-items:center; gap:.4rem; min-width:0}
.plat .pn{font-weight:700; font-size:.88rem; display:flex; align-items:center; gap:.4rem; min-width:0; flex:1}
.plat .pname{overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.plat .pmeter{display:flex; flex-direction:column; align-items:flex-start; gap:.5rem; margin-top:.8rem}
.plat .vbar{display:block; width:100%; height:9px; border-radius:999px; background:var(--card3); border:1px solid var(--border); overflow:hidden}
.plat .vbar .vfill{display:block; height:100%; border-radius:999px; background:var(--ic); box-shadow:0 0 10px -3px var(--ic)}
.plat .pl{font-size:.68rem; font-weight:800; text-transform:uppercase; letter-spacing:.04em; color:var(--ic)}
.plat.you{outline:2px solid var(--accent); outline-offset:2px}
.plat .me{flex:none; white-space:nowrap; font-size:.6rem; font-weight:800; color:var(--accent); text-transform:uppercase; letter-spacing:.04em}

/* ── sentiment ─────────────────────────────────────────────────────────── */
.quote{
  background:var(--card); border:1px solid var(--border); border-radius:var(--r-md);
  border-left:3px solid var(--accent); padding:1.15rem 1.3rem; font-size:.96rem; box-shadow:var(--shadow-1);
}
.quote .qh{font-size:.76rem; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); font-weight:800; margin-bottom:.5rem}
.quote .qsrc{margin-top:.75rem; padding-top:.6rem; border-top:1px solid var(--border); font-size:.74rem; color:var(--faint)}

/* ── triage ────────────────────────────────────────────────────────────── */
details.triage{background:var(--card); border:1px solid var(--border); border-radius:var(--r-md); box-shadow:var(--shadow-1); overflow:hidden}
details.triage summary{cursor:pointer; padding:.95rem 1.2rem; font-weight:700; font-size:.95rem; list-style:none; display:flex; align-items:center; justify-content:space-between}
details.triage summary::-webkit-details-marker{display:none}
details.triage summary .caret{color:var(--muted); transition:.2s var(--ease); font-size:.8rem}
details.triage[open] summary .caret{transform:rotate(90deg)}
.triage-body{padding:0 1.2rem 1.15rem; display:grid; grid-template-columns:minmax(0,1fr) minmax(0,1fr); gap:1.2rem}
@media(max-width:680px){.triage-body{grid-template-columns:1fr}}
.triage-col{min-width:0}
.triage-col h4{font-size:.78rem; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); margin:.4rem 0 .6rem; font-weight:800}
.trow{font-size:.83rem; padding:.42rem 0; border-bottom:1px solid var(--border); display:flex; gap:.5rem; align-items:baseline}
.trow:last-child{border-bottom:none}
.trow .tn{font-family:var(--mono); color:var(--accent); text-decoration:none; font-weight:600; white-space:nowrap}
.trow .tt{color:var(--text); flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.tscroll{max-height:260px; overflow-y:auto; padding-right:.35rem}

/* ── history timeline ──────────────────────────────────────────────────── */
.timeline{display:flex; flex-direction:column; gap:0}
.tl{display:flex; gap:.95rem; padding-bottom:1.05rem; position:relative}
.tl:not(:last-child)::before{content:""; position:absolute; left:12px; top:26px; bottom:0; width:2px; background:var(--border)}
.tl .marker{width:26px; height:26px; border-radius:50%; flex:none; display:flex; align-items:center; justify-content:center; font-size:.82rem; border:2px solid var(--tone); background:var(--tone-bg); box-shadow:0 0 12px -4px var(--tone)}
.tl .tlb{flex:1}
.tl .tlv{font-weight:700; font-family:var(--mono); font-size:.92rem}
.tl .tlv .cur{font-size:.64rem; font-weight:800; color:var(--accent); margin-left:.4rem; vertical-align:middle}
.tl .tlv a.snap{color:inherit; text-decoration:underline; text-decoration-style:dotted; text-underline-offset:3px; text-decoration-color:var(--tone)}
.tl .tlv a.snap:hover{text-decoration-style:solid}
.tl .tlr{font-size:.84rem; color:var(--muted); margin-top:.1rem; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden}
.tl .tld{font-size:.74rem; color:var(--faint); margin-top:.1rem}

/* ── best version ──────────────────────────────────────────────────────── */
.bestver{display:flex; gap:.75rem; align-items:flex-start; margin:2.2rem 0 1.8rem; padding:.9rem 1.1rem; border-radius:var(--r-md); background:var(--tone-bg); border:1px solid var(--tone-bd); color:var(--text); font-size:.9rem}
.bestver .bi{font-size:1.1rem; line-height:1.3}
.bestver a.snap{color:var(--accent); text-decoration:none; font-family:var(--mono); font-weight:700}
.bestver a.snap:hover{text-decoration:underline}
.about{display:flex; gap:.7rem; align-items:flex-start; margin:1.1rem 0 1.4rem; padding:.85rem 1.05rem; border-radius:var(--r-md); background:var(--card2); border:1px solid var(--border); color:var(--muted); font-size:.87rem}
.about .ai{font-size:1.05rem; line-height:1.4}
.about .atxt p{margin:0; line-height:1.55}
.about .atxt b{color:var(--text)}
.about .atxt a{color:var(--accent); text-decoration:none}
.about .atxt a:hover{text-decoration:underline}
.about .atxt p.alinks{margin:.55rem 0 0; display:flex; gap:1.1rem; flex-wrap:wrap; font-weight:600}
.about .atxt{flex:1 1 auto; min-width:0}
.about-sticker{flex:0 0 auto; order:-1; align-self:center; width:96px; height:auto; margin:-.15rem .4rem -.15rem -.1rem; filter:drop-shadow(0 4px 10px rgba(0,0,0,.28))}
@media(max-width:600px){.about-sticker{width:74px}}
.impact-sub{margin-top:1.3rem}
.impact-sub:first-of-type{margin-top:.2rem}
.impact-sublabel{font-family:var(--mono); font-size:.7rem; letter-spacing:.12em; text-transform:uppercase; color:var(--faint); font-weight:600; margin-bottom:.55rem}
.impact-note{font-size:.79rem; color:var(--muted); margin-bottom:.6rem}
.prose + .quote{margin-top:1.2rem}

/* ── your setup ────────────────────────────────────────────────────────── */
.setup-intro{font-size:.82rem; color:var(--muted); margin:-.3rem 0 .85rem; max-width:72ch}
.setup .chips{display:flex; flex-wrap:wrap; align-items:center; gap:.45rem; margin-bottom:.9rem}
.pick-clear{border-style:dashed; color:var(--faint)}
.pick-clear:hover{color:var(--bad); border-color:var(--bad)}
.setup .chip-grp{flex-basis:100%; font-size:.64rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--faint); margin-top:.3rem}
.setup .chip-grp:first-child{margin-top:0}
.pick{font-size:.8rem; font-weight:600; padding:.36rem .82rem; border-radius:999px; cursor:pointer; background:var(--card); border:1px solid var(--border2); color:var(--muted); transition:.15s var(--ease); display:inline-flex; align-items:center; gap:.4rem}
.pick:hover{color:var(--text); border-color:var(--accent)}
.pick[aria-pressed="true"]{background:var(--accent); border-color:var(--accent); color:var(--on-accent); font-weight:700}
.setup .risk{padding:.9rem 1.1rem; border-radius:var(--r-md); font-size:.9rem; color:var(--text); background:var(--tone-bg); border:1px solid var(--tone-bd)}
.setup .risk .rh{font-weight:700; margin-bottom:.2rem}
.setup .hint{color:var(--faint); font-size:.84rem}
/* per-setup verdict — a conservative refinement of the global verdict for the user's stack */
.setup .risk .sv{display:flex; align-items:center; flex-wrap:wrap; gap:.5rem; margin-bottom:.7rem; padding-bottom:.7rem; border-bottom:1px solid var(--tone-bd)}
.sv .sv-k{font-family:var(--mono); font-size:.62rem; letter-spacing:.12em; text-transform:uppercase; color:var(--faint); font-weight:700}
.sv .sv-em{font-size:1.2rem; line-height:1}
.sv .sv-l{font-weight:800; color:var(--tone); font-size:1.02rem}
.sv .sv-note{font-size:.72rem; color:var(--muted); font-weight:600}
.risk .prow-list{margin-top:.85rem; display:flex; flex-direction:column; gap:.45rem}
.risk .prow{display:flex; align-items:center; gap:.5rem; flex-wrap:wrap; font-size:.85rem}
.risk .ppn{font-weight:700; min-width:7rem}
.pbadge{flex:none; font-size:.64rem; font-weight:800; text-transform:uppercase; letter-spacing:.04em; padding:.12rem .5rem; border-radius:999px; border:1px solid var(--ic); color:var(--ic)}
.risk .pdetail{color:var(--muted); font-size:.82rem}
.risk .pdetail.muted2{color:var(--faint); font-style:italic}
.risk .prow-all{margin-top:.5rem; padding-top:.6rem; border-top:1px dashed var(--border2)}
.risk .ccnote{color:var(--faint); font-style:italic}

/* ── release-health trend: SVG area chart ──────────────────────────────── */
.trend{background:linear-gradient(180deg,var(--card2),var(--card)); border:1px solid var(--border); border-radius:var(--r-md); padding:1.2rem 1.3rem 1rem; box-shadow:var(--shadow-1)}
.trend .chartwrap{position:relative}
.trend svg.tchart{width:100%; height:170px; display:block; overflow:visible}
.trend .tgrid line{stroke:var(--border); stroke-width:1; stroke-dasharray:3 4; opacity:.6}
.trend .taxis{font-family:var(--mono); font-size:9px; fill:var(--faint)}
.trend .tdot{stroke:var(--bg); stroke-width:2.5; transition:r .15s var(--ease)}
.trend .tdot:hover{r:7}
.trend .temoji{font-size:13px; text-anchor:middle}
.trend .tver{font-family:var(--mono); font-size:8.5px; fill:var(--muted); text-anchor:middle}
.trend .legend{display:flex; flex-wrap:wrap; gap:.45rem .9rem; margin-top:.95rem; padding-top:.75rem; border-top:1px solid var(--border); font-size:.74rem; color:var(--muted)}
.trend .legend .k{display:inline-flex; align-items:center; gap:.35rem}
.trend .legend .sw{width:11px; height:11px; border-radius:3px}

/* ── Trends: 2×2 time-series charts ──────────────────────────────────────── */
.trends-grid{display:grid; grid-template-columns:1fr 1fr; gap:.9rem}
@media(max-width:680px){.trends-grid{grid-template-columns:1fr}}
.tcard{background:linear-gradient(180deg,var(--card2),var(--card)); border:1px solid var(--border); border-radius:var(--r-md); padding:.95rem 1.05rem; box-shadow:var(--shadow-1)}
.tc-h{display:flex; align-items:baseline; gap:.5rem; flex-wrap:wrap; margin-bottom:.5rem}
.tc-t{font-weight:700; font-size:.92rem}
.tc-s{font-size:.72rem; color:var(--muted)}
.tcard .chartwrap{position:relative}
.tcard svg.tchart2{width:100%; height:auto; display:block; overflow:visible}
.tcard .tgrid line{stroke:var(--border); stroke-width:1; stroke-dasharray:3 4; opacity:.55}
.tcard .taxis2{font-family:var(--mono); font-size:8px; fill:var(--faint)}
.tc-legend{display:flex; flex-wrap:wrap; gap:.35rem .8rem; margin-top:.6rem; font-size:.72rem; color:var(--muted)}
.tc-k{display:inline-flex; align-items:center; gap:.3rem}
.tc-sw{width:12px; height:4px; border-radius:2px; display:inline-block}
.tc-empty{color:var(--faint); font-size:.82rem; font-style:italic; padding:2.6rem 0; text-align:center}

/* ── catching up ───────────────────────────────────────────────────────── */
.catchup{background:var(--card); border:1px solid var(--border); border-radius:var(--r-md); padding:1.15rem 1.25rem; box-shadow:var(--shadow-1)}
.catchup .cu-row{display:flex; align-items:center; gap:.6rem; flex-wrap:wrap; margin-bottom:.95rem}
.catchup .cu-label{font-size:.9rem; color:var(--muted)}
.cu-select{font-size:.9rem; font-weight:600; padding:.42rem .72rem; border-radius:9px; background:var(--card3); color:var(--text); border:1px solid var(--border2); cursor:pointer}
.cu-sum{font-size:.85rem; color:var(--muted); font-weight:600; margin-bottom:.9rem}
.cu-out{max-height:24rem; overflow-y:auto; padding-right:.3rem}
.cu-rel{padding:.75rem 0; border-top:1px solid var(--border)}
.cu-rel:first-child{border-top:none; padding-top:0}
.cu-rh{display:flex; align-items:baseline; gap:.6rem; margin-bottom:.45rem}
.cu-ver{font-family:var(--mono); font-weight:700; color:var(--accent); font-size:.92rem}
.cu-date{font-size:.76rem; color:var(--faint)}
.cu-list{list-style:none; display:flex; flex-direction:column; gap:.4rem}
.cu-list li{position:relative; padding-left:1.15rem; font-size:.88rem; color:var(--text)}
.cu-list li::before{content:""; position:absolute; left:0; top:.5em; width:6px; height:6px; border-radius:50%; background:var(--accent)}
.cu-list li.empty{color:var(--faint); padding-left:0}
.cu-list li.empty::before{display:none}

/* ── footer ────────────────────────────────────────────────────────────── */
.foot{margin-top:2.8rem; padding-top:1.5rem; border-top:1px solid var(--border); color:var(--muted); font-size:.83rem}
.foot .how{display:flex; gap:.6rem; align-items:flex-start; margin-bottom:1rem}
.foot .how .fi{font-size:1.05rem}
.foot .meta{display:flex; flex-wrap:wrap; gap:.4rem .9rem; font-size:.78rem; color:var(--faint)}
.foot .meta code{font-family:var(--mono); color:var(--muted)}
.foot a{color:var(--accent); text-decoration:none}
.foot a:hover{text-decoration:underline}
.foot .disclaimer{margin-top:1rem; font-size:.75rem; color:var(--faint); line-height:1.5}

.errbox{max-width:600px; margin:4rem auto; text-align:center; color:var(--muted)}

/* ── a11y helpers ──────────────────────────────────────────────────────── */

  // A CONSERVATIVE, fail-closed refinement of the global verdict for the user's stack:

  // touches them. A blocker = a high/critical issue that is confirmed for THIS version

  // platform/channel/component (or is cross-cutting). Fresh releases never soften (the
  // data is still arriving); the result is never harsher than the global verdict. Shared
  // by the panel + the hero CTA so they can't disagree. latest.json/badge/RSS/SSR keep

  var VERDICT_ORDER = ["✅","⚠️","⏸️"];   // increasing caution

  var CONF_DESC_FRESH = {

  function signalPanel(v){

  function riskSparkline(){

      var tl = (DATA.timeline||[]).filter(function(r){ return !r.approx; });
      tl.sort(function(a,b){ return String(a.t).localeCompare(String(b.t)); });
      tl = tl.slice(-12);

  function hero(v){
    var rel = DATA.latest_release || {}, npm = DATA.npm || {};

      } else if (rv.agreed){

  function lowConfBanner(){

    ]);

  function issueCard(i){
    var sev = String(i.severity||"medium");
    var mine = issueHitsStack(i);
    var cat = CAT[i.category] || {icon:"📋",label:cap(i.category||"issue"),cls:""};
    var tags = [ el("span",{"class":"tag "+cat.cls, title:cat.desc||""},[cat.icon+" "+cat.label]) ];
    // System(s) this issue hits — analyst-tagged, heuristic fallback (see issuePlatforms).
    var ips = issuePlatforms(i);
    if (ips.indexOf("all") >= 0){
      tags.push(el("span",{"class":"tag t-plat"}, "🌐 All platforms"));
    } else {
      ips.slice(0,4).forEach(function(pk){
        var meta = PLAT_LABEL[pk];
        if (meta) tags.push(el("span",{"class":"tag t-plat"}, meta[0]+" "+meta[1]));
      });
    }
    // Component pills — which subsystem of OpenClaw this issue touches.
    issueComponents(i).forEach(function(ck){
      var cm = COMP_LABEL[ck];
      if (cm) tags.push(el("span",{"class":"tag t-comp"}, cm[0]+" "+cm[1]));
    });
    if (i.affects_version){
      tags.push(el("span",{"class":"tag t-bad"}, "⊘ affects this version"));
    }
    var dec = i.clawsweeper_decision;
    if (dec && dec!=="unknown"){
      var decTip = "Clawsweeper (OpenClaw's automated issue-triage bot) "+(dec==="keep_open"?"kept this open — not auto-closed or resolved.":"marked this "+dec+".");
      tags.push(el("span",{"class":"tag "+(dec==="keep_open"?"t-warn":"t-good"), title:decTip}, (dec==="keep_open"?"⊙ keep open":"✓ "+dec)));
    }
    if (i.fixed_in){
      tags.push(el("span",{"class":"tag t-good"}, "✓ fixed in "+i.fixed_in));
    } else if (i.category==="regression" || i.category==="post_release"){
      tags.push(el("span",{"class":"tag t-bad"}, "● unfixed"));
    }
    if (i.has_workaround){
      tags.push(el("span",{"class":"tag t-info", title:"The issue report mentions a workaround or mitigation — open the linked thread for details. (Detected from the report text; not a guarantee one exists or is official.)"}, "🔧 workaround noted"));
    }
    if (i.reactions){
      tags.push(el("span",{"class":"tag"}, "👍 "+i.reactions));
    }
    var sevCls = (sev==="critical"||sev==="high")?"t-bad":(sev==="medium"?"t-warn":"");
    tags.push(el("span",{"class":"tag "+sevCls}, sev+" severity"));
    // True bug age: when it was opened on GitHub (a verifiable fact), with first-tracked as fallback.
    if (i.created_at) tags.push(el("span",{"class":"tag", title:"When this issue was opened on GitHub"}, "opened "+fmtDate(i.created_at)));
    else if (i.first_seen) tags.push(el("span",{"class":"tag"}, "first tracked "+timeAgo(i.first_seen)));
    // Mark heuristic platform/subsystem tags so a keyword guess doesn't read as an assertion.
    if (i.tag_source && i.tag_source !== "analyst"){
      tags.push(el("span",{"class":"tag t-auto", title:"The platform/subsystem tags here were auto-detected from the issue's text and labels — not asserted by the analyst. Verify on GitHub."}, "🔍 auto-detected"));
    }
    // Raw maintainer-assigned GitHub labels — the verifiable facts the severity is scored from.
    (i.labels||[]).forEach(function(lbl){
      tags.push(el("span",{"class":"tag tag-raw", title:"Maintainer-assigned GitHub label"}, String(lbl)));
    });
    if (mine) tags.unshift(el("span",{"class":"tag t-me"}, "★ your stack"));
    if (i.is_new) tags.unshift(el("span",{"class":"tag t-good"}, "🆕 new"));

    // Compact one-line summary (click to expand the full tag set + GitHub link).
    var num = "#"+i.number;
    var badges = [];
    if (i.is_new) badges.push(el("span",{"class":"ib t-good", title:"New since last run"}, "🆕"));
    if (mine) badges.push(el("span",{"class":"ib t-me", title:"Affects your stack"}, "★"));
    badges.push(el("span",{"class":"ib", title:cat.label}, cat.icon));
    if (i.reactions) badges.push(el("span",{"class":"ib"}, "👍 "+i.reactions));
    var detId = "idet-"+i.number;
    var btn = el("button",{"class":"irow", type:"button", "aria-expanded":"false",
                           "aria-controls":detId, title:"Show details for "+num},[
      el("span",{"class":"sevdot", title:sev+" severity"}),
      el("span",{"class":"inum"}, num),
      el("span",{"class":"ititle"}, i.title||"(untitled)"),
      el("span",{"class":"ibs"}, badges),
      el("span",{"class":"chev","aria-hidden":"true"}, "▸")
    ]);
    var detail = el("div",{"class":"idetail", id:detId, hidden:""},[
      // The row's .ititle is one-line ellipsized — the expanded panel is where the
      // full untruncated title lives.
      el("div",{"class":"idet-title"}, i.title||"(untitled)"),
      el("div",{"class":"tags"}, tags),
      el("a",{"class":"idet-link", href:issueUrl(i.number)}, "View "+num+" on GitHub ↗")
    ]);
    btn.addEventListener("click", function(){
      var open = btn.getAttribute("aria-expanded")==="true";
      btn.setAttribute("aria-expanded", open?"false":"true");
      if (open) detail.setAttribute("hidden",""); else detail.removeAttribute("hidden");
    });
    return el("div",{"class":"issue sev-"+sev+(mine?" mine":""), "data-cat":i.category||"other",
                     "data-mine":mine?"1":"0", "data-comp":issueComponents(i).join(" ")},[ btn, detail ]);
  }
  function issues(){
    var ki = (DATA.known_issues||[]).slice();
    if (!ki.length) return null;
    var order = {critical:0,high:1,medium:2,low:3};
    var catOrder = {regression:0,post_release:1,diamond_lobster:2,active:3};
    function rank(map,key){ return (key in map) ? map[key] : 9; }  // NB: 0 is falsy, don't use ||
    ki.sort(function(a,b){
      var s = rank(order,a.severity) - rank(order,b.severity);
      if (s) return s;
      return rank(catOrder,a.category) - rank(catOrder,b.category);
    });
    var s = el("div",{"class":"section", id:"issues"});
    var newCount = ki.filter(function(i){return i.is_new;}).length;
    s.appendChild(sectionHead("Known issues", ki.length,
      (newCount ? ("🆕 "+newCount+" new since last run · ") : "")+"critical first"));

    var cats = {};
    ki.forEach(function(i){ if(i.category) cats[i.category]=(cats[i.category]||0)+1; });
    // Category filters render as a tab strip (styled like the long-tail tabs above);
    // subsystem filters sit on a secondary row below. They are two INDEPENDENT
    // dimensions that combine (category AND subsystem — e.g. "Regression × Gateway");
    // re-clicking the active subsystem chip clears that dimension.
    var catStrip = el("div",{"class":"ltabs ki-cats", role:"group", "aria-label":"Filter known issues by category"});
    catStrip.appendChild(el("button",{"class":"ltab", type:"button", "aria-pressed":"true", "data-f":"all"}, "All ("+ki.length+")"));
    Object.keys(cats).forEach(function(c){
      var meta = CAT[c]||{icon:"📋",label:cap(c)};
      catStrip.appendChild(el("button",{"class":"ltab", type:"button", "aria-pressed":"false", "data-f":c}, meta.icon+" "+meta.label+" ("+cats[c]+")"));
    });
    if (stackActive()){
      var mineN = ki.filter(function(i){ return issueHitsStack(i); }).length;
      catStrip.appendChild(el("button",{"class":"ltab", type:"button", "aria-pressed":"false", "data-f":"mine"}, "★ My stack ("+mineN+")"));
    }
    s.appendChild(catStrip);

    // Component filters — one chip per subsystem present, in taxonomy order.
    var compCounts = {};
    ki.forEach(function(i){ issueComponents(i).forEach(function(c){ compCounts[c]=(compCounts[c]||0)+1; }); });
    var compKeys = COMP.map(function(c){return c[0];}).filter(function(k){ return compCounts[k]; });
    var compRow = null;
    if (compKeys.length){
      compRow = el("div",{"class":"filters ki-subs"});
      compRow.appendChild(el("span",{"class":"fsep"}, "subsystem"));
      compKeys.forEach(function(k){
        var m = COMP_LABEL[k];
        compRow.appendChild(el("button",{"class":"fbtn fcomp", type:"button", "aria-pressed":"false", "data-f":"comp:"+k},
          m[0]+" "+m[1]+" ("+compCounts[k]+")"));
      });
      s.appendChild(compRow);
    }

    var list = el("div",{"class":"issue-list"});
    ki.forEach(function(i){ list.appendChild(issueCard(i)); });
    s.appendChild(list);

    // Cap the rendered rows so the list stays short and scannable even as the ledger
    // grows; "Show all" lifts the cap. The cap applies to the CURRENTLY-FILTERED set.
    var CAP = 15, showAll = false, catFilter = "all", compFilter = null;
    var moreBtn = el("button",{"class":"ki-more", type:"button"}, "");
    s.appendChild(moreBtn);

    function matchRow(row){
      var catOk = catFilter === "all" ? true
        : catFilter === "mine" ? row.getAttribute("data-mine") === "1"
        : row.getAttribute("data-cat") === catFilter;
      var compOk = !compFilter ||
        (row.getAttribute("data-comp") || "").split(" ").indexOf(compFilter) >= 0;
      return catOk && compOk;
    }
    function refresh(){
      var shown = 0, matched = 0;
      list.querySelectorAll(".issue").forEach(function(row){
        if (!matchRow(row)){ row.style.display = "none"; return; }
        matched++;
        var vis = showAll || shown < CAP;
        row.style.display = vis ? "" : "none";
        if (vis) shown++;
      });
      if (matched > CAP){
        moreBtn.style.display = "";
        moreBtn.textContent = showAll ? "Show fewer ▴" : ("Show all "+matched+" ▾");
      } else {
        moreBtn.style.display = "none";
      }
      return matched;
    }
    s.addEventListener("click", function(ev){
      var f = ev.target.closest(".ki-cats .ltab, .ki-subs .fbtn");
      if (f){
        var val = f.getAttribute("data-f");
        if (val.indexOf("comp:") === 0){
          var k = val.slice(5);
          compFilter = (compFilter === k) ? null : k;   // re-click clears the dimension
        } else {
          catFilter = val;
        }
        catStrip.querySelectorAll(".ltab").forEach(function(b){ b.setAttribute("aria-pressed", b.getAttribute("data-f")===catFilter?"true":"false"); });
        if (compRow) compRow.querySelectorAll(".fbtn").forEach(function(b){ b.setAttribute("aria-pressed", b.getAttribute("data-f")===("comp:"+compFilter)?"true":"false"); });
        showAll = false;                 // re-cap when a filter changes
        var m = refresh();
        // Real user clicks only — the synthetic re-apply clicks in applyStack() would
        // otherwise talk over the setup announcement.
        if (ev.isTrusted) announce(m + " of " + ki.length + " issues shown");
      } else if (ev.target.closest(".ki-more")){
        showAll = !showAll;
        var m2 = refresh();
        if (ev.isTrusted) announce(showAll ? ("Showing all " + m2 + " issues") : "List collapsed");
      }
    });
    refresh();
    return s;
  }

  function changes(){
    var ch = DATA.changes || {};
    // Features first (the reason a release exists); only keep categories that have items
    // so an empty "Breaking" tab never shows.
    var groups = [
      {key:"features", icon:"✨", label:"Features", items:ch.features||[], sub:function(x){return x.value||"";}, field:"title"},
      {key:"fixes",    icon:"✓", label:"Fixes",    items:ch.fixes||[],    sub:function(x){return x.verified?"verified":"";}, field:"title"},
      {key:"breaking", icon:"⚠", label:"Breaking", items:ch.breaking||[], sub:function(x){return x.impact||"";}, field:"title"}
    ].filter(function(g){ return g.items.length; });
    if (!groups.length) return null;
    var total = groups.reduce(function(a,g){return a+g.items.length;},0);
    var s = el("div",{"class":"section"});
    s.appendChild(sectionHead("What's new in this release", total, "from the release notes"));

    var tabs = el("div",{"class":"tabs", role:"tablist", "aria-label":"Release changes"});
    var panel = el("div",{"class":"panel"});
    groups.forEach(function(g, idx){
      tabs.appendChild(el("button",{"class":"tab", type:"button", role:"tab", "data-k":g.key, "aria-selected": idx===0?"true":"false"},
        [document.createTextNode(g.icon+" "+g.label), el("span",{"class":"cnt"}, String(g.items.length))]));
    });
    s.appendChild(tabs);
    s.appendChild(panel);
    // Keyboard parity with the long-tail tabs: roving tabindex + Arrow/Home/End.
    var tabsArr = Array.prototype.slice.call(tabs.querySelectorAll(".tab"));
    function syncTabIndex(){
      tabsArr.forEach(function(t){ t.tabIndex = t.getAttribute("aria-selected")==="true" ? 0 : -1; });
    }
    syncTabIndex();
    tabs.addEventListener("keydown", function(ev){
      var i = tabsArr.indexOf(document.activeElement);
      if (i < 0) return;
      var j = -1;
      if (ev.key === "ArrowRight" || ev.key === "ArrowDown") j = (i+1) % tabsArr.length;
      else if (ev.key === "ArrowLeft" || ev.key === "ArrowUp") j = (i-1+tabsArr.length) % tabsArr.length;
      else if (ev.key === "Home") j = 0;
      else if (ev.key === "End") j = tabsArr.length-1;
      if (j < 0) return;
      ev.preventDefault(); tabsArr[j].click(); tabsArr[j].focus();
    });

    function paint(key){
      panel.textContent = "";
      var g = groups.filter(function(x){return x.key===key;})[0];
      g.items.forEach(function(it){
        var sub = g.sub(it);
        panel.appendChild(el("div",{"class":"change"},[
          el("div",{"class":"ct"}, linkify(it[g.field]||"")),
          sub ? el("div",{"class":"cm"}, (g.key==="fixes"&&it.verified)? "✓ "+sub : sub) : null
        ]));
      });
    }
    tabs.addEventListener("click", function(ev){
      var tab = ev.target.closest(".tab"); if(!tab) return;
      tabs.querySelectorAll(".tab").forEach(function(t){ t.setAttribute("aria-selected", t===tab?"true":"false"); });
      syncTabIndex();
      paint(tab.getAttribute("data-k"));
    });
    paint(groups[0].key);
    return s;
  }

  // One meter card — shared by both Impact grids (platform × component differ only in
  // aggregation + labels). Fill = issue volume relative to the grid's busiest row —
  // CONTINUOUS, so 1 vs 7 vs 13 issues read as different bars (the old 5 coarse
  // segments saturated: round(12/13*5) == round(13/13*5)). Colour = worst severity
  // via the sv-* class → --ic, exactly as before.
  function meterCard(icon, name, a, maxCount, mine, label){
    var fill = el("i",{"class":"vfill"});
    // Width via CSSOM (not a style attribute) so a strict CSP can't zero the bars;
    // floor at 6% so a 1-issue row shows a visible nub rather than an empty track.
    fill.style.width = (a.count ? Math.max(6, Math.round(a.count / (maxCount || 1) * 100)) : 0) + "%";
    return el("div",{"class":"plat sv-"+(a.count?a.worst:"none")+(mine?" you":"")},[
      el("div",{"class":"ph"},[
        el("span",{"class":"pn"}, [document.createTextNode(icon+" "), el("span",{"class":"pname"}, name), mine?el("span",{"class":"me"}," ★you"):null])
      ]),
      el("div",{"class":"pmeter"},[ el("span",{"class":"vbar"},[fill]), el("span",{"class":"pl"}, label) ])
    ]);
  }

  function platforms(){
    var ki = DATA.known_issues || [];
    var anyTagged = ki.some(function(i){ return (i.platforms||[]).length; });
    var stat = {}, maxCount = 0;
    PLAT.forEach(function(p){
      var iss = platformIssues(p[0], ki);
      stat[p[0]] = {count:iss.length, regr:iss.filter(function(i){return i.category==="regression";}).length,
                    worst:worstSeverity(iss).name};
      if (iss.length > maxCount) maxCount = iss.length;
    });
    var pi = DATA.platform_impact || {};
    // Fallback for legacy data with no per-issue platform tags: derive length+colour
    // from the analyst's platform_impact level rather than from counted evidence.
    if (!anyTagged){
      if (!Object.keys(pi).length) return null;
      var LVLSEV = {high:"high", medium:"medium", low:"low", none:"none"};
      var LVLFILL = {high:5, medium:3, low:2, none:0};
      PLAT.forEach(function(p){
        var lvl = String(pi[p[0]]||"none").toLowerCase();
        stat[p[0]] = {count:LVLFILL[lvl]||0, regr:0, worst:LVLSEV[lvl]||"none", lbl:(IMPACT[lvl]||IMPACT.none).label};
      });
      maxCount = 5;
    } else if (!maxCount){ return null; }
    var s = el("div",{"class":"impact-sub", id:"platforms"});
    s.appendChild(el("div",{"class":"impact-sublabel"}, "By platform & channel"));
    // When every affected platform shows the same volume×severity, the bars carry no
    // signal — say so and point at the component split rather than a wall of identical
    // bars. (Signature buckets the continuous fill to deciles, as the segments did.)
    var sigs = {}, nShown = 0;
    PLAT.forEach(function(p){ var a=stat[p[0]]; if (a.count>0){ nShown++; sigs[a.worst+":"+Math.round(a.count/(maxCount||1)*10)]=1; } });
    if (nShown>=2 && Object.keys(sigs).length===1){
      s.appendChild(el("div",{"class":"impact-note"}, "Affects all platforms about equally — the meaningful split is by component, above."));
    }
    var g = el("div",{"class":"plat-grid"});
    PLAT.forEach(function(p){
      var a = stat[p[0]];
      g.appendChild(meterCard(p[1], p[2], a, maxCount, !!STACK[p[0]],
                              a.lbl || (a.count ? issueWord(a.count) : "clear")));
    });
    s.appendChild(g);
    return s;
  }

  // Impact — one section that merges the two volume×severity meter views. Component
  // first (it differentiates — gateway/plugins hot spots), then platform/channel
  // (which often reads all-high; the sub-builder flags that case).
  function impact(){
    var comp = componentHealth();
    var plat = platforms();
    if (!comp && !plat) return null;
    var s = el("div",{"class":"section", id:"impact"});
    s.appendChild(sectionHead("Impact", null, "bar = issue volume · colour = worst severity"));
    if (comp) s.appendChild(comp);
    if (plat) s.appendChild(plat);
    return s;
  }

  // Component health — which subsystems this release hits. Bar length = issue volume,
  // colour = worst severity (so a 6-critical hot spot reads louder than a 1-high blip).
  function componentHealth(){
    var ki = DATA.known_issues || [];
    var agg = {};
    ki.forEach(function(i){
      var sv = String(i.severity||"low").toLowerCase(), w = SEVW[sv]||0;
      issueComponents(i).forEach(function(c){
        var a = agg[c] || (agg[c] = {count:0, regr:0, worst:"low", w:0});
        a.count++;
        if (i.category==="regression") a.regr++;
        if (w > a.w){ a.w = w; a.worst = sv; }
      });
    });
    var keys = Object.keys(agg);
    if (!keys.length) return null;
    var maxCount = 0; keys.forEach(function(k){ if (agg[k].count > maxCount) maxCount = agg[k].count; });
    keys.sort(function(a,b){ return agg[b].count-agg[a].count || agg[b].w-agg[a].w; });  // hot spots first
    var s = el("div",{"class":"impact-sub", id:"components"});
    s.appendChild(el("div",{"class":"impact-sublabel"}, "By component"));
    var g = el("div",{"class":"plat-grid"});
    keys.forEach(function(k){
      var a = agg[k], meta = COMP_LABEL[k] || ["📦", cap(k)];
      g.appendChild(meterCard(meta[0], meta[1], a, maxCount, !!STACK[k],
                              issueWord(a.count) + (a.regr? " · "+a.regr+" regr" : "")));
    });
    s.appendChild(g);
    return s;
  }

  function triage(){
    var work = DATA.clawsweeper_work || [], closed = DATA.clawsweeper_closed || [];
    if (!work.length && !closed.length) return null;
    function col(title, items, kind){
      var c = el("div",{"class":"triage-col"});
      c.appendChild(el("h4", null, title+" ("+items.length+")"));
      var scroll = el("div",{"class":"tscroll"});
      items.forEach(function(it){

  // ── best version to run (from the verdict history) ──────────────────────────
  function bestVersion(){
    var h = (DATA.version_history||[]).slice();
    if (!h.length) return null;
    h.sort(function(a,b){ return String(b.assessed_at).localeCompare(String(a.assessed_at)); });
    var SAFE = {"✅":1,"⚠️":1};                 // "safe to run" verdicts
    var curSafe = SAFE[DATA.recommendation];
    var arch = {}; (DATA.archived_versions||[]).forEach(function(v){ arch[v]=1; });
    var best = null;
    for (var i=0;i<h.length;i++){ if (h[i].version!==DATA.version && SAFE[h[i].recommendation]){ best = h[i]; break; } }
    var tone, bi, body;
    if (curSafe && DATA.freshness && DATA.freshness.fresh){
      // A freshly-dropped release is too new to call "the safest / cleared to run" — that
      // would contradict the fresh-release note. Defer the verdict until reports accrue.
      tone="tone-info"; bi="🆕";
      body = [el("b",null,"v"+(DATA.version||"")+" is the latest release."),
              document.createTextNode(" It's too new to call cleared — give it a few runs of real-world reports first (see the fresh-release note above).")];
    } else if (curSafe && DATA.recommendation === "⚠️"){
      // ⚠️ is "back up first — real risk remains"; don't flatly call it "cleared to run".
      tone="tone-warn"; bi="⚠️";
      body = [el("b",null,"v"+(DATA.version||"")+" is the latest, and the best available."),
              document.createTextNode(" But update with care — some real risk remains (see the verdict above).")];
    } else if (curSafe){
      tone="tone-good"; bi="✅";
      body = [el("b",null,"You're on the safest version."),
              document.createTextNode(" v"+(DATA.version||"")+" is the latest and it's cleared to run.")];
    } else if (best){
      tone="tone-info"; bi="↩️";
      var vl = arch[best.version]
        ? el("a",{"class":"snap", href:"archive/"+encodeURIComponent(best.version)+".html", title:"View the verdict for v"+best.version}, "v"+best.version)
        : el("b",null,"v"+best.version);
      var bl = (VERDICTS[best.recommendation]||{label:""}).label.toLowerCase();
      body = [el("b",null,"Safest version to run now: "), vl,
              document.createTextNode(" — the most recent release that was cleared"+(bl?(" ("+bl+")"):"")+". Hold here until the latest is fixed.")];
    } else {
      tone="tone-warn"; bi="⏳";
      body = [el("b",null,"No recently-cleared version."),
              document.createTextNode(" None of the tracked releases earned an update-now verdict yet — wait for a clean one.")];
    }
    return el("div",{"class":"bestver "+tone},[el("span",{"class":"bi"},bi), el("div",null,body)]);
  }

  // ── your setup (personalize the verdict to the user's stack) ────────────────
  function personalize(){
    var s = el("div",{"class":"section setup", id:"setup"});

    // The how-to reads BEFORE the pickers — it used to sit in dim small text below

    s.appendChild(el("div",{"class":"setup-intro"},

    PLAT.forEach(function(p){ chips.appendChild(pickBtn(p[0], p[1]+" "+p[2])); });
    chips.appendChild(el("span",{"class":"chip-grp"}, "Components"));
    COMP.forEach(function(c){ chips.appendChild(pickBtn(c[0], c[1]+" "+c[2])); });
    var clearBtn = el("button",{"class":"pick pick-clear", type:"button", id:"stack-clear",

        saveStack(); applyStack();

      var k = b.getAttribute("data-k");
      if (STACK[k]) delete STACK[k]; else STACK[k]=true;

  }
  // Toggling the stack only affects three sections. Update them in place (no
  // #app teardown) so the page doesn't flash, scroll holds, and other sections'
  // state (catch-up version, changes tab, issue filter) is preserved.
  function applyStack(){
    var setup = document.getElementById("setup");

      setup.querySelectorAll(".pick").forEach(function(b){
        b.setAttribute("aria-pressed", STACK[b.getAttribute("data-k")] ? "true" : "false");
      });
      var clr = document.getElementById("stack-clear");
      if (clr){ if (stackActive()) clr.removeAttribute("hidden"); else clr.setAttribute("hidden",""); }
      var risk = setup.querySelector(".risk, .hint");
      if (risk) risk.parentNode.replaceChild(personalRisk(), risk);
    }
    var oldI = document.getElementById("issues");
    if (oldI){
      // Preserve BOTH active filter dimensions across the rebuild (category tab +
      // subsystem chip — they combine).
      var ac = oldI.querySelector('.ki-cats .ltab[aria-pressed="true"]');
      ac = ac ? ac.getAttribute("data-f") : "all";
      var af = oldI.querySelector('.ki-subs .fbtn[aria-pressed="true"]');
      af = af ? af.getAttribute("data-f") : null;
      var freshI = issues();
      if (freshI){
        oldI.parentNode.replaceChild(freshI, oldI);
        if (ac && ac !== "all"){
          var bc = freshI.querySelector('.ki-cats .ltab[data-f="'+ac+'"]');
          if (bc) bc.click();   // (a vanished "mine" tab after clear-all safely stays "all")
        }
        if (af){
          var bf = freshI.querySelector('.ki-subs .fbtn[data-f="'+af+'"]');
          if (bf) bf.click();
