<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenClaw Status — Card Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f11;
    --card: #1a1a1f;
    --card-hover: #1e1e24;
    --border: #2a2a30;
    --border-light: #333339;
    --text: #f0f0f0;
    --text-muted: #888;
    --text-dim: #555;
    --accent: #F35528;
    --accent-glow: rgba(243, 85, 40, 0.15);
    --accent-glow-strong: rgba(243, 85, 40, 0.3);
    --green: #22c55e;
    --green-bg: rgba(34, 197, 94, 0.1);
    --red: #ef4444;
    --red-bg: rgba(239, 68, 68, 0.1);
    --amber: #f59e0b;
    --amber-bg: rgba(245, 158, 11, 0.1);
    --cyan: #06b6d4;
    --cyan-bg: rgba(6, 182, 212, 0.1);
    --purple: #a855f7;
    --purple-bg: rgba(168, 85, 247, 0.1);
    --radius: 12px;
    --radius-sm: 8px;
    --radius-xs: 6px;
    --glass-bg: rgba(26, 26, 31, 0.7);
    --glass-border: rgba(255, 255, 255, 0.06);
  }

  body {
    font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 20px;
  }

  /* Header */
  .header {
    padding: 32px 0 16px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 28px;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  .header-brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .header-logo {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, var(--accent), #ff7b4a);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .header-title {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  .header-title span { color: var(--accent); }

  .header-meta {
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 13px;
    color: var(--text-muted);
  }

  .header-meta .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-dim);
  }

  .headline-banner {
    margin-top: 16px;
    padding: 14px 18px;
    background: var(--glass-bg);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-sm);
    font-size: 14px;
    color: var(--text);
    line-height: 1.5;
    border-left: 3px solid var(--accent);
  }

  .headline-banner .rec-icon {
    margin-right: 6px;
  }

  /* Quick Pick Cards */
  .quick-picks {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 14px;
    margin-bottom: 28px;
  }

  .quick-card {
    position: relative;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 16px;
    text-align: center;
    transition: all 0.2s ease;
    overflow: hidden;
  }

  .quick-card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: var(--radius);
    padding: 1px;
    background: linear-gradient(135deg, transparent 30%, var(--accent-glow) 100%);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
  }

  .quick-card:hover {
    background: var(--card-hover);
    transform: translateY(-2px);
    border-color: var(--border-light);
  }

  .quick-card-icon {
    font-size: 28px;
    margin-bottom: 8px;
    display: block;
  }

  .quick-card-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  .quick-card-value {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1.1;
  }

  .quick-card-sub {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .qc-rec .quick-card-value { color: var(--amber); }
  .qc-health .quick-card-value { color: var(--red); }
  .qc-issues .quick-card-value { color: var(--red); }
  .qc-fixes .quick-card-value { color: var(--green); }
  .qc-conf .quick-card-value { color: var(--cyan); }

  /* Filter Chips */
  .filter-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .filter-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-right: 4px;
  }

  .chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s ease;
    user-select: none;
  }

  .chip:hover { border-color: var(--border-light); color: var(--text); }
  .chip.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  .chip .count {
    background: rgba(255,255,255,0.15);
    padding: 1px 6px;
    border-radius: 10px;
    font-size: 10px;
    font-weight: 700;
  }

  .chip.active .count {
    background: rgba(255,255,255,0.25);
  }

  /* Section Headers */
  .section {
    margin-bottom: 28px;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
  }

  .section-header h2 {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }

  .section-header .badge {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 10px;
    background: var(--accent-glow);
    color: var(--accent);
  }

  /* Issues List */
  .issues-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .issue-card {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 16px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    transition: all 0.15s ease;
  }

  .issue-card:hover {
    border-color: var(--border-light);
    background: var(--card-hover);
  }

  .issue-sev {
    flex-shrink: 0;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-top: 6px;
  }

  .sev-high { background: var(--red); box-shadow: 0 0 6px var(--red-bg); }
  .sev-medium { background: var(--amber); }
  .sev-low { background: var(--cyan); }

  .issue-body { flex: 1; min-width: 0; }

  .issue-title {
    font-size: 13px;
    font-weight: 600;
    line-height: 1.4;
    margin-bottom: 4px;
  }

  .issue-title a {
    color: var(--text);
    text-decoration: none;
  }

  .issue-title a:hover { color: var(--accent); }

  .issue-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .issue-tag {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .tag-regression { background: var(--red-bg); color: var(--red); }
  .tag-diamond { background: var(--purple-bg); color: var(--purple); }
  .tag-keep-open { background: var(--amber-bg); color: var(--amber); }
  .tag-close { background: var(--green-bg); color: var(--green); }

  .issue-number {
    font-size: 11px;
    color: var(--text-dim);
    font-weight: 500;
  }

  .issue-fixed {
    font-size: 11px;
    color: var(--green);
    font-weight: 600;
  }

  /* Evidence Grid */
  .evidence-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .evidence-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    position: relative;
    overflow: hidden;
  }

  .evidence-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
  }

  .evidence-for::before { background: linear-gradient(90deg, var(--green), transparent); }
  .evidence-against::before { background: linear-gradient(90deg, var(--red), transparent); }
  .evidence-neutral::before { background: linear-gradient(90deg, var(--cyan), transparent); }

  .evidence-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .evidence-title {
    font-size: 13px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .evidence-count {
    font-size: 11px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 10px;
  }

  .evidence-for .evidence-count { background: var(--green-bg); color: var(--green); }
  .evidence-against .evidence-count { background: var(--red-bg); color: var(--red); }
  .evidence-neutral .evidence-count { background: var(--cyan-bg); color: var(--cyan); }

  .evidence-items {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .evidence-items li {
    font-size: 12px;
    line-height: 1.5;
    color: var(--text-muted);
    padding-left: 14px;
    position: relative;
  }

  .evidence-items li::before {
    content: '';
    position: absolute;
    left: 0;
    top: 7px;
    width: 5px;
    height: 5px;
    border-radius: 50%;
  }

  .evidence-for .evidence-items li::before { background: var(--green); }
  .evidence-against .evidence-items li::before { background: var(--red); }
  .evidence-neutral .evidence-items li::before { background: var(--cyan); }

  /* Changes Cards */
  .changes-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .change-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    overflow: hidden;
  }

  .change-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .change-card-title {
    font-size: 13px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .change-card-count {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 10px;
    background: var(--accent-glow);
    color: var(--accent);
  }

  .change-items {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .change-item {
    padding: 10px 12px;
    background: rgba(255,255,255,0.02);
    border-radius: var(--radius-xs);
    border: 1px solid var(--glass-border);
  }

  .change-item-title {
    font-size: 12px;
    font-weight: 500;
    line-height: 1.5;
    margin-bottom: 4px;
  }

  .change-item-meta {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .verified-badge {
    font-size: 10px;
    font-weight: 600;
    padding: 1px 6px;
    border-radius: 4px;
    background: var(--green-bg);
    color: var(--green);
    display: inline-flex;
    align-items: center;
    gap: 3px;
  }

  .change-value {
    font-size: 11px;
    color: var(--text-muted);
  }

  /* Platform Impact */
  .platform-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 10px;
  }

  .platform-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px 12px;
    text-align: center;
    transition: all 0.15s ease;
  }

  .platform-item:hover {
    border-color: var(--border-light);
  }

  .platform-icon {
    font-size: 24px;
    margin-bottom: 6px;
    display: block;
  }

  .platform-name {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  .platform-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    margin: 0 auto;
    display: block;
  }

  .dot-low { background: var(--green); box-shadow: 0 0 8px var(--green-bg); }
  .dot-high { background: var(--red); box-shadow: 0 0 8px var(--red-bg); }
  .dot-medium { background: var(--amber); box-shadow: 0 0 8px var(--amber-bg); }

  .platform-impact-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-top: 4px;
  }

  .impact-low { color: var(--green); }
  .impact-high { color: var(--red); }
  .impact-medium { color: var(--amber); }

  /* Version History Timeline */
  .timeline {
    position: relative;
    padding-left: 20px;
  }

  .timeline::before {
    content: '';
    position: absolute;
    left: 4px;
    top: 8px;
    bottom: 8px;
    width: 2px;
    background: var(--border);
    border-radius: 1px;
  }

  .timeline-item {
    position: relative;
    padding: 0 0 18px 16px;
  }

  .timeline-item:last-child { padding-bottom: 0; }

  .timeline-dot {
    position: absolute;
    left: -20px;
    top: 4px;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--border-light);
    border: 2px solid var(--bg);
    z-index: 1;
  }

  .timeline-item:first-child .timeline-dot {
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent-glow-strong);
  }

  .timeline-version {
    font-size: 14px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .timeline-tag {
    font-size: 9px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .tag-latest { background: var(--accent-glow); color: var(--accent); }
  .tag-stable { background: var(--green-bg); color: var(--green); }

  .timeline-date {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 1px;
    margin-bottom: 4px;
  }

  .timeline-highlights {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.5;
  }

  /* Thesis Card */
  .thesis-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 28px;
    position: relative;
    overflow: hidden;
  }

  .thesis-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--amber), transparent);
  }

  .thesis-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--accent);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .thesis-text {
    font-size: 14px;
    line-height: 1.65;
    color: var(--text-muted);
  }

  /* Sentiment Card */
  .sentiment-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 28px;
    border-left: 3px solid var(--amber);
  }

  .sentiment-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--amber);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .sentiment-text {
    font-size: 13px;
    line-height: 1.6;
    color: var(--text-muted);
  }

  /* Clawsweeper Card */
  .clawsweeper-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 28px;
  }

  .cs-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .cs-title {
    font-size: 13px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .cs-total {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 10px;
    background: var(--purple-bg);
    color: var(--purple);
  }

  .cs-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .cs-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    background: rgba(255,255,255,0.02);
    border-radius: var(--radius-xs);
    font-size: 12px;
  }

  .cs-item-num {
    font-weight: 700;
    color: var(--text-dim);
    flex-shrink: 0;
    width: 48px;
  }

  .cs-item-title {
    flex: 1;
    color: var(--text-muted);
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .cs-item-priority {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 4px;
    flex-shrink: 0;
  }

  .prio-p0 { background: var(--red-bg); color: var(--red); }
  .prio-p1 { background: var(--amber-bg); color: var(--amber); }
  .prio-p2 { background: var(--cyan-bg); color: var(--cyan); }

  /* Stats Row */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 28px;
  }

  .stat-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    text-align: center;
  }

  .stat-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-dim);
    margin-bottom: 4px;
  }

  .stat-value {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
  }

  .stat-value.accent { color: var(--accent); }

  /* Footer */
  .footer {
    border-top: 1px solid var(--border);
    padding: 20px 0;
    margin-top: 16px;
    text-align: center;
    font-size: 12px;
    color: var(--text-dim);
  }

  .footer a {
    color: var(--accent);
    text-decoration: none;
  }

  .footer a:hover { text-decoration: underline; }

  /* Responsive */
  @media (max-width: 900px) {
    .quick-picks { grid-template-columns: repeat(3, 1fr); }
    .evidence-grid { grid-template-columns: 1fr; }
    .changes-grid { grid-template-columns: 1fr; }
    .platform-grid { grid-template-columns: repeat(3, 1fr); }
    .stats-row { grid-template-columns: repeat(2, 1fr); }
  }

  @media (max-width: 600px) {
    .quick-picks { grid-template-columns: repeat(2, 1fr); }
    .platform-grid { grid-template-columns: repeat(3, 1fr); }
    .header-meta { flex-wrap: wrap; }
    .container { padding: 0 14px; }
    .quick-card-value { font-size: 22px; }
    .stats-row { grid-template-columns: repeat(2, 1fr); }
  }

  @media (max-width: 400px) {
    .quick-picks { grid-template-columns: 1fr 1fr; }
    .platform-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<div class="container" id="app"></div>

<script>
var DATA = {
    "assessed_at": "2026-06-02T10:35:14.983280+00:00",
    "version": "2026.5.28",
    "recommendation": "🔄",

// Filter functionality
function filterIssues(chip, filter) {
  // Update active chip
  document.querySelectorAll('.chip').forEach(function(c) { c.classList.remove('active'); });
  chip.classList.add('active');

  var cards = document.querySelectorAll('.issue-card');
  cards.forEach(function(card) {
    var cat = card.getAttribute('data-category');
    var dec = card.getAttribute('data-decision');
    var show = false;

    if (filter === 'all') {
      show = true;
    } else if (filter === 'regression') {
      show = cat === 'regression';
    } else if (filter === 'diamond-lobster') {
      show = cat === 'diamond_lobster';
    } else if (filter === 'keep-open') {
      show = dec === 'keep_open';
    } else if (filter === 'closed') {
      show = dec === 'close';
    }

    card.style.display = show ? 'flex' : 'none';
  });
}
