<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenClaw Status — Release Assessment</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #09090b;
    --card: #18181b;
    --card-hover: #1e1e22;
    --border: #27272a;
    --text: #fafafa;
    --muted: #a1a1aa;
    --accent: #F35528;
    --accent-glow: rgba(243, 85, 40, 0.15);
    --green: #22c55e;
    --red: #ef4444;
    --amber: #f59e0b;
    --purple: #a855f7;
    --blue: #3b82f6;
    --radius: 10px;
    --radius-sm: 6px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  code, .mono {
    font-family: "SF Mono", "Fira Code", "Cascadia Code", "JetBrains Mono", Consolas, monospace;
  }

  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* Header */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(9, 9, 11, 0.85);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
  }
  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header-logo {
    font-size: 20px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .header-logo .lobster { font-size: 24px; }
  .header-nav {
    display: flex;
    gap: 4px;
  }
  .header-nav a {
    color: var(--muted);
    font-size: 13px;
    font-weight: 500;
    padding: 6px 12px;
    border-radius: var(--radius-sm);
    transition: color 0.15s, background 0.15s;
  }
  .header-nav a:hover, .header-nav a.active {
    color: var(--text);
    background: rgba(255,255,255,0.06);
    text-decoration: none;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  /* Badges */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--muted);
    white-space: nowrap;
  }
  .badge-version {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .badge-latest {
    background: rgba(34,197,94,0.15);
    color: var(--green);
    border-color: rgba(34,197,94,0.3);
  }
  .badge-high {
    background: rgba(239,68,68,0.15);
    color: var(--red);
    border-color: rgba(239,68,68,0.3);
  }
  .badge-medium {
    background: rgba(245,158,11,0.15);
    color: var(--amber);
    border-color: rgba(245,158,11,0.3);
  }
  .badge-low {
    background: rgba(34,197,94,0.15);
    color: var(--green);
    border-color: rgba(34,197,94,0.3);
  }
  .badge-regression {
    background: rgba(239,68,68,0.12);
    color: var(--red);
    border-color: rgba(239,68,68,0.25);
  }
  .badge-diamond_lobster {
    background: rgba(168,85,247,0.12);
    color: var(--purple);
    border-color: rgba(168,85,247,0.25);
  }
  .badge-keep_open {
    background: rgba(245,158,11,0.12);
    color: var(--amber);
    border-color: rgba(245,158,11,0.25);
  }
  .badge-close {
    background: rgba(34,197,94,0.12);
    color: var(--green);
    border-color: rgba(34,197,94,0.25);
  }
  .badge-p0 {
    background: rgba(239,68,68,0.18);
    color: var(--red);
    border-color: rgba(239,68,68,0.35);
    font-weight: 700;
  }
  .badge-p1 {
    background: rgba(245,158,11,0.18);
    color: var(--amber);
    border-color: rgba(245,158,11,0.35);
    font-weight: 700;
  }
  .badge-p2 {
    background: rgba(59,130,246,0.18);
    color: var(--blue);
    border-color: rgba(59,130,246,0.35);
    font-weight: 700;
  }
  .badge-pulse {
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  /* Container */
  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px 24px 48px;
  }

  /* Hero */
  .hero {
    background: linear-gradient(135deg, rgba(243,85,40,0.12) 0%, rgba(243,85,40,0.03) 50%, rgba(168,85,247,0.06) 100%);
    border: 1px solid rgba(243,85,40,0.2);
    border-radius: 16px;
    padding: 32px 36px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: "";
    position: absolute;
    top: -40%;
    right: -10%;
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, rgba(243,85,40,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero-top {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .hero-emoji {
    font-size: 48px;
    line-height: 1;
  }
  .hero-meta {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .hero-meta h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .hero-meta .sub {
    font-size: 13px;
    color: var(--muted);
  }
  .hero-headline {
    font-size: 15px;
    line-height: 1.65;
    color: var(--muted);
    max-width: 800px;
  }
  .hero-headline strong {
    color: var(--text);
    font-weight: 600;
  }

  /* Stats row */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 14px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 22px;
    position: relative;
    overflow: hidden;
  }
  .stat-card.accent-glow {
    border-color: rgba(243,85,40,0.25);
  }
  .stat-card.accent-glow::after {
    content: "";
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), transparent);
    border-radius: 0 0 var(--radius) var(--radius);
  }
  .stat-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .stat-value {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.03em;
  }
  .stat-value.green { color: var(--green); }
  .stat-value.red { color: var(--red); }
  .stat-value.amber { color: var(--amber); }

  /* Progress bar */
  .progress-bar-wrap {
    margin-top: 10px;
  }
  .progress-bar-track {
    height: 8px;
    background: rgba(255,255,255,0.06);
    border-radius: 10px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    border-radius: 10px;
    transition: width 0.6s ease;
  }
  .progress-bar-fill.red { background: linear-gradient(90deg, var(--red), #dc2626); }
  .progress-bar-fill.amber { background: linear-gradient(90deg, var(--amber), #d97706); }
  .progress-bar-fill.green { background: linear-gradient(90deg, var(--green), #16a34a); }
  .progress-bar-fill.accent { background: linear-gradient(90deg, var(--accent), #e04a1f); }

  /* Section titles */
  .section-title {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    letter-spacing: -0.01em;
  }
  .section-title .icon {
    font-size: 18px;
  }

  /* Leaderboard table */
  .leaderboard {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 28px;
  }
  .leaderboard-header {
    display: grid;
    grid-template-columns: 52px 1fr 100px 120px 120px;
    gap: 0;
    padding: 12px 20px;
    background: rgba(255,255,255,0.03);
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
  }
  .leaderboard-row {
    display: grid;
    grid-template-columns: 52px 1fr 100px 120px 120px;
    gap: 0;
    padding: 14px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    align-items: center;
    transition: background 0.12s;
  }
  .leaderboard-row:last-child { border-bottom: none; }
  .leaderboard-row:hover { background: rgba(255,255,255,0.02); }
  .rank-num {
    font-size: 16px;
    font-weight: 700;
    color: var(--muted);
    font-family: "SF Mono", monospace;
  }
  .rank-num.top3 { color: var(--accent); }
  .issue-title {
    font-size: 13.5px;
    font-weight: 500;
    line-height: 1.45;
    color: var(--text);
    padding-right: 16px;
  }
  .issue-title .issue-num {
    font-family: "SF Mono", monospace;
    font-size: 12px;
    color: var(--muted);
    margin-right: 6px;
  }

  /* Filter chips */
  .filter-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 20px;
  }
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 14px;
    font-size: 12.5px;
    font-weight: 500;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }
  .chip:hover {
    border-color: rgba(255,255,255,0.15);
    color: var(--text);
  }
  .chip.active {
    background: rgba(243,85,40,0.15);
    border-color: rgba(243,85,40,0.35);
    color: var(--accent);
  }
  .chip .chip-count {
    font-size: 10px;
    font-weight: 700;
    background: rgba(255,255,255,0.08);
    padding: 1px 6px;
    border-radius: 10px;
  }
  .chip.active .chip-count {
    background: rgba(243,85,40,0.2);
  }

  /* Two-column evidence grid */
  .evidence-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 28px;
  }
  .evidence-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px 24px;
    position: relative;
    overflow: hidden;
  }
  .evidence-card::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
  }
  .evidence-card.for::before { background: linear-gradient(90deg, var(--green), transparent); }
  .evidence-card.against::before { background: linear-gradient(90deg, var(--red), transparent); }
  .evidence-card.neutral::before { background: linear-gradient(90deg, var(--amber), transparent); }
  .evidence-card h3 {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .evidence-list {
    list-style: none;
  }
  .evidence-list li {
    font-size: 13px;
    color: var(--muted);
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    line-height: 1.55;
  }
  .evidence-list li:last-child { border-bottom: none; }

  /* Changes tabs */
  .changes-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 28px;
  }
  .changes-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,0.02);
  }
  .changes-tab {
    padding: 12px 20px;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    user-select: none;
  }
  .changes-tab:hover { color: var(--text); }
  .changes-tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
  .changes-content {
    padding: 20px 24px;
  }
  .change-item {
    display: flex;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    font-size: 13.5px;
    color: var(--muted);
    line-height: 1.55;
  }
  .change-item:last-child { border-bottom: none; }
  .change-icon {
    flex-shrink: 0;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    margin-top: 1px;
  }
  .change-icon.fix {
    background: rgba(34,197,94,0.15);
    color: var(--green);
  }
  .change-icon.feature {
    background: rgba(59,130,246,0.15);
    color: var(--blue);
  }
  .change-icon.breaking {
    background: rgba(239,68,68,0.15);
    color: var(--red);
  }
  .verified-check {
    color: var(--green);
    font-size: 11px;
    margin-left: 6px;
  }

  /* Platform impact grid */
  .platform-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 28px;
  }
  .platform-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .platform-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .platform-dot.green { background: var(--green); box-shadow: 0 0 6px rgba(34,197,94,0.4); }
  .platform-dot.amber { background: var(--amber); box-shadow: 0 0 6px rgba(245,158,11,0.4); }
  .platform-dot.red { background: var(--red); box-shadow: 0 0 6px rgba(239,68,68,0.4); }
  .platform-info { display: flex; flex-direction: column; gap: 2px; }
  .platform-name { font-size: 13px; font-weight: 600; }
  .platform-level { font-size: 11px; color: var(--muted); text-transform: capitalize; }

  /* Version history */
  .version-timeline {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px 24px;
    margin-bottom: 28px;
  }
  .version-item {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    padding: 12px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .version-item:last-child { border-bottom: none; }
  .version-dot-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 4px;
  }
  .version-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--border);
    flex-shrink: 0;
  }
  .version-dot.latest { background: var(--accent); box-shadow: 0 0 8px rgba(243,85,40,0.4); }
  .version-line {
    width: 1px;
    flex-grow: 1;
    background: var(--border);
    margin-top: 4px;
  }
  .version-info { flex: 1; }
  .version-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 3px;
    flex-wrap: wrap;
  }
  .version-number {
    font-size: 14px;
    font-weight: 700;
    font-family: "SF Mono", monospace;
  }
  .version-date {
    font-size: 12px;
    color: var(--muted);
    font-family: "SF Mono", monospace;
  }
  .version-highlights {
    font-size: 12.5px;
    color: var(--muted);
    line-height: 1.5;
  }

  /* Clawsweeper active work */
  .clawsweeper-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 28px;
  }
  .clawsweeper-header {
    padding: 18px 22px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(255,255,255,0.02);
  }
  .clawsweeper-header h3 {
    font-size: 14px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .clawsweeper-item {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 12px;
    padding: 12px 22px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    align-items: center;
    font-size: 13px;
  }
  .clawsweeper-item:last-child { border-bottom: none; }
  .cw-num {
    font-family: "SF Mono", monospace;
    font-size: 12px;
    color: var(--muted);
  }

  /* Sentiment */
  .sentiment-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px 24px;
    margin-bottom: 28px;
  }
  .sentiment-card h3 {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .sentiment-text {
    font-size: 13.5px;
    color: var(--muted);
    line-height: 1.65;
  }

  /* Footer */
  .footer {
    border-top: 1px solid var(--border);
    padding: 20px 24px;
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    margin-top: 20px;
  }
  .footer-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }
  .footer-usage {
    font-family: "SF Mono", monospace;
    font-size: 11px;
    color: rgba(161,161,170,0.6);
  }

  /* Responsive */
  @media (max-width: 768px) {
    .header-nav { display: none; }
    .hero { padding: 24px 20px; }
    .hero-emoji { font-size: 36px; }
    .hero-meta h1 { font-size: 18px; }
    .stats-row { grid-template-columns: 1fr 1fr; }
    .evidence-grid { grid-template-columns: 1fr; }
    .leaderboard-header,
    .leaderboard-row {
      grid-template-columns: 40px 1fr 80px;
    }
    .leaderboard-header > :nth-child(4),
    .leaderboard-header > :nth-child(5),
    .leaderboard-row > :nth-child(4),
    .leaderboard-row > :nth-child(5) {
      display: none;
    }
    .platform-grid { grid-template-columns: 1fr 1fr; }
    .footer-inner { flex-direction: column; }
    .container { padding: 16px 16px 32px; }
  }
  @media (max-width: 480px) {
    .stats-row { grid-template-columns: 1fr; }
    .platform-grid { grid-template-columns: 1fr; }
    .filter-chips { gap: 6px; }
    .chip { padding: 5px 10px; font-size: 11.5px; }
  }
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-inner">
    <div class="header-left">
      <div class="header-logo">
        <span class="lobster">🦞</span>
        <span>OpenClaw Status</span>
      </div>
      <nav class="header-nav">
        <a href="#" class="active">Assessment</a>
        <a href="#">Issues</a>
        <a href="#">History</a>
      </nav>
    </div>
    <div class="header-right">
      <span class="badge badge-version" id="headerVersion"></span>
      <span class="badge" id="headerUpdated"></span>
    </div>
  </div>
</header>

<!-- Main Content -->
<div class="container" id="app"></div>

<!-- Footer -->
<footer class="footer">
  <div class="footer-inner">
    <span>OpenClaw Status · Release Assessment Dashboard</span>
    <span class="footer-usage" id="footerUsage"></span>
  </div>
</footer>

<script>
var DATA = {
    "assessed_at": "2026-06-02T10:35:14.983280+00:00",
    "version": "2026.5.28",
    "recommendation": "🔄",

    var hours = Math.floor(diff / 3600000);
    if (hours < 1) return 'just now';
    if (hours < 24) return hours + 'h ago';
    var days = Math.floor(hours / 24);
    return days + 'd ago';
